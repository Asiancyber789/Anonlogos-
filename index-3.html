<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AnonLogos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;max-width:480px;margin:0 auto}
::-webkit-scrollbar{width:0;height:0}
input,textarea,button{font-family:inherit}
input::placeholder,textarea::placeholder{color:#2a2a45}
button:active{transform:scale(.96)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Supabase Setup ─────────────────────────────────────────────────────────────
const SUPA_URL="https://stfxqkrotaffyafwatdp.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0Znhxa3JvdGFmZnlhZndhdGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDQwNTcsImV4cCI6MjA5MjA4MDA1N30.m2U9ubKElKndq3lVvWbPRtu6mIuEHmis3V6nnNX4ySM";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── Constants ──────────────────────────────────────────────────────────────────
const ADJ=["Silent","Shadow","Mystic","Ghost","Phantom","Cosmic","Neon","Stealth","Void","Cipher","Echo","Rogue","Nova","Blur","Spectre","Dark","Lunar","Storm","Frost","Blaze"];
const NOUN=["Fox","Wolf","Hawk","Panda","Tiger","Eagle","Lynx","Raven","Cobra","Viper","Falcon","Bear","Shark","Owl","Deer","Snake","Lion","Crow","Mist","Flame"];
const COLORS=["#7C3AED","#1D4ED8","#BE185D","#0F766E","#B45309","#6D28D9","#9D174D","#1E40AF","#7F1D1D","#064E3B"];
const TAGS=["#মতামত","#রাজনীতি","#প্রযুক্তি","#জীবন","#বিনোদন","#হাস্যরস","#ভালোবাসা","#খেলাধুলা","#শিক্ষা","#খবর"];
const TAG_C={"#মতামত":"#f59e0b","#রাজনীতি":"#ef4444","#প্রযুক্তি":"#3b82f6","#জীবন":"#10b981","#বিনোদন":"#ec4899","#হাস্যরস":"#f97316","#ভালোবাসা":"#f43f5e","#খেলাধুলা":"#84cc16","#শিক্ষা":"#06b6d4","#খবর":"#8b5cf6"};
const REACTIONS=[["🔥","আগুন"],["😂","হাসি"],["😢","কষ্ট"],["😡","রাগ"],["👏","তালি"],["💯","একমত"]];
const MOODS=["😊 ভালো","😔 মন খারাপ","😡 রাগান্বিত","🤔 চিন্তিত","🥳 মজায়","😴 বিরক্ত"];

function genUser(){return ADJ[~~(Math.random()*ADJ.length)]+NOUN[~~(Math.random()*NOUN.length)]+(~~(Math.random()*900)+100);}
function genId(){return Math.random().toString(36).substr(2,8);}
function genColor(){return COLORS[~~(Math.random()*COLORS.length)];}
function avatarUrl(u){return `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(u)}&backgroundColor=b6e3f4,c0aede,d1d4f9`;}
function timeAgo(ts){const d=~~((Date.now()-new Date(ts).getTime())/1000);if(d<60)return d+"s আগে";if(d<3600)return ~~(d/60)+"m আগে";if(d<86400)return ~~(d/3600)+"h আগে";return ~~(d/86400)+"d আগে";}

// ── UI Helpers ─────────────────────────────────────────────────────────────────
function Spinner(){return <div style={{display:"flex",justifyContent:"center",padding:40}}><div style={{width:36,height:36,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite"}}/></div>;}

function Av({username,color,size=40,verified=false,isReg=false}){
  const [err,setErr]=useState(false);
  return(
    <div style={{position:"relative",flexShrink:0,width:size,height:size}}>
      {isReg&&!err
        ?<img src={avatarUrl(username)} onError={()=>setErr(true)} alt={username} style={{width:size,height:size,borderRadius:"50%",border:`2px solid ${color}66`,objectFit:"cover",background:"#1a1a2e",display:"block"}}/>
        :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.34,fontWeight:800,color:"#fff",border:`2px solid ${color}66`}}>{username.slice(0,2).toUpperCase()}</div>
      }
      {verified&&<div style={{position:"absolute",bottom:-1,right:-1,background:"#10b981",borderRadius:"50%",width:size*.34,height:size*.34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.2,border:"2px solid #080810"}}>✅</div>}
    </div>
  );
}
function VBadge(){return <span style={{background:"#10b98122",color:"#10b981",fontSize:10,padding:"1px 6px",borderRadius:6,border:"1px solid #10b98144",fontWeight:700,marginLeft:3}}>✅</span>;}
function RegBadge(){return <span style={{background:"#7c3aed33",color:"#a855f7",fontSize:10,padding:"1px 5px",borderRadius:6,border:"1px solid #7c3aed55",fontWeight:700,marginLeft:2}}>🆅</span>;}
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  const bg=type==="error"?"linear-gradient(135deg,#ef4444,#b91c1c)":type==="success"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#7c3aed,#3b82f6)";
  return <div style={{position:"fixed",bottom:75,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,zIndex:9999,whiteSpace:"nowrap",fontWeight:600,boxShadow:"0 8px 28px #0008",animation:"fadeIn .3s"}}>{msg}</div>;
}
function Modal({title,onClose,children}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"#000000cc",zIndex:700,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#0d0d1e",borderRadius:"24px 24px 0 0",padding:"18px 15px 30px",width:"100%",maxWidth:480,margin:"0 auto",border:"1px solid #1e1e35",maxHeight:"92vh",overflowY:"auto",animation:"slideUp .25s ease"}}>
        <div style={{width:40,height:4,background:"#2a2a40",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{color:"#c4b5fd",fontSize:17,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Auth Modal ─────────────────────────────────────────────────────────────────
function AuthModal({onSuccess,onClose}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [username,setUsername]=useState("");
  const [pass,setPass]=useState("");
  const [bio,setBio]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const inp={width:"100%",background:"#080810",border:"1px solid #1e1e35",borderRadius:12,padding:"12px 14px",color:"#e2e8f0",fontSize:14,outline:"none",marginBottom:10};

  const submit=async()=>{
    setErr("");setLoading(true);
    try{
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        const{data:profile}=await sb.from("users").select("*").eq("id",data.user.id).single();
        onSuccess(profile);
      } else {
        if(username.length<3){setErr("ইউজারনেম কমপক্ষে ৩ অক্ষর!");setLoading(false);return;}
        if(!email.includes("@")){setErr("সঠিক ইমেল দাও!");setLoading(false);return;}
        if(pass.length<6){setErr("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!");setLoading(false);return;}
        // check username exists
        const{data:existing}=await sb.from("users").select("id").eq("username",username).single();
        if(existing){setErr("এই ইউজারনেম আগে থেকে আছে!");setLoading(false);return;}
        const{data,error}=await sb.auth.signUp({email,password:pass});
        if(error)throw error;
        const color=genColor();
        const{data:profile,error:pe}=await sb.from("users").insert({id:data.user.id,username,email,bio:bio||"",color,verified:false,admin:false,followers:[],following:[]}).select().single();
        if(pe)throw pe;
        onSuccess(profile);
      }
    }catch(e){setErr(e.message||"কিছু একটা সমস্যা হয়েছে!");}
    setLoading(false);
  };

  return(
    <Modal title={mode==="login"?"🔐 লগইন":"📝 রেজিস্ট্রেশন"} onClose={onClose}>
      <div style={{display:"flex",gap:6,marginBottom:16,background:"#080810",borderRadius:14,padding:4}}>
        {[["login","লগইন"],["register","রেজিস্ট্রেশন"]].map(([m,l])=>(
          <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:11,padding:"9px",color:mode===m?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:14}}>{l}</button>
        ))}
      </div>
      {mode==="register"&&<input value={username} onChange={e=>setUsername(e.target.value)} placeholder="ইউজারনেম" style={inp}/>}
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="ইমেল" type="email" style={inp}/>
      <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)" type="password" style={inp}/>
      {mode==="register"&&<textarea value={bio} onChange={e=>setBio(e.target.value.slice(0,150))} placeholder="বায়ো (ঐচ্ছিক)" rows={2} style={{...inp,resize:"none",lineHeight:1.5}}/>}
      {err&&<p style={{color:"#ef4444",fontSize:12,marginBottom:10,background:"#ef444411",padding:"8px 12px",borderRadius:10}}>⚠️ {err}</p>}
      <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"13px",color:"#fff",cursor:loading?"default":"pointer",fontWeight:700,fontSize:15,marginBottom:8}}>
        {loading?"লোড হচ্ছে...":mode==="login"?"লগইন করো 🚀":"রেজিস্ট্রেশন করো ✨"}
      </button>
    </Modal>
  );
}

// ── Poll ───────────────────────────────────────────────────────────────────────
function Poll({poll,postId,myId,onVote}){
  if(!poll)return null;
  const total=poll.options.reduce((a,o)=>a+(o.votes||[]).length,0);
  const voted=(poll.voted||[]).includes(myId);
  return(
    <div style={{background:"#0a0a14",borderRadius:14,padding:12,border:"1px solid #1e1e35",marginBottom:12}}>
      <p style={{color:"#c4b5fd",fontWeight:600,fontSize:13,marginBottom:10}}>📊 {poll.question}</p>
      {poll.options.map((o,i)=>{
        const pct=total?~~((o.votes||[]).length/total*100):0;
        const mine=(o.votes||[]).includes(myId);
        return(
          <div key={i} onClick={()=>!voted&&onVote(postId,i)} style={{marginBottom:8,cursor:voted?"default":"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{color:mine?"#a855f7":"#94a3b8",fontSize:12,fontWeight:mine?700:400}}>{mine?"✓ ":""}{o.text}</span>
              {voted&&<span style={{color:"#475569",fontSize:11}}>{pct}%</span>}
            </div>
            <div style={{height:6,background:"#1e1e35",borderRadius:3,overflow:"hidden"}}>
              {voted&&<div style={{height:"100%",width:pct+"%",background:mine?"linear-gradient(90deg,#7c3aed,#3b82f6)":"#2a2a40",borderRadius:3,transition:"width .5s"}}/>}
            </div>
          </div>
        );
      })}
      <p style={{color:"#334155",fontSize:11,marginTop:6}}>{total} ভোট{!voted&&" · ক্লিক করো"}</p>
    </div>
  );
}
// ── PostCard ───────────────────────────────────────────────────────────────────
function PostCard({p,me,onLike,onReact,onComment,onShare,onCopy,onBookmark,onVote,onEdit,onDelete,onMsgUser,onViewProfile,onFollow,onPin,onAuthRequired,comments=[]}){
  const [showC,setShowC]=useState(false);
  const [cText,setCText]=useState("");
  const [replyTo,setReplyTo]=useState(null);
  const [showReact,setShowReact]=useState(false);
  const [showMenu,setShowMenu]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(p.content);
  const [exp,setExp]=useState(false);

  const liked=(p.likes||[]).includes(me.id);
  const saved=(p.bookmarks||[]).includes(me.id);
  const tc=TAG_C[p.tag]||"#7c3aed";
  const isLong=p.content&&p.content.length>160;
  const totalR=Object.values(p.reactions||{}).reduce((a,v)=>a+(Array.isArray(v)?v.length:0),0);
  const isOwner=me.id===p.author_id;
  const isFollowing=(me.following||[]).includes(p.author_id);
  const canPin=isOwner&&me.type==="registered"&&me.verified===true;
  const myComments=comments.filter(c=>c.post_id===p.id);

  const submitC=async()=>{
    if(!cText.trim())return;
    await onComment(p.id,{post_id:p.id,author_id:me.id,username:me.username,is_reg:me.type==="registered",verified:me.verified||false,color:me.color,content:cText.trim(),reply_to:replyTo,likes:[]});
    setCText("");setReplyTo(null);
  };

  return(
    <div style={{background:"linear-gradient(160deg,#0f0f1f,#0c0c18)",border:`1px solid ${p.pinned?"#10b98144":"#1e1e35"}`,borderRadius:20,marginBottom:12,overflow:"hidden"}}>
      {p.pinned&&<div style={{background:"#10b98122",padding:"5px 14px",fontSize:11,color:"#10b981",borderBottom:"1px solid #10b98133"}}>📌 পিন করা পোস্ট</div>}
      {p.tag&&<div style={{height:3,background:`linear-gradient(90deg,${tc},transparent)`}}/>}
      <div style={{padding:"13px 13px 0"}}>
        <div style={{display:"flex",gap:9,marginBottom:10,alignItems:"flex-start"}}>
          <div onClick={()=>p.is_reg&&onViewProfile(p.author_id)} style={{cursor:p.is_reg?"pointer":"default"}}>
            <Av username={p.username} color={p.color} size={38} verified={p.verified||false} isReg={p.is_reg}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
              <span onClick={()=>p.is_reg&&onViewProfile(p.author_id)} style={{color:"#c4b5fd",fontWeight:700,fontSize:14,cursor:p.is_reg?"pointer":"default",textDecoration:p.is_reg?"underline dotted":"none",textUnderlineOffset:3}}>{p.username}</span>
              {p.is_reg&&<RegBadge/>}
              {p.verified&&<VBadge/>}
              {p.mood&&<span style={{fontSize:10,background:"#1a1a2e",padding:"2px 6px",borderRadius:8,color:"#64748b"}}>{p.mood}</span>}
              {p.is_reg&&!isOwner&&(
                <button onClick={()=>me.type==="registered"?onFollow(p.author_id):onAuthRequired()} style={{background:isFollowing?"#1a1a2e":"#7c3aed22",border:`1px solid ${isFollowing?"#2a2a40":"#7c3aed55"}`,borderRadius:10,padding:"2px 8px",color:isFollowing?"#475569":"#a855f7",cursor:"pointer",fontSize:10,fontWeight:700}}>
                  {isFollowing?"✓ ফলোয়িং":"+ ফলো"}
                </button>
              )}
            </div>
            <div style={{color:"#2a2a45",fontSize:11,marginTop:1}}>{timeAgo(p.created_at)} · 👁 {p.views||0}{p.edited&&" · ✏️"}</div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            {p.tag&&<span style={{background:tc+"22",color:tc,fontSize:10,padding:"2px 7px",borderRadius:8,border:`1px solid ${tc}44`,fontWeight:600}}>{p.tag}</span>}
            {me.type==="registered"&&!isOwner&&p.is_reg&&(
              <button onClick={()=>onMsgUser(p)} style={{background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:10,padding:"4px 8px",color:"#a855f7",cursor:"pointer",fontSize:12}}>💌</button>
            )}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowMenu(!showMenu)} style={{background:"#1a1a2e",border:"none",color:"#475569",cursor:"pointer",borderRadius:8,padding:"4px 8px",fontSize:14}}>⋯</button>
              {showMenu&&(
                <div style={{position:"absolute",right:0,top:32,background:"#111122",border:"1px solid #2a2a40",borderRadius:14,overflow:"hidden",zIndex:50,minWidth:145,boxShadow:"0 8px 24px #000a"}}>
                  {isOwner&&<button onClick={()=>{setEditing(true);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>✏️ এডিট</button>}
                  {isOwner&&<button onClick={()=>{onDelete(p.id);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#ef4444",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>🗑️ ডিলিট</button>}
                  {canPin&&<button onClick={()=>{onPin(p.id,!p.pinned);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#10b981",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>{p.pinned?"📌 আনপিন":"📌 পিন করো"}</button>}
                  <button onClick={()=>{onCopy(p.id);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>🔗 লিংক কপি</button>
                </div>
              )}
            </div>
          </div>
        </div>

        {editing?(
          <div style={{marginBottom:10}}>
            <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={3} style={{width:"100%",background:"#080810",border:"1px solid #7c3aed",borderRadius:12,padding:"10px",color:"#e2e8f0",fontSize:14,outline:"none",resize:"none"}}/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={()=>{onEdit(p.id,editText);setEditing(false);}} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:12,padding:"8px 16px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>সেভ</button>
              <button onClick={()=>{setEditing(false);setEditText(p.content);}} style={{background:"#1a1a2e",border:"none",borderRadius:12,padding:"8px 14px",color:"#64748b",cursor:"pointer",fontSize:13}}>বাতিল</button>
            </div>
          </div>
        ):(
          <p style={{color:"#cbd5e1",fontSize:14,lineHeight:1.75,marginBottom:10,wordBreak:"break-word"}}>
            {isLong&&!exp?p.content.slice(0,160)+"...":p.content}
            {isLong&&<span onClick={()=>setExp(!exp)} style={{color:"#7c3aed",cursor:"pointer",marginLeft:5,fontSize:12}}>{exp?"↑ কম":"↓ আরো"}</span>}
          </p>
        )}

        {p.image_url&&<div style={{borderRadius:14,overflow:"hidden",marginBottom:10,border:"1px solid #1e1e35"}}><img src={p.image_url} alt="post" style={{width:"100%",maxHeight:300,objectFit:"cover",display:"block"}}/></div>}
        {p.poll&&<Poll poll={p.poll} postId={p.id} myId={me.id} onVote={onVote}/>}

        {totalR>0&&(
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {Object.entries(p.reactions||{}).filter(([,v])=>Array.isArray(v)&&v.length>0).map(([r,v])=>(
              <span key={r} onClick={()=>onReact(p.id,r)} style={{background:"#1a1a2e",border:`1px solid ${v.includes(me.id)?"#7c3aed":"#2a2a40"}`,borderRadius:12,padding:"3px 9px",fontSize:12,cursor:"pointer",color:v.includes(me.id)?"#a855f7":"#64748b"}}>{r} {v.length}</span>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",alignItems:"center",borderTop:"1px solid #1a1a2e",padding:"6px 4px",position:"relative"}}>
        {[
          {ic:liked?"❤️":"🤍",val:(p.likes||[]).length,fn:()=>onLike(p.id,liked),active:liked,col:"#ec4899"},
          {ic:"😄",val:totalR,fn:()=>setShowReact(!showReact),active:showReact,col:"#f59e0b"},
          {ic:"💬",val:myComments.length,fn:()=>setShowC(!showC),active:showC,col:"#3b82f6"},

            {REACTIONS.map(([r])=>(<button key={r} onClick={()=>{onReact(p.id,r);setShowReact(false);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer"}}>{r}</button>))}

      {showC&&(
        <div style={{borderTop:"1px solid #1a1a2e",padding:"12px 13px"}}>
          {myComments.length===0&&<p style={{color:"#2a2a45",fontSize:12,textAlign:"center",marginBottom:10}}>প্রথম কমেন্ট করো! 💬</p>}
          {myComments.map(c=>(
            <div key={c.id} style={{display:"flex",gap:8,marginBottom:10}}>

              <div style={{flex:1}}>
                <div style={{background:"#0a0a14",borderRadius:12,padding:"8px 11px",border:"1px solid #1a1a2e"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                    <span style={{color:"#a78bfa",fontSize:12,fontWeight:700}}>{c.username}</span>
                    {c.is_reg&&<RegBadge/>}{c.verified&&<VBadge/>}
                    <span style={{color:"#2a2a45",fontSize:10}}>{timeAgo(c.created_at)}</span>
                  </div>
                  {c.reply_to&&<div style={{color:"#334155",fontSize:11,marginBottom:3}}>↩ @{c.reply_to}</div>}
                  <p style={{color:"#94a3b8",fontSize:13,margin:0}}>{c.content}</p>
                </div>
                <button onClick={()=>setReplyTo(c.username)} style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:11,marginTop:3,marginLeft:4}}>↩ রিপ্লাই</button>
              </div>

          <div style={{display:"flex",gap:7,marginTop:4}}>
            <Av username={me.username} color={me.color} size={28} verified={me.verified||false} isReg={me.type==="registered"}/>
            <input value={cText} onChange={e=>setCText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitC()} placeholder="কমেন্ট লিখুন..." style={{flex:1,background:"#0a0a14",border:"1px solid #1e1e35",borderRadius:18,padding:"8px 12px",color:"#e2e8f0",fontSize:13,outline:"none"}}/>
            <button onClick={submitC} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:18,padding:"0 13px",color:"#fff",cursor:"pointer",fontSize:14}}>→</button>
          </div>
        </div>
      )}
    </div>
  );
}
// ── Compose ────────────────────────────────────────────────────────────────────
function Compose({me,onPost,onClose}){
  const [text,setText]=useState("");
  const [tag,setTag]=useState(TAGS[0]);
  const [mood,setMood]=useState("");
  const [postAs,setPostAs]=useState("identified");
  const [showPoll,setShowPoll]=useState(false);
  const [pollQ,setPollQ]=useState("");
  const [pollOpts,setPollOpts]=useState(["",""]);
  const [imgFile,setImgFile]=useState(null);
  const [imgPreview,setImgPreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const fileRef=useRef();

  const handleImg=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>5*1024*1024){alert("ছবি ৫MB এর বেশি হওয়া যাবে না!");return;}
    setImgFile(f);
    const r=new FileReader();r.onload=ev=>setImgPreview(ev.target.result);r.readAsDataURL(f);
  };

  const submit=async()=>{
    if(!text.trim()&&!imgFile)return;
    setLoading(true);
    const isAnon=me.type==="guest"||(me.type==="registered"&&postAs==="anon");
    let image_url=null;

    // Upload image
    if(imgFile){
      const fname=`${genId()}.${imgFile.name.split('.').pop()}`;
      const{data,error}=await sb.storage.from("post-images").upload(fname,imgFile);
      if(!error){
        const{data:urlData}=sb.storage.from("post-images").getPublicUrl(fname);
        image_url=urlData.publicUrl;
      }
    }

    const poll=showPoll&&pollQ.trim()&&pollOpts.filter(o=>o.trim()).length>=2?{question:pollQ,options:pollOpts.filter(o=>o.trim()).map(o=>({text:o,votes:[]})),voted:[]}:null;

    await onPost({
      author_id:isAnon?"anon_"+genId():me.id,
      username:isAnon?genUser():me.username,
      is_reg:!isAnon&&me.type==="registered",
      verified:!isAnon&&(me.verified||false),
      color:isAnon?genColor():me.color,
      content:text,tag,mood,image_url,poll,
      likes:[],reactions:{},shares:0,views:1,bookmarks:[],pinned:false,edited:false
    });
    setLoading(false);onClose();
  };

  const inp={width:"100%",background:"#080810",border:"1px solid #1e1e35",borderRadius:12,padding:"10px 13px",color:"#e2e8f0",fontSize:13,outline:"none",marginBottom:8};
  return(
    <Modal title="✏️ নতুন পোস্ট" onClose={onClose}>
      {me.type==="registered"&&(
        <div style={{display:"flex",gap:6,marginBottom:12,background:"#080810",borderRadius:12,padding:4}}>
          {[["identified","🆅 নিজের নামে"],["anon","🎭 বেনামে"]].map(([v,l])=>(
            <button key={v} onClick={()=>setPostAs(v)} style={{flex:1,background:postAs===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:10,padding:"8px",color:postAs===v?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:12}}>{l}</button>
          ))}
        </div>
      )}
      <textarea value={text} onChange={e=>setText(e.target.value.slice(0,500))} placeholder="মনের কথা লিখো... 🎭" rows={4} style={{...inp,resize:"none",lineHeight:1.65,borderRadius:14,padding:12,marginBottom:10}}/>
      {imgPreview&&(
        <div style={{position:"relative",marginBottom:10,borderRadius:12,overflow:"hidden",border:"1px solid #1e1e35"}}>
          <img src={imgPreview} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
          <button onClick={()=>{setImgFile(null);setImgPreview(null);}} style={{position:"absolute",top:6,right:6,background:"#000a",border:"none",color:"#fff",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
      )}
      <div style={{display:"flex",gap:7,marginBottom:10}}>
        <button onClick={()=>fileRef.current.click()} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:12,padding:"7px 12px",color:"#64748b",cursor:"pointer",fontSize:13}}>📷 ছবি</button>
        <button onClick={()=>setShowPoll(!showPoll)} style={{background:showPoll?"#7c3aed33":"#1a1a2e",border:`1px solid ${showPoll?"#7c3aed":"#2a2a40"}`,borderRadius:12,padding:"7px 12px",color:showPoll?"#a855f7":"#64748b",cursor:"pointer",fontSize:13}}>📊 পোল</button>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
      </div>
      {showPoll&&(
        <div style={{background:"#080810",borderRadius:14,padding:12,border:"1px solid #1e1e35",marginBottom:10}}>
          <input value={pollQ} onChange={e=>setPollQ(e.target.value)} placeholder="প্রশ্ন লিখুন..." style={inp}/>
          {pollOpts.map((o,i)=>(<input key={i} value={o} onChange={e=>{const n=[...pollOpts];n[i]=e.target.value;setPollOpts(n);}} placeholder={`বিকল্প ${i+1}`} style={inp}/>))}
          {pollOpts.length<4&&<button onClick={()=>setPollOpts([...pollOpts,""])} style={{background:"none",border:"none",color:"#7c3aed",cursor:"pointer",fontSize:12}}>+ আরো</button>}
        </div>
      )}
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
        {MOODS.map(m=>(<button key={m} onClick={()=>setMood(mood===m?"":m)} style={{background:mood===m?"#7c3aed33":"#1a1a2e",border:`1px solid ${mood===m?"#7c3aed":"#2a2a40"}`,borderRadius:14,padding:"5px 10px",color:mood===m?"#a855f7":"#64748b",cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{m}</button>))}
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        {TAGS.map(t=>{const c=TAG_C[t];const a=tag===t;return(<button key={t} onClick={()=>setTag(t)} style={{background:a?c+"33":"#1a1a2e",border:`1px solid ${a?c:"#2a2a40"}`,borderRadius:14,padding:"5px 10px",color:a?c:"#64748b",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{t}</button>);})}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:500-text.length<50?"#ef4444":"#334155",fontSize:12}}>{500-text.length} বাকি</span>
        <button onClick={submit} disabled={loading||(!text.trim()&&!imgFile)} style={{background:(!loading&&(text.trim()||imgFile))?"linear-gradient(135deg,#7c3aed,#3b82f6)":"#1a1a2e",border:"none",borderRadius:16,padding:"11px 24px",color:(!loading&&(text.trim()||imgFile))?"#fff":"#334155",cursor:(!loading&&(text.trim()||imgFile))?"pointer":"default",fontWeight:700,fontSize:14}}>
          {loading?"আপলোড হচ্ছে...":"পোস্ট করো 🚀"}
        </button>
      </div>
    </Modal>
  );
}
// ── Inbox (Full Screen) ────────────────────────────────────────────────────────
function Inbox({me,onClose}){
  const [threads,setThreads]=useState([]);
  const [selected,setSelected]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [text,setText]=useState("");
  const [users,setUsers]=useState({});
  const msgEndRef=useRef();

  useEffect(()=>{
    loadThreads();
    const interval=setInterval(()=>{if(selected)loadMsgs(selected);else loadThreads();},8000);
    return()=>clearInterval(interval);
  },[selected]);

  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const loadThreads=async()=>{
    const{data}=await sb.from("messages").select("*").or(`from_id.eq.${me.id},to_id.eq.${me.id}`).order("created_at",{ascending:false});
    if(!data)return;
    const threadIds=[...new Set(data.map(m=>m.from_id===me.id?m.to_id:m.from_id))];
    setThreads(threadIds.map(tid=>({tid,last:data.find(m=>m.from_id===tid||m.to_id===tid),unread:data.filter(m=>m.from_id===tid&&m.to_id===me.id&&!m.read).length})));
    // load user info
    if(threadIds.length>0){
      const{data:ud}=await sb.from("users").select("id,username,color,verified").in("id",threadIds);
      if(ud){const um={};ud.forEach(u=>um[u.id]=u);setUsers(um);}
    }
  };

  const loadMsgs=async(tid)=>{
    const{data}=await sb.from("messages").select("*").or(`and(from_id.eq.${me.id},to_id.eq.${tid}),and(from_id.eq.${tid},to_id.eq.${me.id})`).order("created_at");
    if(data)setMsgs(data);
  };

  const selectThread=async(tid)=>{setSelected(tid);await loadMsgs(tid);};

  const send=async()=>{
    if(!text.trim()||!selected)return;
    const{data}=await sb.from("messages").insert({from_id:me.id,from_name:me.username,to_id:selected,content:text,read:false}).select().single();
    if(data)setMsgs(m=>[...m,data]);
    setText("");
  };

  const selUser=selected?users[selected]:null;

  return(
    <div style={{position:"fixed",inset:0,background:"#080810",zIndex:700,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"rgba(8,8,16,.97)",borderBottom:"1px solid #1a1a2e",padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={selected?()=>setSelected(null):onClose} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        {selUser?(
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <Av username={selUser.username} color={selUser.color} size={32} verified={selUser.verified||false} isReg={true}/>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{selUser.username}</span><RegBadge/>{selUser.verified&&<VBadge/>}</div>
          </div>
        ):(
          <span style={{color:"#c4b5fd",fontWeight:800,fontSize:17,flex:1}}>📬 ইনবক্স</span>
        )}
        {!selected&&<button onClick={onClose} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {!selected?(
          threads.length===0?<div style={{textAlign:"center",padding:"60px 0",color:"#334155"}}><div style={{fontSize:44,marginBottom:10}}>💌</div><p>কোনো মেসেজ নেই</p></div>
          :threads.map(({tid,last,unread})=>{
            const u=users[tid];
            return(
              <div key={tid} onClick={()=>selectThread(tid)} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,cursor:"pointer",background:unread>0?"#7c3aed11":"#0f0f1e",border:`1px solid ${unread>0?"#7c3aed33":"#1e1e35"}`,marginBottom:10,alignItems:"center"}}>
                {u?<Av username={u.username} color={u.color} size={46} verified={u.verified||false} isReg={true}/>:<div style={{width:46,height:46,borderRadius:"50%",background:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🎭</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#c4b5fd",fontWeight:unread>0?700:500,fontSize:15}}>{u?u.username:"অজানা"}</span>{u?.verified&&<VBadge/>}</div>
                  <div style={{color:"#475569",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{last?.content}</div>
                </div>
                {unread>0&&<div style={{background:"#7c3aed",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unread}</div>}
              </div>
            );
          })
        ):(
          <div>
            {msgs.length===0&&<p style={{color:"#334155",textAlign:"center",padding:"40px 0"}}>কথা শুরু করো! 👋</p>}
            {msgs.map(m=>(
              <div key={m.id} style={{display:"flex",justifyContent:m.from_id===me.id?"flex-end":"flex-start",marginBottom:12}}>
                <div style={{background:m.from_id===me.id?"linear-gradient(135deg,#7c3aed,#3b82f6)":"#1a1a2e",borderRadius:m.from_id===me.id?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",maxWidth:"78%",border:m.from_id===me.id?"none":"1px solid #2a2a40"}}>
                  {m.from_id!==me.id&&<div style={{color:"#a78bfa",fontSize:11,marginBottom:4}}>{m.from_name}</div>}
                  <p style={{color:"#e2e8f0",fontSize:14,margin:0,lineHeight:1.5,wordBreak:"break-word"}}>{m.content}</p>
                  <div style={{color:m.from_id===me.id?"#ffffff55":"#334155",fontSize:10,marginTop:4,textAlign:"right"}}>{timeAgo(m.created_at)}</div>
                </div>
              </div>
            ))}
            <div ref={msgEndRef}/>
          </div>
        )}
      </div>
      {selected&&(
        <div style={{borderTop:"1px solid #1a1a2e",padding:"10px 12px",background:"rgba(8,8,16,.97)",flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="মেসেজ লিখুন..." style={{flex:1,background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:22,padding:"11px 16px",color:"#eee",fontSize:14,outline:"none"}}/>
            <button onClick={send} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",width:46,height:46,color:"#fff",cursor:"pointer",fontSize:18,flexShrink:0}}>→</button>
          </div>
        </div>
      )}
    </div>
  );
}
// ── Chat Rooms (Full Screen) ───────────────────────────────────────────────────
function ChatRooms({me,onClose}){

  const [activeRoom,setActiveRoom]=useState(null);
  const [roomMsgs,setRoomMsgs]=useState([]);

  useEffect(()=>{
    loadRooms();
    const interval=setInterval(()=>{if(activeRoom)loadRoomMsgs(activeRoom.id);else loadRooms();},8000);
    return()=>clearInterval(interval);
  },[activeRoom]);
  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:"smooth"});},[roomMsgs]);

  const loadRooms=async()=>{const{data}=await sb.from("rooms").select("*").order("created_at",{ascending:false});if(data)setRooms(data);};
  const loadRoomMsgs=async(rid)=>{const{data}=await sb.from("room_messages").select("*").eq("room_id",rid).order("created_at");if(data)setRoomMsgs(data);};
  const selectRoom=async(r)=>{setActiveRoom(r);await loadRoomMsgs(r.id);};

  const send=async()=>{
    if(!msgText.trim()||!activeRoom)return;
    const{data}=await sb.from("room_messages").insert({room_id:activeRoom.id,user_id:me.id,username:me.username,is_reg:me.type==="registered",verified:me.verified||false,color:me.color,content:msgText}).select().single();
    if(data)setRoomMsgs(m=>[...m,data]);
    setMsgText("");
  };

  const createRoom=async()=>{
    if(!canCreate||!roomName.trim())return;
    const{data}=await sb.from("rooms").insert({name:roomName,owner_id:me.id,owner_name:me.username}).select().single();
    if(data){setRooms(r=>[data,...r]);setRoomName("");setCreating(false);}
  };

  const deleteRoom=async(id)=>{await sb.from("rooms").delete().eq("id",id);setRooms(r=>r.filter(rm=>rm.id!==id));};

  return(
    <div style={{position:"fixed",inset:0,background:"#080810",zIndex:700,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"rgba(8,8,16,.97)",borderBottom:"1px solid #1a1a2e",padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={activeRoom?()=>setActiveRoom(null):onClose} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:800,fontSize:17,flex:1}}>{activeRoom?activeRoom.name:"💬 চ্যাট রুম"}</span>
        {!activeRoom&&<button onClick={onClose} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {!activeRoom?(
          <div>
            {canCreate?(
              <button onClick={()=>setCreating(!creating)} style={{width:"100%",background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:14,padding:"12px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginBottom:12}}>✅ নতুন রুম তৈরি করো</button>
            ):(
              <div style={{background:"#10b98111",border:"1px solid #10b98133",borderRadius:14,padding:"14px",marginBottom:12,textAlign:"center"}}>

                <p style={{color:"#475569",fontSize:11,marginTop:4}}>তুমি যেকোনো রুমে যোগ দিয়ে চ্যাট করতে পারবে</p>
              </div>

function ProfilePage({userId,me,onBack,onFollow,onMsgUser,onLogout,...cardProps}){
  const [user,setUser]=useState(null);
  const [posts,setPosts]=useState([]);
  const [comments,setComments]=useState([]);
  const [editingBio,setEditingBio]=useState(false);
  const [bioText,setBioText]=useState("");

  useEffect(()=>{loadProfile();},[userId]);

  const loadProfile=async()=>{
    const{data:u}=await sb.from("users").select("*").eq("id",userId).single();
    if(u){setUser(u);setBioText(u.bio||"");}
    const{data:p}=await sb.from("posts").select("*").eq("author_id",userId).order("created_at",{ascending:false});
    if(p)setPosts(p);
    if(p&&p.length>0){
      const ids=p.map(x=>x.id);
      const{data:c}=await sb.from("comments").select("*").in("post_id",ids).order("created_at");
      if(c)setComments(c);
    }
  };

  const saveBio=async()=>{
    await sb.from("users").update({bio:bioText}).eq("id",me.id);
    setUser(u=>({...u,bio:bioText}));
    setEditingBio(false);
  };

  const copyLink=()=>{navigator.clipboard?.writeText(`${window.location.origin}?profile=${userId}`).catch(()=>{});};
  const isOwn=me.id===userId;
  const isFollowing=(me.following||[]).includes(userId);
  const totalLikes=posts.reduce((a,p)=>a+(p.likes||[]).length,0);

  if(!user)return <div style={{minHeight:"100vh",background:"#080810"}}><Spinner/></div>;

  return(
    <div style={{paddingBottom:80,minHeight:"100vh",background:"#080810"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 12px 0",position:"sticky",top:0,background:"rgba(8,8,16,.97)",zIndex:50}}>
        <button onClick={onBack} style={{background:"#1a1a2e",border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:700,fontSize:16}}>প্রোফাইল</span>
      </div>
      <div style={{background:"linear-gradient(160deg,#0f0f1f,#0c0c18)",border:"1px solid #1e1e35",borderRadius:20,padding:"24px 14px",textAlign:"center",margin:"10px 10px 14px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
          <Av username={user.username} color={user.color} size={76} verified={user.verified||false} isReg={true}/>
        </div>
        <h2 style={{color:"#c4b5fd",fontSize:19,fontWeight:800}}>{user.username}<RegBadge/>{user.verified&&<VBadge/>}</h2>
        <p style={{color:"#334155",fontSize:11,marginTop:4}}>{timeAgo(user.created_at)} আগে যোগ দিয়েছে</p>

        {isOwn?(
          <div style={{marginTop:8,maxWidth:300,margin:"8px auto 4px"}}>
            {editingBio?(
              <div>
                <textarea value={bioText} onChange={e=>setBioText(e.target.value.slice(0,150))} rows={2} style={{width:"100%",background:"#080810",border:"1px solid #7c3aed",borderRadius:12,padding:"9px 12px",color:"#e2e8f0",fontSize:13,outline:"none",resize:"none",lineHeight:1.5}}/>
                <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:5}}>
                  <button onClick={()=>{setEditingBio(false);setBioText(user.bio||"");}} style={{background:"#1a1a2e",border:"none",borderRadius:10,padding:"6px 12px",color:"#64748b",cursor:"pointer",fontSize:12}}>বাতিল</button>
                  <button onClick={saveBio} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:10,padding:"6px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>সেভ</button>
                </div>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6}}>
                <p style={{color:"#64748b",fontSize:13}}>{user.bio||"বায়ো যোগ করোনি..."}</p>
                <button onClick={()=>setEditingBio(true)} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:8,padding:"3px 8px",color:"#475569",cursor:"pointer",fontSize:11}}>✏️</button>
              </div>
            )}
          </div>
        ):(user.bio&&<p style={{color:"#64748b",fontSize:13,marginTop:6}}>{user.bio}</p>)}

        <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:"#0a0a14",borderRadius:14,overflow:"hidden",border:"1px solid #1e1e35"}}>
          {[["পোস্ট",posts.length,"#a855f7"],["লাইক",totalLikes,"#ec4899"],["ফলোয়ার",(user.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
            <div key={l} style={{flex:1,padding:"12px 4px",textAlign:"center",borderRight:i<arr.length-1?"1px solid #1e1e35":"none"}}>
              <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#475569"}}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={copyLink} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:14,padding:"9px 14px",color:"#64748b",cursor:"pointer",fontWeight:600,fontSize:12}}>🔗 আইডি লিংক</button>
          {!isOwn&&me.type==="registered"&&(
            <>
              <button onClick={()=>onFollow(user.id)} style={{background:isFollowing?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:isFollowing?"1px solid #2a2a40":"none",borderRadius:14,padding:"9px 18px",color:isFollowing?"#64748b":"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>

              </button>
              <button onClick={()=>onMsgUser({author_id:user.id,username:user.username})} style={{background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:14,padding:"9px 14px",color:"#a855f7",cursor:"pointer",fontWeight:600,fontSize:13}}>💌 মেসেজ</button>
            </>
          )}
          {isOwn&&<button onClick={onLogout} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:14,padding:"9px 18px",color:"#64748b",cursor:"pointer",fontWeight:600,fontSize:13}}>লগআউট</button>}
        </div>
      </div>
      <div style={{padding:"0 10px"}}>
        {posts.length===0?<p style={{textAlign:"center",color:"#334155",padding:36}}>কোনো পোস্ট নেই</p>
          :posts.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} onFollow={onFollow} onMsgUser={onMsgUser} {...cardProps}/>)
        }
      </div>
    </div>
  );
}
// ── Main App ───────────────────────────────────────────────────────────────────
function App(){
  const [authUser,setAuthUser]=useState(null); // supabase auth user
  const [profile,setProfile]=useState(null);   // users table profile
  const [guest]=useState(()=>({type:"guest",username:genUser(),id:"guest_"+genId(),color:genColor(),following:[],verified:false}));
  const me=profile?{...profile,type:"registered"}:guest;

  const [posts,setPosts]=useState([]);
  const [comments,setComments]=useState([]);
  const [tab,setTab]=useState("feed");
  const [activeTag,setActiveTag]=useState("সব");
  const [sort,setSort]=useState("new");
  const [compose,setCompose]=useState(false);
  const [showAuth,setShowAuth]=useState(false);
  const [showInbox,setShowInbox]=useState(false);
  const [showRooms,setShowRooms]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [showUserSearch,setShowUserSearch]=useState(false);
  const [viewProfile,setViewProfile]=useState(null);
  const [search,setSearch]=useState(false);
  const [q,setQ]=useState("");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [unreadNotifs,setUnreadNotifs]=useState(0);
  const [unreadMsgs,setUnreadMsgs]=useState(0);

  const msg=(m,type="info")=>setToast({m,type});

  // Auth check on load
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        setAuthUser(session.user);
        loadProfile(session.user.id);
      } else setLoading(false);
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if(session){setAuthUser(session.user);loadProfile(session.user.id);}
      else{setAuthUser(null);setProfile(null);}
    });
  },[]);

  const loadProfile=async(uid)=>{
    const{data}=await sb.from("users").select("*").eq("id",uid).single();
    if(data)setProfile(data);
    setLoading(false);
  };

  // Load posts
  useEffect(()=>{loadPosts();},[activeTag,sort]);
  useEffect(()=>{
    if(profile){loadUnread();}
    const interval=setInterval(()=>{loadPosts();if(profile)loadUnread();},15000);
    return()=>clearInterval(interval);
  },[profile]);

  const loadPosts=async()=>{
    let query=sb.from("posts").select("*");
    if(activeTag!=="সব")query=query.eq("tag",activeTag);
    if(sort==="top")query=query.order("likes",{ascending:false});
    else query=query.order("created_at",{ascending:false});
    query=query.limit(50);
    const{data}=await query;
    if(data){
      setPosts(data);
      // load comments
      const ids=data.map(p=>p.id);
      if(ids.length>0){
        const{data:c}=await sb.from("comments").select("*").in("post_id",ids).order("created_at");
        if(c)setComments(c);
      }
    }
  };

  const loadUnread=async()=>{
    if(!profile)return;
    const{count:nc}=await sb.from("notifications").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false);
    const{count:mc}=await sb.from("messages").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false);
    setUnreadNotifs(nc||0);setUnreadMsgs(mc||0);
  };

  const handleLogout=async()=>{await sb.auth.signOut();setProfile(null);setAuthUser(null);msg("👋 লগআউট হয়েছে");};

  const addPost=async(postData)=>{
    const{data,error}=await sb.from("posts").insert(postData).select().single();
    if(error){msg("পোস্ট করতে সমস্যা হয়েছে!","error");return;}
    if(data)setPosts(p=>[data,...p]);
    msg("✅ পোস্ট শেয়ার হয়েছে!","success");
  };

  const onLike=async(id,liked)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const newLikes=liked?(post.likes||[]).filter(u=>u!==me.id):[...(post.likes||[]),me.id];
    await sb.from("posts").update({likes:newLikes}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,likes:newLikes}));
    if(!liked&&post.author_id!==me.id){
      await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"like",content:"তোমার পোস্টে লাইক দিয়েছে ❤️",read:false});
    }
  };

  const onReact=async(id,r)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const reacts={...post.reactions||{}};
    if(!reacts[r])reacts[r]=[];
    reacts[r]=reacts[r].includes(me.id)?reacts[r].filter(u=>u!==me.id):[...reacts[r],me.id];
    await sb.from("posts").update({reactions:reacts}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,reactions:reacts}));
  };

  const onComment=async(pid,commentData)=>{
    const{data}=await sb.from("comments").insert(commentData).select().single();
    if(data){
      setComments(c=>[...c,data]);
      const post=posts.find(p=>p.id===pid);
      if(post&&post.author_id!==me.id){
        await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"comment",content:"তোমার পোস্টে কমেন্ট করেছে 💬",read:false});
      }
    }
  };

  const onShare=async(id)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    await sb.from("posts").update({shares:(post.shares||0)+1}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,shares:(x.shares||0)+1}));
    if(navigator.share){navigator.share({title:"AnonLogos",url:`${window.location.origin}?post=${id}`}).catch(()=>{});}
    msg("🔁 শেয়ার হয়েছে!");
  };

  const onCopy=id=>{navigator.clipboard?.writeText(`${window.location.origin}?post=${id}`).catch(()=>{});msg("🔗 লিংক কপি হয়েছে!");};

  const onBookmark=async(id,saved)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const newB=saved?(post.bookmarks||[]).filter(u=>u!==me.id):[...(post.bookmarks||[]),me.id];
    await sb.from("posts").update({bookmarks:newB}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,bookmarks:newB}));
  };

  const onVote=async(id,i)=>{
    const post=posts.find(p=>p.id===id);if(!post||!post.poll)return;
    if((post.poll.voted||[]).includes(me.id))return;
    const poll={...post.poll,options:post.poll.options.map((o,j)=>j===i?{...o,votes:[...(o.votes||[]),me.id]}:o),voted:[...(post.poll.voted||[]),me.id]};
    await sb.from("posts").update({poll}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,poll}));
  };

  const onEdit=async(id,content)=>{
    await sb.from("posts").update({content,edited:true}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,content,edited:true}));
  };

  const onDelete=async(id)=>{
    await sb.from("posts").delete().eq("id",id);
    setPosts(p=>p.filter(x=>x.id!==id));
    msg("🗑️ ডিলিট হয়েছে!","success");
  };

  const onPin=async(id,pinned)=>{
    if(me.type!=="registered"||!me.verified){msg("📌 পিন করতে ✅ ভেরিফিকেশন লাগবে!","error");return;}
    await sb.from("posts").update({pinned}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,pinned}));
  };

  const onFollow=async(uid)=>{
    if(me.type!=="registered"){msg("🎭 ফলো করতে রেজিস্ট্রেশন করো!","error");setTimeout(()=>setShowAuth(true),600);return;}
    const isF=(me.following||[]).includes(uid);
    const newFollowing=isF?(me.following||[]).filter(i=>i!==uid):[...(me.following||[]),uid];
    await sb.from("users").update({following:newFollowing}).eq("id",me.id);
    setProfile(p=>({...p,following:newFollowing}));
    // update target followers
    const{data:target}=await sb.from("users").select("followers").eq("id",uid).single();
    if(target){
      const newFollowers=isF?(target.followers||[]).filter(i=>i!==me.id):[...(target.followers||[]),me.id];
      await sb.from("users").update({followers:newFollowers}).eq("id",uid);
    }
    if(!isF){await sb.from("notifications").insert({to_id:uid,from_username:me.username,type:"follow",content:"তোমাকে ফলো করেছে 👤",read:false});}
    msg(isF?"আনফলো করা হয়েছে":"✅ ফলো করা হয়েছে!","success");
  };

  const onMsgUser=async(p)=>{
    if(me.type!=="registered"){msg("💌 মেসেজ করতে রেজিস্ট্রেশন করো!","error");setShowAuth(true);return;}
    if(p.author_id===me.id){msg("নিজেকে মেসেজ করা যাবে না 😄");return;}
    await sb.from("messages").insert({from_id:me.id,from_name:me.username,to_id:p.author_id,content:"👋 হ্যালো!",read:false});
    setShowInbox(true);msg("💌 মেসেজ পাঠানো হয়েছে!","success");
  };

  const feed=posts
    .filter(p=>!q||p.content?.includes(q))
    .sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return sort==="new"?new Date(b.created_at)-new Date(a.created_at):(b.likes||[]).length-(a.likes||[]).length;});

  const mine=posts.filter(p=>p.author_id===me.id);
  const saved=posts.filter(p=>(p.bookmarks||[]).includes(me.id));

  const cardProps={onLike,onReact,onComment,onShare,onCopy,onBookmark,onVote,onEdit,onDelete,onPin,onMsgUser,onViewProfile:setViewProfile,onFollow,onAuthRequired:()=>{msg("🎭 এই ফিচারের জন্য রেজিস্ট্রেশন করো!","error");setShowAuth(true);}};
  const TABS=[{id:"feed",ic:"🌐",lb:"ফিড"},{id:"trending",ic:"🔥",lb:"ট্রেন্ড"},{id:"saved",ic:"🔖",lb:"সেভড"},{id:"profile",ic:"👤",lb:"আমি"}];

  if(loading)return <div style={{minHeight:"100vh",background:"#080810",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🎭</div><div style={{fontWeight:900,fontSize:24,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AnonLogos</div><div style={{width:36,height:36,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"16px auto 0"}}/></div></div>;

  if(viewProfile)return(
    <ProfilePage userId={viewProfile} me={me} onBack={()=>setViewProfile(null)} onFollow={onFollow} onMsgUser={onMsgUser} onLogout={handleLogout} {...cardProps}>
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
    </ProfilePage>
  );

  return(
    <div style={{minHeight:"100vh",background:"#080810",position:"relative"}}>
      {/* Topbar */}
      <div style={{background:"rgba(8,8,16,.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid #1a1a2e",padding:"0 12px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        {search
          ?<input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="পোস্ট খোঁজো..." style={{flex:1,background:"#1a1a2e",border:"none",borderRadius:20,padding:"8px 14px",color:"#eee",fontSize:14,outline:"none"}}/>
          :<span style={{fontWeight:900,fontSize:21,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.5px"}}>AnonLogos</span>
        }
        <div style={{display:"flex",gap:6,marginLeft:8,alignItems:"center"}}>
          <button onClick={()=>{setSearch(!search);setQ("");}} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>{search?"✕":"🔍"}</button>
          <button onClick={()=>setShowUserSearch(true)} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>👥</button>
          <button onClick={()=>setShowRooms(true)} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>💬</button>
          {profile&&(
            <>
              <div style={{position:"relative"}}>
                <button onClick={()=>{setShowNotif(true);setUnreadNotifs(0);}} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>🔔</button>
                {unreadNotifs>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#ef4444",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadNotifs}</div>}
              </div>
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowInbox(true)} style={{background:"#1a1a2e",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>💌</button>
                {unreadMsgs>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#7c3aed",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadMsgs}</div>}
              </div>
            </>
          )}
          {profile
            ?<button onClick={()=>setViewProfile(profile.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av username={me.username} color={me.color} size={34} verified={me.verified||false} isReg={true}/></button>
            :<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:18,padding:"7px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>লগইন</button>
          }
        </div>
      </div>

      {/* Guest banner */}
      {!profile&&(
        <div style={{background:"linear-gradient(135deg,#7c3aed22,#3b82f622)",borderBottom:"1px solid #7c3aed33",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#a78bfa",fontSize:13,fontWeight:600}}>🎭 গেস্ট মোডে আছো</div>
            <div style={{color:"#475569",fontSize:11}}>রেজিস্ট্রেশন করলে পাবে ফলো, মেসেজ ও আরো!</div>
          </div>
          <button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"8px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>রেজিস্টার</button>
        </div>
      )}

      {/* Tag + Sort */}
      {tab==="feed"&&(
        <div style={{background:"#0a0a14",borderBottom:"1px solid #1a1a2e"}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",padding:"8px 10px 5px"}}>
            {["সব",...TAGS].map(t=>{const c=TAG_C[t]||"#7c3aed";const a=activeTag===t;return(<button key={t} onClick={()=>setActiveTag(t)} style={{background:a?(t==="সব"?"linear-gradient(135deg,#7c3aed,#3b82f6)":c+"33"):"#1a1a2e",border:`1px solid ${a?(t==="সব"?"#7c3aed":c):"#2a2a40"}`,borderRadius:16,padding:"5px 11px",color:a?(t==="সব"?"#fff":c):"#64748b",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{t}</button>);})}
          </div>
          <div style={{display:"flex",gap:6,padding:"0 10px 7px"}}>
            {[["new","🕐 নতুন"],["top","🔥 জনপ্রিয়"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSort(v)} style={{background:sort===v?"#7c3aed22":"transparent",border:`1px solid ${sort===v?"#7c3aed":"transparent"}`,borderRadius:10,padding:"3px 9px",color:sort===v?"#a855f7":"#475569",cursor:"pointer",fontSize:11,fontWeight:sort===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>
      )}
      {/* Content */}
      <div style={{padding:"10px 10px 80px"}}>
        {tab==="feed"&&(
          posts.length===0&&!loading
            ?<div style={{textAlign:"center",padding:"60px 0",color:"#334155"}}><div style={{fontSize:44,marginBottom:10}}>🎭</div>কোনো পোস্ট নেই। প্রথমে পোস্ট করো!</div>
            :feed.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)
        )}
        {tab==="trending"&&[...posts].sort((a,b)=>(b.likes||[]).length-(a.likes||[]).length).map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)}
        {tab==="saved"&&(saved.length===0?<div style={{textAlign:"center",padding:"60px 0",color:"#334155"}}><div style={{fontSize:44,marginBottom:10}}>🔖</div>সেভড পোস্ট নেই</div>:saved.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>))}
        {tab==="profile"&&(
          <div>
            <div style={{background:"linear-gradient(160deg,#0f0f1f,#0c0c18)",border:"1px solid #1e1e35",borderRadius:20,padding:"24px 14px",textAlign:"center",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
                <Av username={me.username} color={me.color} size={72} verified={me.verified||false} isReg={me.type==="registered"}/>
              </div>
              <h2 style={{color:"#c4b5fd",fontSize:18,fontWeight:800}}>{me.username}{me.type==="registered"&&<RegBadge/>}{me.verified&&<VBadge/>}</h2>
              <p style={{color:"#334155",fontSize:11,marginTop:4}}>#{me.id?.slice(0,8)} · {me.type==="registered"?"রেজিস্টার্ড":"গেস্ট"}</p>
              {me.type==="registered"&&<button onClick={()=>{navigator.clipboard?.writeText(`${window.location.origin}?profile=${me.id}`).catch(()=>{});msg("🔗 প্রোফাইল লিংক কপি!","success");}} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:12,padding:"7px 14px",color:"#64748b",cursor:"pointer",fontSize:12,marginTop:8}}>🔗 আমার প্রোফাইল লিংক</button>}
              {me.type!=="registered"
                ?<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"10px 24px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginTop:14}}>🆅 রেজিস্ট্রেশন করো</button>
                :(
                  <div>
                    <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:"#0a0a14",borderRadius:14,overflow:"hidden",border:"1px solid #1e1e35"}}>
                      {[["পোস্ট",mine.length,"#a855f7"],["লাইক",mine.reduce((a,p)=>a+(p.likes||[]).length,0),"#ec4899"],["সেভড",saved.length,"#f59e0b"],["ফলোয়ার",(me.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
                        <div key={l} style={{flex:1,padding:"11px 2px",textAlign:"center",borderRight:i<arr.length-1?"1px solid #1e1e35":"none"}}>
                          <div style={{fontSize:17,fontWeight:800,color:c}}>{v}</div>
                          <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <button onClick={handleLogout} style={{background:"#1a1a2e",border:"1px solid #2a2a40",borderRadius:14,padding:"9px 22px",color:"#64748b",cursor:"pointer",fontWeight:600,fontSize:13,marginTop:12}}>লগআউট</button>
                  </div>
                )
              }
            </div>
            {mine.length===0?<p style={{textAlign:"center",color:"#334155",padding:36}}>এখনো পোস্ট করোনি!</p>:mine.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)}
          </div>
        )}
      </div>

      {/* FAB */}
      <button onClick={()=>setCompose(true)} style={{position:"fixed",bottom:68,right:14,width:52,height:52,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 6px 24px #7c3aed66",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(8,8,16,.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #1a1a2e",display:"flex",zIndex:100,height:56}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,color:tab===t.id?"#a855f7":"#2a2a45"}}>
            <span style={{fontSize:18,filter:tab===t.id?"drop-shadow(0 0 6px #a855f7)":"none"}}>{t.ic}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?700:400}}>{t.lb}</span>
          </button>
        ))}
      </div>

      {compose&&<Compose me={me} onPost={addPost} onClose={()=>setCompose(false)}/>}
      {showAuth&&<AuthModal onSuccess={(p)=>{setProfile(p);setShowAuth(false);msg("✅ স্বাগতম "+p.username,"success");}} onClose={()=>setShowAuth(false)}/>}
      {showInbox&&profile&&<Inbox me={me} onClose={()=>setShowInbox(false)}/>}
      {showRooms&&<ChatRooms me={me} onClose={()=>setShowRooms(false)}/>}
      {showNotif&&profile&&<NotifPanel me={me} onClose={()=>setShowNotif(false)}/>}
      {showUserSearch&&<UserSearch me={me} onViewProfile={setViewProfile} onFollow={onFollow} onClose={()=>setShowUserSearch(false)}/>}
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
