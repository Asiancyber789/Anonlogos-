// ── Smart Feed Algorithm ────────────────────────────────────────────────────
// pinned ইউজারের পোস্ট মাঝে মাঝে inject করে
function buildSmartFeed(posts){
  const pinned=posts.filter(p=>p.pinned);
  const normal=posts.filter(p=>!p.pinned);
  // shuffle normal posts (random+latest mix)
  const latest=normal.slice(0,Math.ceil(normal.length*0.6));
  const older=normal.slice(Math.ceil(normal.length*0.6));
  const shuffled=[...older].sort(()=>Math.random()-.5);
  const mixed=[...latest,...shuffled];
  // inject pinned every 5 posts
  const result=[];
  let pi=0;
  mixed.forEach((p,i)=>{
    if(i>0&&i%5===0&&pi<pinned.length){result.push(pinned[pi++]);}
    result.push(p);
  });
  return result;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
function AuthModal({onSuccess,onClose,tc,t}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [username,setUsername]=useState("");
  const [pass,setPass]=useState("");
  const [bio,setBio]=useState("");

  const submit=async()=>{
    setErr("");setLoading(true);
    try{
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        const{data:profile}=await sb.from("users").select("*").eq("id",data.user.id).single();
        onSuccess(profile);
      } else {
        if(username.length<3){setErr(t("ইউজারনেম কমপক্ষে ৩ অক্ষর!","Username must be at least 3 chars!"));setLoading(false);return;}
        if(!email.includes("@")){setErr(t("সঠিক ইমেল দাও!","Enter valid email!"));setLoading(false);return;}
        if(pass.length<6){setErr(t("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!","Password must be at least 6 chars!"));setLoading(false);return;}
        const{data:ex}=await sb.from("users").select("id").eq("username",username).single();
        if(ex){setErr(t("এই ইউজারনেম আগে থেকে আছে!","Username already taken!"));setLoading(false);return;}
        const{data,error}=await sb.auth.signUp({email,password:pass});
        if(error)throw error;
        const{data:profile}=await sb.from("users").insert({id:data.user.id,username,email,bio:bio||"",color:genColor(),verified:false,admin:false,followers:[],following:[]}).select().single();
        onSuccess(profile);
      }
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  return(
    <Modal title={mode==="login"?t("🔐 লগইন","🔐 Login"):t("📝 রেজিস্ট্রেশন","📝 Register")} onClose={onClose} tc={tc}>
      <div style={{display:"flex",gap:6,marginBottom:16,background:tc.input,borderRadius:14,padding:4}}>
        {[["login",t("লগইন","Login")],["register",t("রেজিস্ট্রেশন","Register")]].map(([m,l])=>(
          <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:11,padding:"9px",color:mode===m?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:14}}>{l}</button>
        ))}
      </div>
      {mode==="register"&&<input value={username} onChange={e=>setUsername(e.target.value)} placeholder={t("ইউজারনেম","Username")} style={inp}/>}
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder={t("ইমেল","Email")} type="email" style={inp}/>
      <input value={pass} onChange={e=>setPass(e.target.value)} placeholder={t("পাসওয়ার্ড","Password")} type="password" style={inp}/>
      {mode==="register"&&<textarea value={bio} onChange={e=>setBio(e.target.value.slice(0,150))} placeholder={t("বায়ো (ঐচ্ছিক)","Bio (optional)")} rows={2} style={{...inp,resize:"none",lineHeight:1.5}}/>}
      {err&&<p style={{color:"#ef4444",fontSize:12,marginBottom:10,background:"#ef444411",padding:"8px 12px",borderRadius:10}}>⚠️ {err}</p>}
      <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"13px",color:"#fff",cursor:loading?"default":"pointer",fontWeight:700,fontSize:15}}>
        {loading?t("লোড হচ্ছে...","Loading..."):mode==="login"?t("লগইন করো 🚀","Login 🚀"):t("রেজিস্ট্রেশন করো ✨","Register ✨")}
      </button>
    </Modal>
  );
}
// ── Poll ─────────────────────────────────────────────────────────────────────
function Poll({poll,postId,myId,onVote,tc}){
  if(!poll)return null;
  const total=poll.options.reduce((a,o)=>a+(o.votes||[]).length,0);
  const voted=(poll.voted||[]).includes(myId);
  return(
    <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid ${tc.border}`,marginBottom:12}}>
      <p style={{color:"#c4b5fd",fontWeight:600,fontSize:13,marginBottom:10}}>📊 {poll.question}</p>
      {poll.options.map((o,i)=>{
        const pct=total?~~((o.votes||[]).length/total*100):0;
        const mine=(o.votes||[]).includes(myId);
        return(
          <div key={i} onClick={()=>!voted&&onVote(postId,i)} style={{marginBottom:8,cursor:voted?"default":"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{color:mine?"#a855f7":tc.subText,fontSize:12,fontWeight:mine?700:400}}>{mine?"✓ ":""}{o.text}</span>
              {voted&&<span style={{color:"#475569",fontSize:11}}>{pct}%</span>}
            </div>
            <div style={{height:6,background:"#1e1e35",borderRadius:3,overflow:"hidden"}}>
              {voted&&<div style={{height:"100%",width:pct+"%",background:mine?"linear-gradient(90deg,#7c3aed,#3b82f6)":"#2a2a40",borderRadius:3,transition:"width .5s"}}/>}
            </div>
          </div>
        );
      })}
      <p style={{color:"#334155",fontSize:11,marginTop:6}}>{total} {voted?"ভোট":"ভোট · ক্লিক করো"}</p>
    </div>
  );
}

                  </div>

// ── Compose ───────────────────────────────────────────────────────────────────
function Compose({me,onPost,onClose,tc,t}){
  const [text,setText]=useState("");
  const [tag,setTag]=useState(TAGS[0]);
  const [mood,setMood]=useState("");
  const [postAs,setPostAs]=useState("identified");
  const [showPoll,setShowPoll]=useState(false);
  const [pollQ,setPollQ]=useState("");
  const [pollOpts,setPollOpts]=useState(["",""]);
  const [imgFile,setImgFile]=useState(null);
  const [imgPrev,setImgPrev]=useState(null);
  const [loading,setLoading]=useState(false);
  const fileRef=useRef();

  const handleImg=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>5*1024*1024){alert(t("ছবি ৫MB এর বেশি হওয়া যাবে না!","Image must be under 5MB!"));return;}
    setImgFile(f);const r=new FileReader();r.onload=ev=>setImgPrev(ev.target.result);r.readAsDataURL(f);
  };

  const submit=async()=>{
    if(!text.trim()&&!imgFile)return;
    setLoading(true);
    const isAnon=me.type==="guest"||(me.type==="registered"&&postAs==="anon");
    let image_url=null;
    if(imgFile){
      const fname=`${genId()}.${imgFile.name.split('.').pop()}`;
      const{data,error}=await sb.storage.from("post-images").upload(fname,imgFile);
      if(!error){const{data:u}=sb.storage.from("post-images").getPublicUrl(fname);image_url=u.publicUrl;}
    }
    const poll=showPoll&&pollQ.trim()&&pollOpts.filter(o=>o.trim()).length>=2?{question:pollQ,options:pollOpts.filter(o=>o.trim()).map(o=>({text:o,votes:[]})),voted:[]}:null;
    await onPost({author_id:isAnon?"anon_"+genId():me.id,username:isAnon?genUser():me.username,is_reg:!isAnon&&me.type==="registered",verified:!isAnon&&(me.verified||false),color:isAnon?genColor():me.color,content:text,tag,mood,image_url,poll,likes:[],reactions:{},shares:0,views:1,bookmarks:[],pinned:false,edited:false});
    setLoading(false);onClose();
  };

  const inp={width:"100%",background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"10px 13px",color:tc.text,fontSize:13,outline:"none",marginBottom:8};
  return(
    <Modal title={t("✏️ নতুন পোস্ট","✏️ New Post")} onClose={onClose} tc={tc}>
      {me.type==="registered"&&(
        <div style={{display:"flex",gap:6,marginBottom:12,background:tc.input,borderRadius:12,padding:4}}>
          {[["identified",t("🆅 নিজের নামে","🆅 As Myself")],["anon",t("🎭 বেনামে","🎭 Anonymous")]].map(([v,l])=>(
            <button key={v} onClick={()=>setPostAs(v)} style={{flex:1,background:postAs===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:10,padding:"8px",color:postAs===v?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:12}}>{l}</button>
          ))}
        </div>
      )}
      <textarea value={text} onChange={e=>setText(e.target.value.slice(0,500))} placeholder={t("মনের কথা লিখো... 🎭","Write your thoughts... 🎭")} rows={4} style={{...inp,resize:"none",lineHeight:1.65,borderRadius:14,padding:12,marginBottom:10}}/>
      {imgPrev&&(
        <div style={{position:"relative",marginBottom:10,borderRadius:12,overflow:"hidden",border:`1px solid ${tc.border}`}}>
          <img src={imgPrev} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
          <button onClick={()=>{setImgFile(null);setImgPrev(null);}} style={{position:"absolute",top:6,right:6,background:"#000a",border:"none",color:"#fff",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
      )}
      <div style={{display:"flex",gap:7,marginBottom:10}}>
        <button onClick={()=>fileRef.current.click()} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"7px 12px",color:tc.subText,cursor:"pointer",fontSize:13}}>{t("📷 ছবি","📷 Photo")}</button>
        <button onClick={()=>setShowPoll(!showPoll)} style={{background:showPoll?"#7c3aed33":tc.input,border:`1px solid ${showPoll?"#7c3aed":tc.border}`,borderRadius:12,padding:"7px 12px",color:showPoll?"#a855f7":tc.subText,cursor:"pointer",fontSize:13}}>📊 {t("পোল","Poll")}</button>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
      </div>
      {showPoll&&(
        <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid ${tc.border}`,marginBottom:10}}>
          <input value={pollQ} onChange={e=>setPollQ(e.target.value)} placeholder={t("প্রশ্ন লিখুন...","Enter question...")} style={inp}/>
          {pollOpts.map((o,i)=>(<input key={i} value={o} onChange={e=>{const n=[...pollOpts];n[i]=e.target.value;setPollOpts(n);}} placeholder={t(`বিকল্প ${i+1}`,`Option ${i+1}`)} style={inp}/>))}
          {pollOpts.length<4&&<button onClick={()=>setPollOpts([...pollOpts,""])} style={{background:"none",border:"none",color:"#7c3aed",cursor:"pointer",fontSize:12}}>+ {t("আরো","More")}</button>}
        </div>
      )}
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
        {MOODS.map(m=>(<button key={m} onClick={()=>setMood(mood===m?"":m)} style={{background:mood===m?"#7c3aed33":tc.input,border:`1px solid ${mood===m?"#7c3aed":tc.border}`,borderRadius:14,padding:"5px 10px",color:mood===m?"#a855f7":tc.subText,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{m}</button>))}
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        {TAGS.map(t2=>{const c=TAG_C[t2];const a=tag===t2;return(<button key={t2} onClick={()=>setTag(t2)} style={{background:a?c+"33":tc.input,border:`1px solid ${a?c:tc.border}`,borderRadius:14,padding:"5px 10px",color:a?c:tc.subText,cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{t2}</button>);})}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:500-text.length<50?"#ef4444":tc.dimText,fontSize:12}}>{500-text.length} {t("বাকি","left")}</span>
        <button onClick={submit} disabled={loading||(!text.trim()&&!imgFile)} style={{background:(!loading&&(text.trim()||imgFile))?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,border:"none",borderRadius:16,padding:"11px 24px",color:(!loading&&(text.trim()||imgFile))?"#fff":tc.subText,cursor:(!loading&&(text.trim()||imgFile))?"pointer":"default",fontWeight:700,fontSize:14}}>
          {loading?t("আপলোড হচ্ছে...","Uploading..."):t("পোস্ট করো 🚀","Post 🚀")}
        </button>
      </div>
    </Modal>
  );
}

function Inbox({me,onClose,tc,t}){
  const [threads,setThreads]=useState([]);

  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const loadThreads=async()=>{
    const{data}=await sb.from("messages").select("*").or(`from_id.eq.${me.id},to_id.eq.${me.id}`).order("created_at",{ascending:false});
    if(!data)return;
    const ids=[...new Set(data.map(m=>m.from_id===me.id?m.to_id:m.from_id))];
    setThreads(ids.map(tid=>({tid,last:data.find(m=>m.from_id===tid||m.to_id===tid),unread:data.filter(m=>m.from_id===tid&&m.to_id===me.id&&!m.read).length})));
    if(ids.length>0){const{data:ud}=await sb.from("users").select("id,username,color,verified").in("id",ids);if(ud){const um={};ud.forEach(u=>um[u.id]=u);setUsers(um);}}
  };
  const loadMsgs=async(tid)=>{const{data}=await sb.from("messages").select("*").or(`and(from_id.eq.${me.id},to_id.eq.${tid}),and(from_id.eq.${tid},to_id.eq.${me.id})`).order("created_at");if(data)setMsgs(data);};

        <button onClick={selected?()=>setSelected(null):onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        {selUser?<div style={{display:"flex",alignItems:"center",gap:8,flex:1}}><Av username={selUser.username} color={selUser.color} size={32} verified={selUser.verified||false} isReg={true}/><span style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{selUser.username}</span></div>:<span style={{color:"#c4b5fd",fontWeight:800,fontSize:17,flex:1}}>📬 {t("ইনবক্স","Inbox")}</span>}
        {!selected&&<button onClick={onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px",background:tc.bg}}>
        {!selected?(threads.length===0?<div style={{textAlign:"center",padding:"60px 0",color:tc.dimText}}><div style={{fontSize:44,marginBottom:10}}>💌</div><p>{t("কোনো মেসেজ নেই","No messages yet")}</p></div>:threads.map(({tid,last,unread})=>{const u=users[tid];return(<div key={tid} onClick={()=>{setSelected(tid);loadMsgs(tid);}} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,cursor:"pointer",background:unread>0?"#7c3aed11":tc.card,border:`1px solid ${unread>0?"#7c3aed33":tc.border}`,marginBottom:10,alignItems:"center"}}>{u?<Av username={u.username} color={u.color} size={46} verified={u.verified||false} isReg={true}/>:<div style={{width:46,height:46,borderRadius:"50%",background:tc.input,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🎭</div>}<div style={{flex:1,minWidth:0}}><div style={{color:"#c4b5fd",fontWeight:unread>0?700:500,fontSize:15}}>{u?u.username:t("অজানা","Unknown")}</div><div style={{color:tc.subText,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{last?.content}</div></div>{unread>0&&<div style={{background:"#7c3aed",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unread}</div>}</div>);})):(
          <div>{msgs.length===0&&<p style={{color:tc.dimText,textAlign:"center",padding:"40px 0"}}>{t("কথা শুরু করো! 👋","Start chatting! 👋")}</p>}{msgs.map(m=>(<div key={m.id} style={{display:"flex",justifyContent:m.from_id===me.id?"flex-end":"flex-start",marginBottom:12}}><div style={{background:m.from_id===me.id?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,borderRadius:m.from_id===me.id?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",maxWidth:"78%",border:m.from_id===me.id?"none":`1px solid ${tc.border}`}}>{m.from_id!==me.id&&<div style={{color:"#a78bfa",fontSize:11,marginBottom:4}}>{m.from_name}</div>}<p style={{color:"#e2e8f0",fontSize:14,margin:0,lineHeight:1.5,wordBreak:"break-word"}}>{m.content}</p><div style={{color:m.from_id===me.id?"#ffffff55":tc.dimText,fontSize:10,marginTop:4,textAlign:"right"}}>{timeAgo(m.created_at)}</div></div></div>))}<div ref={msgEndRef}/></div>
        )}
      </div>
      {selected&&<div style={{borderTop:`1px solid ${tc.border}`,padding:"10px 12px",background:tc.nav,flexShrink:0}}><div style={{display:"flex",gap:8}}><input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={t("মেসেজ লিখুন...","Type a message...")} style={{flex:1,background:tc.input,border:`1px solid ${tc.border}`,borderRadius:22,padding:"11px 16px",color:tc.text,fontSize:14,outline:"none"}}/><button onClick={send} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",width:46,height:46,color:"#fff",cursor:"pointer",fontSize:18,flexShrink:0}}>→</button></div></div>}
    </div>
  );
}
function ChatRooms({me,onClose,tc,t}){

}

function UserSearch({me,onViewProfile,onFollow,onClose,tc,t}){
  const [q,setQ]=useState("");

  useEffect(()=>{
    if(!q.trim()){setResults([]);return;}
    const timer=setTimeout(async()=>{setLoading(true);const{data}=await sb.from("users").select("*").ilike("username",`%${q}%`).neq("id",me.id).limit(20);if(data)setResults(data);setLoading(false);},400);
    return()=>clearTimeout(timer);
  },[q]);
  return(
    <div style={{position:"fixed",inset:0,background:tc.bg,zIndex:700,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:tc.nav,borderBottom:`1px solid ${tc.border}`,padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder={t("ইউজারনেম খোঁজো...","Search username...")} style={{flex:1,background:tc.input,border:`1px solid #7c3aed44`,borderRadius:20,padding:"8px 14px",color:tc.text,fontSize:14,outline:"none"}}/>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px",background:tc.bg}}>
        {loading&&<Spinner/>}
        {!q.trim()&&!loading&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dimText}}><div style={{fontSize:44,marginBottom:10}}>👥</div><p>{t("ইউজারনেম লিখলে রেজাল্ট দেখাবে","Start typing to search users")}</p></div>}
        {q.trim()&&!loading&&results.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dimText}}><div style={{fontSize:44,marginBottom:10}}>🔍</div><p>{t("কোনো ইউজার পাওয়া যায়নি","No users found")}</p></div>}
        {results.map(u=>{const isF=(me.following||[]).includes(u.id);return(<div key={u.id} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,background:tc.card,border:`1px solid ${tc.border}`,marginBottom:10,alignItems:"center"}}><div onClick={()=>{onViewProfile(u.id);onClose();}} style={{cursor:"pointer",flexShrink:0}}><Av username={u.username} color={u.color} size={46} verified={u.verified||false} isReg={true}/></div><div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>{onViewProfile(u.id);onClose();}}><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{u.username}</span><RegBadge/>{u.verified&&<VBadge/>}</div><div style={{color:tc.subText,fontSize:12,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.bio||t("বায়ো নেই","No bio")}</div></div>{me.type==="registered"&&<button onClick={()=>onFollow(u.id)} style={{background:isF?"#1a1a2e":"#7c3aed22",border:`1px solid ${isF?"#2a2a40":"#7c3aed55"}`,borderRadius:12,padding:"7px 13px",color:isF?"#475569":"#a855f7",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0}}>{isF?t("✓ ফলোয়িং","✓ Following"):t("+ ফলো","+ Follow")}</button>}</div>);})}
      </div>
    </div>
  );
}

function GroupChats({me,onClose,tc,t}){
  const [groups,setGroups]=useState([]);
  const [activeGroup,setActiveGroup]=useState(null);
  const [groupMsgs,setGroupMsgs]=useState([]);
  const [msgText,setMsgText]=useState("");
  const [creating,setCreating]=useState(false);
  const [groupName,setGroupName]=useState("");
  const [maxMembers,setMaxMembers]=useState("30");
  const msgEndRef=useRef();

  useEffect(()=>{
    loadGroups();
    const i=setInterval(()=>{if(activeGroup)loadGroupMsgs(activeGroup.id);else loadGroups();},8000);
    return()=>clearInterval(i);
  },[activeGroup]);
  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:"smooth"});},[groupMsgs]);

  const loadGroups=async()=>{
    // Use rooms table with type='group'
    const{data}=await sb.from("rooms").select("*").order("created_at",{ascending:false});
    if(data)setGroups(data);
  };
  const loadGroupMsgs=async(gid)=>{
    const{data}=await sb.from("room_messages").select("*").eq("room_id",gid).order("created_at");
    if(data)setGroupMsgs(data);
  };
  const createGroup=async()=>{
    if(!me.type==="guest"||!groupName.trim())return;
    const{data}=await sb.from("rooms").insert({name:groupName,owner_id:me.id,owner_name:me.username}).select().single();
    if(data){setGroups(g=>[data,...g]);setGroupName("");setCreating(false);}
  };
  const send=async()=>{
    if(!msgText.trim()||!activeGroup)return;
    const{data}=await sb.from("room_messages").insert({room_id:activeGroup.id,user_id:me.id,username:me.username,is_reg:me.type==="registered",verified:me.verified||false,color:me.color,content:msgText}).select().single();
    if(data)setGroupMsgs(m=>[...m,data]);
    setMsgText("");
  };
  const deleteGroup=async id=>{await sb.from("rooms").delete().eq("id",id);setGroups(g=>g.filter(x=>x.id!==id));};
  const leaveGroup=()=>setActiveGroup(null);

  return(
    <div style={{position:"fixed",inset:0,background:tc.bg,zIndex:700,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:tc.nav,borderBottom:`1px solid ${tc.border}`,padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={activeGroup?leaveGroup:onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:800,fontSize:17,flex:1}}>{activeGroup?activeGroup.name:t("👥 গ্রুপ চ্যাট","👥 Group Chat")}</span>
        {!activeGroup&&<button onClick={onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px",background:tc.bg}}>
        {!activeGroup?(
          <div>
            {/* Create Group — সবাই পারবে */}
            <button onClick={()=>setCreating(!creating)} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"12px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginBottom:12}}>
              + {t("নতুন গ্রুপ তৈরি করো","Create New Group")}
            </button>
            {creating&&(
              <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid #7c3aed44`,marginBottom:12}}>
                <input value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder={t("গ্রুপের নাম...","Group name...")} style={{width:"100%",background:tc.bg,border:`1px solid ${tc.border}`,borderRadius:12,padding:"10px 13px",color:tc.text,fontSize:13,outline:"none",marginBottom:8}}/>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <span style={{color:tc.subText,fontSize:13,alignSelf:"center"}}>{t("সর্বোচ্চ সদস্য:","Max members:")}</span>
                  {["10","20","30"].map(v=>(
                    <button key={v} onClick={()=>setMaxMembers(v)} style={{background:maxMembers===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.bg,border:`1px solid ${maxMembers===v?"#7c3aed":tc.border}`,borderRadius:10,padding:"5px 12px",color:maxMembers===v?"#fff":tc.subText,cursor:"pointer",fontSize:13,fontWeight:maxMembers===v?700:400}}>{v}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={createGroup} style={{flex:1,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:12,padding:"9px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>{t("তৈরি করো ✓","Create ✓")}</button>
                  <button onClick={()=>setCreating(false)} style={{background:tc.input,border:"none",borderRadius:12,padding:"9px 14px",color:"#64748b",cursor:"pointer",fontSize:13}}>{t("বাতিল","Cancel")}</button>
                </div>
              </div>
            )}
            {groups.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dimText}}><div style={{fontSize:44,marginBottom:10}}>👥</div><p>{t("কোনো গ্রুপ নেই এখনো","No groups yet")}</p></div>}
            {groups.map(g=>(
              <div key={g.id} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,background:tc.card,border:`1px solid ${tc.border}`,marginBottom:10,alignItems:"center",cursor:"pointer"}} onClick={()=>{setActiveGroup(g);loadGroupMsgs(g.id);}}>
                <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>👥</div>

                  <div style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{g.name}</div>
                  <div style={{color:tc.subText,fontSize:12,marginTop:2}}>{t("তৈরি করেছে:","Created by:")} {g.owner_name}</div>
                </div>
                {me.id===g.owner_id&&(
                  <button onClick={e=>{e.stopPropagation();deleteGroup(g.id);}} style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:10,padding:"6px 10px",color:"#ef4444",cursor:"pointer",fontSize:13,flexShrink:0}}>🗑️</button>
                )}
              </div>
            ))}
          </div>
        ):(
          <div>
            {groupMsgs.length===0&&<p style={{color:tc.dimText,textAlign:"center",padding:"40px 0"}}>{t("এখনো কেউ কথা বলেনি","No messages yet")} 👋</p>}
            {groupMsgs.map(m=>(
              <div key={m.id} style={{display:"flex",gap:8,marginBottom:12,flexDirection:m.user_id===me.id?"row-reverse":"row"}}>

                <div style={{maxWidth:"72%"}}>
                  {m.user_id!==me.id&&<div style={{color:"#a78bfa",fontSize:11,marginBottom:2,display:"flex",alignItems:"center",gap:3}}>{m.username}{m.is_reg&&<RegBadge/>}{m.verified&&<VBadge/>}</div>}

                    <p style={{color:"#e2e8f0",fontSize:14,margin:0,lineHeight:1.5,wordBreak:"break-word"}}>{m.content}</p>
                  </div>
                  <div style={{color:tc.dimText,fontSize:10,marginTop:3,textAlign:m.user_id===me.id?"right":"left"}}>{timeAgo(m.created_at)}</div>

          </div>
        )}
      </div>
      {activeGroup&&(
        <div style={{borderTop:`1px solid ${tc.border}`,padding:"10px 12px",background:tc.nav,flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={msgText} onChange={e=>setMsgText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={t("মেসেজ লিখুন...","Type a message...")} style={{flex:1,background:tc.input,border:`1px solid ${tc.border}`,borderRadius:22,padding:"11px 16px",color:tc.text,fontSize:14,outline:"none"}}/>
            <button onClick={send} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",width:46,height:46,color:"#fff",cursor:"pointer",fontSize:18,flexShrink:0}}>→</button>
          </div>
        </div>
      )}
    </div>
  );
}
  const [user,setUser]=useState(null);
  const [posts,setPosts]=useState([]);
  const [comments,setComments]=useState([]);
  const [editingBio,setEditingBio]=useState(false);
  const [bioText,setBioText]=useState("");
  useEffect(()=>{
    sb.from("users").select("*").eq("id",userId).single().then(({data})=>{if(data){setUser(data);setBioText(data.bio||"");}});
    sb.from("posts").select("*").eq("author_id",userId).order("created_at",{ascending:false}).then(({data})=>{if(data){setPosts(data);if(data.length>0)sb.from("comments").select("*").in("post_id",data.map(p=>p.id)).order("created_at").then(({data:c})=>{if(c)setComments(c);});}});
  },[userId]);
  const saveBio=async()=>{await sb.from("users").update({bio:bioText}).eq("id",me.id);setUser(u=>({...u,bio:bioText}));setEditingBio(false);};
  const copyLink=()=>navigator.clipboard?.writeText(`${window.location.origin}?profile=${userId}`).catch(()=>{});
  const isOwn=me.id===userId;
  const isFollowing=(me.following||[]).includes(userId);
  const totalLikes=posts.reduce((a,p)=>a+(p.likes||[]).length,0);
  if(!user)return <div style={{minHeight:"100vh",background:tc.bg}}><Spinner/></div>;
  return(
    <div style={{paddingBottom:80,minHeight:"100vh",background:tc.bg}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 12px 0",position:"sticky",top:0,background:tc.nav,zIndex:50}}>
        <button onClick={onBack} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:700,fontSize:16,flex:1}}>{t("প্রোফাইল","Profile")}</span>
        {isOwn&&<button onClick={onOpenSettings} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"6px 12px",color:tc.subText,cursor:"pointer",fontSize:13}}>⚙️ {t("সেটিংস","Settings")}</button>}
      </div>
      <div style={{background:tc.card,border:`1px solid ${tc.border}`,borderRadius:20,padding:"24px 14px",textAlign:"center",margin:"10px 10px 14px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Av username={user.username} color={user.color} size={76} verified={user.verified||false} isReg={true}/></div>
        <h2 style={{color:"#c4b5fd",fontSize:19,fontWeight:800}}>{user.username}<RegBadge/>{user.verified&&<VBadge/>}</h2>
        <p style={{color:tc.dimText,fontSize:11,marginTop:4}}>{timeAgo(user.created_at)} {t("আগে যোগ দিয়েছে","ago joined")}</p>
        {isOwn?(
          <div style={{marginTop:8,maxWidth:300,margin:"8px auto 4px"}}>
            {editingBio?(<div><textarea value={bioText} onChange={e=>setBioText(e.target.value.slice(0,150))} rows={2} style={{width:"100%",background:tc.input,border:"1px solid #7c3aed",borderRadius:12,padding:"9px 12px",color:tc.text,fontSize:13,outline:"none",resize:"none",lineHeight:1.5}}/><div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:5}}><button onClick={()=>{setEditingBio(false);setBioText(user.bio||"");}} style={{background:tc.input,border:"none",borderRadius:10,padding:"6px 12px",color:"#64748b",cursor:"pointer",fontSize:12}}>{t("বাতিল","Cancel")}</button><button onClick={saveBio} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:10,padding:"6px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>{t("সেভ","Save")}</button></div></div>)
            :(<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6}}><p style={{color:tc.subText,fontSize:13}}>{user.bio||t("বায়ো যোগ করোনি...","No bio yet...")}</p><button onClick={()=>setEditingBio(true)} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:8,padding:"3px 8px",color:"#475569",cursor:"pointer",fontSize:11}}>✏️</button></div>)}
          </div>
        ):(user.bio&&<p style={{color:tc.subText,fontSize:13,marginTop:6}}>{user.bio}</p>)}
        <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:tc.input,borderRadius:14,overflow:"hidden",border:`1px solid ${tc.border}`}}>
          {[[t("পোস্ট","Posts"),posts.length,"#a855f7"],[t("লাইক","Likes"),totalLikes,"#ec4899"],[t("ফলোয়ার","Followers"),(user.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
            <div key={i} style={{flex:1,padding:"12px 4px",textAlign:"center",borderRight:i<arr.length-1?`1px solid ${tc.border}`:"none"}}>
              <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#475569"}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={copyLink} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:14,padding:"9px 14px",color:tc.subText,cursor:"pointer",fontWeight:600,fontSize:12}}>🔗 {t("আইডি লিংক","Profile Link")}</button>
          {!isOwn&&me.type==="registered"&&(<><button onClick={()=>onFollow(user.id)} style={{background:isFollowing?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:isFollowing?"1px solid #2a2a40":"none",borderRadius:14,padding:"9px 18px",color:isFollowing?"#64748b":"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>{isFollowing?t("✓ আনফলো","✓ Unfollow"):t("+ ফলো","+ Follow")}</button><button onClick={()=>onMsgUser({author_id:user.id,username:user.username})} style={{background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:14,padding:"9px 14px",color:"#a855f7",cursor:"pointer",fontWeight:600,fontSize:13}}>💌 {t("মেসেজ","Message")}</button></>)}
          {isOwn&&<button onClick={onLogout} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:14,padding:"9px 18px",color:tc.subText,cursor:"pointer",fontWeight:600,fontSize:13}}>{t("লগআউট","Logout")}</button>}
        </div>
      </div>
      <div style={{padding:"0 10px"}}>
        {posts.length===0?<p style={{textAlign:"center",color:tc.dimText,padding:36}}>{t("কোনো পোস্ট নেই","No posts yet")}</p>:posts.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} onFollow={onFollow} onMsgUser={onMsgUser} tc={tc} t={t} {...cardProps}/>)}
      </div>
    </div>
  );
}
// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [guest]=useState(()=>({type:"guest",username:genUser(),id:"guest_"+genId(),color:genColor(),following:[],verified:false}));
  const me=profile?{...profile,type:"registered"}:guest;

  const [posts,setPosts]=useState([]);
  const [comments,setComments]=useState([]);
  const [page,setPage]=useState(0);
  const [hasMore,setHasMore]=useState(true);
  const [loadingMore,setLoadingMore]=useState(false);
  const [pendingLikes,setPendingLikes]=useState({}); // ✅ বাগ ফিক্স
  const [tab,setTab]=useState("feed");
  const [activeTag,setActiveTag]=useState("সব");
  const [sort,setSort]=useState("smart"); // smart=random+latest
  const [compose,setCompose]=useState(false);
  const [showAuth,setShowAuth]=useState(false);
  const [showInbox,setShowInbox]=useState(false);
  const [showRooms,setShowRooms]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [showUserSearch,setShowUserSearch]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [viewProfile,setViewProfile]=useState(null);
  const [search,setSearch]=useState(false);
  const [q,setQ]=useState("");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [unreadNotifs,setUnreadNotifs]=useState(0);
  const [unreadMsgs,setUnreadMsgs]=useState(0);
  const [theme,setTheme]=useState(()=>localStorage.getItem("al_theme")||"dark");
  const [lang,setLang]=useState(()=>localStorage.getItem("al_lang")||"bn");
  const loaderRef=useRef();

  // Theme
  useEffect(()=>{document.body.className=theme==="light"?"light":"";localStorage.setItem("al_theme",theme);},[theme]);

  // Translation
  const t=(bn,en)=>lang==="en"?en:bn;

  // Theme colors
  const TC={
    bg:theme==="light"?"#f8fafc":"#080810",
    card:theme==="light"?"#ffffff":"linear-gradient(160deg,#0f0f1f,#0c0c18)",
    modal:theme==="light"?"#ffffff":"#0d0d1e",
    border:theme==="light"?"#e2e8f0":"#1e1e35",
    nav:theme==="light"?"rgba(248,250,252,.97)":"rgba(8,8,16,.97)",
    input:theme==="light"?"#f1f5f9":"#0a0a14",
    text:theme==="light"?"#1e293b":"#e2e8f0",
    subText:theme==="light"?"#475569":"#64748b",
    dimText:theme==="light"?"#94a3b8":"#2a2a45",
    strip:theme==="light"?"#f1f5f9":"#0a0a14",
  };

  const msg=(m,type="info")=>setToast({m,type});

  // ── URL Parameter Handler (profile/post link) ──────────────────────────────
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const profileId=params.get("profile");
    const postId=params.get("post");
    if(profileId)setViewProfile(profileId);
    if(postId)setViewPost(postId);
  },[]);

  // Auth check
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session)sb.from("users").select("*").eq("id",session.user.id).single().then(({data})=>{if(data)setProfile(data);setLoading(false);});
      else setLoading(false);
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if(session)sb.from("users").select("*").eq("id",session.user.id).single().then(({data})=>{if(data)setProfile(data);});
      else setProfile(null);
    });
  },[]);

  // Load posts with pagination
  const loadPosts=useCallback(async(reset=false)=>{
    if(loadingMore&&!reset)return;
    setLoadingMore(true);
    const currentPage=reset?0:page;
    let query=sb.from("posts").select("*");
    if(activeTag!=="সব")query=query.eq("tag",activeTag);
    if(sort==="top")query=query.order("likes",{ascending:false});
    else query=query.order("created_at",{ascending:false});
    query=query.range(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE-1);
    const{data}=await query;
    if(data){
      if(reset){
        setPosts(data);
        setPendingLikes({}); // clear pending on refresh
      } else {
        setPosts(p=>[...p,...data.filter(np=>!p.find(ep=>ep.id===np.id))]);
      }
      setHasMore(data.length===PAGE_SIZE);
      if(reset)setPage(1);else setPage(p=>p+1);
      // load comments
      const ids=(reset?data:[...posts,...data]).map(p=>p.id);
      if(ids.length>0){
        const{data:c}=await sb.from("comments").select("*").in("post_id",ids).order("created_at");
        if(c)setComments(c);
      }
    }
    setLoadingMore(false);
  },[activeTag,sort,page,loadingMore,posts]);

  useEffect(()=>{loadPosts(true);},[activeTag,sort]);

  // Infinite scroll observer
  useEffect(()=>{
    if(!loaderRef.current)return;
    const obs=new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&hasMore&&!loadingMore)loadPosts(false);},{threshold:0.1});
    obs.observe(loaderRef.current);
    return()=>obs.disconnect();
  },[hasMore,loadingMore,loadPosts]);

  useEffect(()=>{
    if(profile)loadUnread();
    const i=setInterval(()=>{if(profile)loadUnread();},30000);
    return()=>clearInterval(i);
  },[profile]);

  const loadUnread=async()=>{
    if(!profile)return;
    const[{count:nc},{count:mc}]=await Promise.all([
      sb.from("notifications").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false),
      sb.from("messages").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false),
    ]);
    setUnreadNotifs(nc||0);setUnreadMsgs(mc||0);
  };

  const handleLogout=async()=>{await sb.auth.signOut();setProfile(null);setViewProfile(null);msg(t("👋 লগআউট হয়েছে","👋 Logged out"));};

  const addPost=async(postData)=>{
    const{data,error}=await sb.from("posts").insert(postData).select().single();
    if(error){msg(t("পোস্ট করতে সমস্যা হয়েছে!","Error posting!"),"error");return;}
    if(data)setPosts(p=>[data,...p]);
    msg(t("✅ পোস্ট শেয়ার হয়েছে!","✅ Posted!"),"success");
  };

  // ✅ বাগ ফিক্স: Optimistic like — পেন্ডিং state রেখে DB আপডেট করো
  const onLike=async(id,liked)=>{
    // Immediately update UI
    setPendingLikes(pl=>({...pl,[id]:!liked}));
    const post=posts.find(p=>p.id===id);if(!post)return;
    const newLikes=liked?(post.likes||[]).filter(u=>u!==me.id):[...(post.likes||[]),me.id];
    // DB update
    const{error}=await sb.from("posts").update({likes:newLikes}).eq("id",id);
    if(error){
      // Revert if error
      setPendingLikes(pl=>({...pl,[id]:liked}));
      return;
    }
    // Sync actual state
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,likes:newLikes}));
    // Clear pending
    setPendingLikes(pl=>{const np={...pl};delete np[id];return np;});
    if(!liked&&post.author_id!==me.id){
      await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"like",content:t("তোমার পোস্টে লাইক দিয়েছে ❤️","liked your post ❤️"),read:false});
    }
  };

  const onReact=async(id,r)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const reacts={...post.reactions||{}};
    if(!reacts[r])reacts[r]=[];
    reacts[r]=reacts[r].includes(me.id)?reacts[r].filter(u=>u!==me.id):[...reacts[r],me.id];
    await sb.from("posts").update({reactions:reacts}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,reactions:reacts}));
  };
  const onComment=async(pid,commentData)=>{
    const{data}=await sb.from("comments").insert(commentData).select().single();
    if(data){
      setComments(c=>[...c,data]);
      const post=posts.find(p=>p.id===pid);
      if(post&&post.author_id!==me.id)await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"comment",content:t("তোমার পোস্টে কমেন্ট করেছে 💬","commented on your post 💬"),read:false});
    }
  };

  const onShare=async(id)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    await sb.from("posts").update({shares:(post.shares||0)+1}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,shares:(x.shares||0)+1}));
    if(navigator.share)navigator.share({title:"AnonLogos",url:`${window.location.origin}?post=${id}`}).catch(()=>{});
    msg(t("🔁 শেয়ার হয়েছে!","🔁 Shared!"));
  };

  const onCopy=id=>{navigator.clipboard?.writeText(`${window.location.origin}?post=${id}`).catch(()=>{});msg(t("🔗 লিংক কপি হয়েছে!","🔗 Link copied!"));};

  const onBookmark=async(id,saved)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const newB=saved?(post.bookmarks||[]).filter(u=>u!==me.id):[...(post.bookmarks||[]),me.id];
    await sb.from("posts").update({bookmarks:newB}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,bookmarks:newB}));
  };

  const onVote=async(id,i)=>{
    const post=posts.find(p=>p.id===id);if(!post||!post.poll||(post.poll.voted||[]).includes(me.id))return;
    const poll={...post.poll,options:post.poll.options.map((o,j)=>j===i?{...o,votes:[...(o.votes||[]),me.id]}:o),voted:[...(post.poll.voted||[]),me.id]};
    await sb.from("posts").update({poll}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,poll}));
  };

  const onEdit=async(id,content)=>{
    await sb.from("posts").update({content,edited:true}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,content,edited:true}));
  };

  const onDelete=async(id)=>{
    await sb.from("posts").delete().eq("id",id);
    setPosts(p=>p.filter(x=>x.id!==id));
    msg(t("🗑️ ডিলিট হয়েছে!","🗑️ Deleted!"),"success");
  };

  const onPin=async(id,pinned)=>{
    if(me.type!=="registered"||!me.verified){msg(t("📌 পিন করতে ✅ ভেরিফিকেশন লাগবে!","📌 Verification required to pin!"),"error");return;}
    await sb.from("posts").update({pinned}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,pinned}));
  };

  const onFollow=async(uid)=>{
    if(me.type!=="registered"){msg(t("🎭 ফলো করতে রেজিস্ট্রেশন করো!","🎭 Register to follow!"),"error");setTimeout(()=>setShowAuth(true),600);return;}
    const isF=(me.following||[]).includes(uid);
    const nf=isF?(me.following||[]).filter(i=>i!==uid):[...(me.following||[]),uid];
    await sb.from("users").update({following:nf}).eq("id",me.id);
    setProfile(p=>({...p,following:nf}));
    const{data:target}=await sb.from("users").select("followers").eq("id",uid).single();
    if(target){const nfol=isF?(target.followers||[]).filter(i=>i!==me.id):[...(target.followers||[]),me.id];await sb.from("users").update({followers:nfol}).eq("id",uid);}
    if(!isF)await sb.from("notifications").insert({to_id:uid,from_username:me.username,type:"follow",content:t("তোমাকে ফলো করেছে 👤","followed you 👤"),read:false});
    msg(isF?t("আনফলো করা হয়েছে","Unfollowed"):t("✅ ফলো করা হয়েছে!","✅ Following!"),"success");
  };

  const onMsgUser=async(p)=>{
    if(me.type!=="registered"){msg(t("💌 মেসেজ করতে রেজিস্ট্রেশন করো!","💌 Register to message!"),"error");setShowAuth(true);return;}
    if(p.author_id===me.id){msg(t("নিজেকে মেসেজ করা যাবে না 😄","Can't message yourself 😄"));return;}
    await sb.from("messages").insert({from_id:me.id,from_name:me.username,to_id:p.author_id,content:t("👋 হ্যালো!","👋 Hello!"),read:false});
    setShowInbox(true);msg(t("💌 মেসেজ পাঠানো হয়েছে!","💌 Message sent!"),"success");
  };

  // Smart feed
  const baseFeed=posts.filter(p=>!q||(p.content||"").includes(q));
  const feed=sort==="smart"?buildSmartFeed(baseFeed):sort==="top"?[...baseFeed].sort((a,b)=>(b.likes||[]).length-(a.likes||[]).length):baseFeed;
  const mine=posts.filter(p=>p.author_id===me.id);
  const saved=posts.filter(p=>(p.bookmarks||[]).includes(me.id));

  const cardProps={onLike,onReact,onComment,onShare,onCopy,onBookmark,onVote,onEdit,onDelete,onPin,onMsgUser,onViewProfile:setViewProfile,onFollow,onAuthRequired:()=>{msg(t("🎭 এই ফিচারের জন্য রেজিস্ট্রেশন করো!","🎭 Register for this feature!"),"error");setShowAuth(true);},tc:TC,t};

  const TABS=[{id:"feed",ic:"🌐",lb:t("ফিড","Feed")},{id:"trending",ic:"🔥",lb:t("ট্রেন্ড","Trend")},{id:"saved",ic:"🔖",lb:t("সেভড","Saved")},{id:"profile",ic:"👤",lb:t("আমি","Me")}];

  if(loading)return <div style={{minHeight:"100vh",background:TC.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🎭</div><div style={{fontWeight:900,fontSize:24,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AnonLogos</div><div style={{width:36,height:36,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"16px auto 0"}}/></div></div>;

  if(viewProfile)return(
    <ProfilePage userId={viewProfile} me={me} onBack={()=>setViewProfile(null)} onFollow={onFollow} onMsgUser={onMsgUser} onLogout={handleLogout} onOpenSettings={()=>setShowSettings(true)} tc={TC} t={t} {...cardProps}>
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
      {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} onClose={()=>setShowSettings(false)} tc={TC} t={t}/>}
    </ProfilePage>
  );

  return(
    <div style={{minHeight:"100vh",background:TC.bg,position:"relative"}}>
      {/* Topbar */}
      <div style={{background:TC.nav,backdropFilter:"blur(20px)",borderBottom:`1px solid ${TC.border}`,padding:"0 12px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        {search
          ?<input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder={t("পোস্ট খোঁজো...","Search posts...")} style={{flex:1,background:TC.input,border:"none",borderRadius:20,padding:"8px 14px",color:TC.text,fontSize:14,outline:"none"}}/>
          :<span style={{fontWeight:900,fontSize:21,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.5px"}}>AnonLogos</span>
        }
        <div style={{display:"flex",gap:6,marginLeft:8,alignItems:"center"}}>
          <button onClick={()=>{setSearch(!search);setQ("");}} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>{search?"✕":"🔍"}</button>
          <button onClick={()=>setShowUserSearch(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>👥</button>
          <button onClick={()=>setShowRooms(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>💬</button>
          <button onClick={()=>setShowGroups(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>🫂</button>
          {profile&&(
            <>
              <div style={{position:"relative"}}>
                <button onClick={()=>{setShowNotif(true);setUnreadNotifs(0);}} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>🔔</button>
                {unreadNotifs>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#ef4444",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadNotifs}</div>}
              </div>
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowInbox(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:"#64748b"}}>💌</button>
                {unreadMsgs>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#7c3aed",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadMsgs}</div>}
              </div>
            </>
          )}
          {profile
            ?<button onClick={()=>setViewProfile(profile.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av username={me.username} color={me.color} size={34} verified={me.verified||false} isReg={true}/></button>
            :<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:18,padding:"7px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>{t("লগইন","Login")}</button>
          }
        </div>
      </div>

      {/* Guest banner */}
      {!profile&&(
        <div style={{background:"linear-gradient(135deg,#7c3aed22,#3b82f622)",borderBottom:"1px solid #7c3aed33",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#a78bfa",fontSize:13,fontWeight:600}}>🎭 {t("গেস্ট মোডে আছো","You're in Guest Mode")}</div>
            <div style={{color:"#475569",fontSize:11}}>{t("রেজিস্ট্রেশন করলে পাবে ফলো, মেসেজ ও আরো!","Register for follow, messages & more!")}</div>
          </div>
          <button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"8px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>{t("রেজিস্টার","Register")}</button>
        </div>
      )}

      {/* Tag + Sort */}
      {tab==="feed"&&(
        <div style={{background:TC.strip,borderBottom:`1px solid ${TC.border}`}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",padding:"8px 10px 5px"}}>
            {[t("সব","All"),...TAGS].map(tag=>{const c=TAG_C[tag]||"#7c3aed";const a=activeTag===tag;return(<button key={tag} onClick={()=>setActiveTag(tag)} style={{background:a?(tag===t("সব","All")?"linear-gradient(135deg,#7c3aed,#3b82f6)":c+"33"):TC.input,border:`1px solid ${a?(tag===t("সব","All")?"#7c3aed":c):TC.border}`,borderRadius:16,padding:"5px 11px",color:a?(tag===t("সব","All")?"#fff":c):TC.subText,cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{tag}</button>);})}
          </div>
          <div style={{display:"flex",gap:6,padding:"0 10px 7px"}}>
            {[["smart",t("🔀 স্মার্ট","🔀 Smart")],["new",t("🕐 নতুন","🕐 New")],["top",t("🔥 জনপ্রিয়","🔥 Top")]].map(([v,l])=>(
              <button key={v} onClick={()=>setSort(v)} style={{background:sort===v?"#7c3aed22":"transparent",border:`1px solid ${sort===v?"#7c3aed":"transparent"}`,borderRadius:10,padding:"3px 9px",color:sort===v?"#a855f7":TC.subText,cursor:"pointer",fontSize:11,fontWeight:sort===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>
      )}

      {/* Content */}
      <div style={{padding:"10px 10px 80px"}}>
        {/* Feed top anchor */}
        <div ref={feedTopRef}/>
        {tab==="feed"&&(
          <>
            {posts.length===0&&!loadingMore?<div style={{textAlign:"center",padding:"60px 0",color:TC.dimText}}><div style={{fontSize:44,marginBottom:10}}>🎭</div>{t("কোনো পোস্ট নেই। প্রথমে পোস্ট করো!","No posts yet. Be the first!")}</div>
              :feed.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} localLike={pendingLikes[p.id]} {...cardProps}/>)
            }
            {/* Infinity scroll loader */}
            <div ref={loaderRef} style={{height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {loadingMore&&<div style={{width:28,height:28,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>}
              {!hasMore&&posts.length>0&&<p style={{color:TC.dimText,fontSize:12}}>{t("সব পোস্ট দেখা হয়েছে ✓","All posts loaded ✓")}</p>}
            </div>
          </>
        )}
        {tab==="trending"&&[...posts].sort((a,b)=>(b.likes||[]).length-(a.likes||[]).length).map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} localLike={pendingLikes[p.id]} {...cardProps}/>)}
        {tab==="saved"&&(saved.length===0?<div style={{textAlign:"center",padding:"60px 0",color:TC.dimText}}><div style={{fontSize:44,marginBottom:10}}>🔖</div>{t("সেভড পোস্ট নেই","No saved posts")}</div>:saved.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} localLike={pendingLikes[p.id]} {...cardProps}/>))}
        {tab==="profile"&&(
          <div>
            <div style={{background:TC.card,border:`1px solid ${TC.border}`,borderRadius:20,padding:"24px 14px",textAlign:"center",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Av username={me.username} color={me.color} size={72} verified={me.verified||false} isReg={me.type==="registered"}/></div>
              <h2 style={{color:"#c4b5fd",fontSize:18,fontWeight:800}}>{me.username}{me.type==="registered"&&<RegBadge/>}{me.verified&&<VBadge/>}</h2>
              <p style={{color:TC.dimText,fontSize:11,marginTop:4}}>#{me.id?.slice(0,8)} · {me.type==="registered"?t("রেজিস্টার্ড","Registered"):t("গেস্ট","Guest")}</p>
              {me.type==="registered"&&(
                <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{navigator.clipboard?.writeText(`${window.location.origin}?profile=${me.id}`).catch(()=>{});msg(t("🔗 প্রোফাইল লিংক কপি!","🔗 Profile link copied!"),"success");}} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:12,padding:"7px 14px",color:TC.subText,cursor:"pointer",fontSize:12}}>🔗 {t("প্রোফাইল লিংক","Profile Link")}</button>
                  <button onClick={()=>setShowSettings(true)} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:12,padding:"7px 14px",color:TC.subText,cursor:"pointer",fontSize:12}}>⚙️ {t("সেটিংস","Settings")}</button>
                </div>
              )}
              {me.type!=="registered"
                ?<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"10px 24px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginTop:14}}>🆅 {t("রেজিস্ট্রেশন করো","Register Now")}</button>
                :(
                  <div>
                    <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:TC.input,borderRadius:14,overflow:"hidden",border:`1px solid ${TC.border}`}}>
                      {[[t("পোস্ট","Posts"),mine.length,"#a855f7"],[t("লাইক","Likes"),mine.reduce((a,p)=>a+(p.likes||[]).length,0),"#ec4899"],[t("সেভড","Saved"),saved.length,"#f59e0b"],[t("ফলোয়ার","Followers"),(me.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
                        <div key={i} style={{flex:1,padding:"11px 2px",textAlign:"center",borderRight:i<arr.length-1?`1px solid ${TC.border}`:"none"}}>
                          <div style={{fontSize:17,fontWeight:800,color:c}}>{v}</div>
                          <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <button onClick={handleLogout} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:14,padding:"9px 22px",color:TC.subText,cursor:"pointer",fontWeight:600,fontSize:13,marginTop:12}}>{t("লগআউট","Logout")}</button>
                  </div>
                )
              }
            </div>
            {mine.length===0?<p style={{textAlign:"center",color:TC.dimText,padding:36}}>{t("এখনো পোস্ট করোনি!","No posts yet!")}</p>:mine.map(p=><PostCard key={p.id} p={p} me={me} comments={comments.filter(c=>c.post_id===p.id)} localLike={pendingLikes[p.id]} {...cardProps}/>)}
          </div>
        )}
      </div>
      {/* FAB */}
      <button onClick={()=>setCompose(true)} style={{position:"fixed",bottom:68,right:14,width:52,height:52,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 6px 24px #7c3aed66",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:TC.nav,backdropFilter:"blur(20px)",borderTop:`1px solid ${TC.border}`,display:"flex",zIndex:100,height:56}}>
        {TABS.map(tab2=>(
          <button key={tab2.id} onClick={()=>{
            if(tab2.id==="feed"&&tab===tab2.id){
              // ফিড ট্যাবে ক্লিক করলে উপরে স্ক্রোল + নতুন পোস্ট লোড
              feedTopRef.current?.scrollIntoView({behavior:"smooth"});
              loadPosts(true);
            } else {
              setTab(tab2.id);
            }
          }} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,color:tab===tab2.id?"#a855f7":"#2a2a45"}}>
            <span style={{fontSize:18,filter:tab===tab2.id?"drop-shadow(0 0 6px #a855f7)":"none"}}>{tab2.ic}</span>
            <span style={{fontSize:9,fontWeight:tab===tab2.id?700:400}}>{tab2.lb}</span>
          </button>
        ))}
      </div>

      {showGroups&&<GroupChats me={me} onClose={()=>setShowGroups(false)} tc={TC} t={t}/>}
      {compose&&<Compose me={me} onPost={addPost} onClose={()=>setCompose(false)} tc={TC} t={t}/>}
      {showAuth&&<AuthModal onSuccess={(p)=>{setProfile(p);setShowAuth(false);msg(t("✅ স্বাগতম ","✅ Welcome ")+p.username,"success");}} onClose={()=>setShowAuth(false)} tc={TC} t={t}/>}
      {showInbox&&profile&&<Inbox me={me} onClose={()=>setShowInbox(false)} tc={TC} t={t}/>}
      {showRooms&&<ChatRooms me={me} onClose={()=>setShowRooms(false)} tc={TC} t={t}/>}
      {showNotif&&profile&&<NotifPanel me={me} onClose={()=>setShowNotif(false)} tc={TC} t={t}/>}
      {showUserSearch&&<UserSearch me={me} onViewProfile={setViewProfile} onFollow={onFollow} onClose={()=>setShowUserSearch(false)} tc={TC} t={t}/>}
      {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} onClose={()=>setShowSettings(false)} tc={TC} t={t}/>}
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
