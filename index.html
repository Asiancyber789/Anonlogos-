<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Anonlogos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --p:#7C3AED;--pl:#A78BFA;--pd:#5B21B6;
  --a:#06B6D4;--al:#22D3EE;
  --g:#10B981;--r:#EF4444;--w:#F59E0B;--pk:#EC4899;
  --bg:#07071A;--s1:#0D0D23;--s2:#12122E;--s3:#181838;--s4:#1E1E42;--s5:#242450;
  --b1:rgba(167,139,250,.08);--b2:rgba(167,139,250,.14);--b3:rgba(167,139,250,.22);
  --t1:#F8FAFC;--t2:#CBD5E1;--t3:#64748B;--t4:#334155;
  --grd:linear-gradient(135deg,var(--p),var(--a));
  --grd2:linear-gradient(135deg,var(--pk),var(--w));
  --shadow:0 8px 32px rgba(124,58,237,.25);
  --r6:6px;--r10:10px;--r14:14px;--r18:18px;--r24:24px;--r99:9999px;
  --dur:.2s;--ease:cubic-bezier(.34,1.56,.64,1);
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);color:var(--t1);max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative;}
button,input,textarea,select{font-family:var(--font);border:none;outline:none;background:none;color:inherit;}
button{cursor:pointer;}
a{color:var(--pl);text-decoration:none;font-weight:700;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:1px;}
.grd-text{background:var(--grd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:rgba(7,7,26,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:21px;font-weight:900;letter-spacing:-.5px;}
.hactions{display:flex;gap:7px;}
.hbtn{width:36px;height:36px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all var(--dur);position:relative;}
.hbtn:active{transform:scale(.9);}
.hbtn.has-dot::after{content:'';position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--r);border-radius:50%;border:2px solid var(--bg);}

/* ── LAYOUT ── */
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;padding-bottom:78px;}
.page.show{display:flex;animation:pgIn .22s ease;}
@keyframes pgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── BOTTOM NAV ── */
.bnav{flex-shrink:0;background:rgba(13,13,35,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--b1);padding:0 4px calc(env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-around;z-index:50;height:62px;}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 8px;border-radius:var(--r14);color:var(--t4);transition:all var(--dur);min-width:44px;height:52px;position:relative;}
.nb i{font-size:19px;transition:all var(--dur);}
.nb span{font-size:9px;font-weight:700;letter-spacing:.2px;transition:all var(--dur);}
.nb.on{color:var(--pl);}
.nb.on i{transform:scale(1.15);filter:drop-shadow(0 0 6px rgba(167,139,250,.6));}
.nb-dot{position:absolute;top:8px;right:10px;width:6px;height:6px;background:var(--r);border-radius:50%;border:2px solid var(--bg);}
.nb-fab{width:46px;height:46px;border-radius:50%;background:var(--grd);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all var(--dur);}
.nb-fab:active{transform:scale(.92) rotate(90deg);}

/* ── STORIES ── */
.stories{display:flex;gap:9px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.stories::-webkit-scrollbar{display:none;}
.stc{flex-shrink:0;width:70px;text-align:center;cursor:pointer;}
.stc:active{transform:scale(.95);}
.str{width:60px;height:60px;border-radius:50%;padding:2px;margin:0 auto 5px;background:var(--grd);}
.stri{width:100%;height:100%;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:21px;}
.stl{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.st-add .str{background:var(--s3);border:2px dashed var(--pl);}
.st-add .stri{color:var(--pl);font-size:22px;background:transparent;}

/* ── QUICK POST ── */
.qp{margin:0 14px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r18);padding:12px;}
.qpr{display:flex;align-items:center;gap:10px;}
.qav{width:40px;height:40px;border-radius:50%;background:var(--grd);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;flex-shrink:0;}
.qinp{flex:1;background:var(--s4);border:1px solid var(--b1);border-radius:var(--r99);padding:9px 14px;color:var(--t3);font-size:13px;text-align:left;transition:all var(--dur);}
.qinp:hover{border-color:var(--pl);color:var(--t2);}
.qtls{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);}
.qtl{flex:1;background:transparent;color:var(--t3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px;border-radius:var(--r6);transition:all var(--dur);}
.qtl:hover,.qtl:active{background:var(--s4);}
.qtl i{font-size:14px;}

/* ── FEED TABS ── */
.ftabs{display:flex;gap:6px;padding:0 14px 11px;overflow-x:auto;scrollbar-width:none;}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:7px 15px;border-radius:var(--r99);border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:12px;font-weight:700;transition:all var(--dur);}
.ftab.on{background:var(--grd);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.35);}

/* ── POST CARD ── */
.pc{margin:0 14px 11px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r18);overflow:hidden;transition:border-color var(--dur);}
.pc:hover{border-color:var(--b2);}
.pch{display:flex;align-items:center;gap:9px;padding:12px 12px 8px;}
.pav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0;}
.pm{flex:1;}
.pn{font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.vtick{color:var(--g);font-size:12px;}
.abadge{background:rgba(124,58,237,.2);color:var(--pl);font-size:9px;font-weight:800;padding:2px 7px;border-radius:var(--r99);border:1px solid rgba(124,58,237,.3);}
.pt{font-size:11px;color:var(--t3);margin-top:2px;}
.pmor{width:28px;height:28px;border-radius:50%;background:transparent;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;}
.pb{padding:0 12px 10px;font-size:13px;line-height:1.65;color:var(--t1);}
.pstats{padding:7px 12px;display:flex;gap:8px;font-size:11px;color:var(--t3);border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);}
.pacts{display:flex;}
.pa{flex:1;background:transparent;color:var(--t2);font-size:12px;font-weight:700;padding:9px 4px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;gap:5px;transition:all var(--dur);}
.pa:active{background:var(--s4);}
.pa.lkd{color:var(--r);}
.pa i{font-size:14px;}
.pa.lkd i.fa-heart{animation:hp .3s var(--ease);}
@keyframes hp{0%{transform:scale(1);}50%{transform:scale(1.6);}100%{transform:scale(1);}}

/* ── SEARCH ── */
.srchbar{margin:12px 14px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r99);padding:11px 16px;display:flex;align-items:center;gap:9px;}
.srchbar i{color:var(--t3);font-size:14px;}
.srchi{flex:1;background:transparent;color:var(--t1);font-size:13px;}
.srchi::placeholder{color:var(--t3);}
.sr-res{padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r14);cursor:pointer;transition:all var(--dur);}
.sr-item:active{background:var(--s3);}
.sr-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;flex-shrink:0;}
.sr-info{flex:1;}
.sr-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;}
.sr-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.sr-act{padding:7px 14px;background:var(--grd);border-radius:var(--r99);color:#fff;font-size:11px;font-weight:800;}

/* ── ROOMS ── */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.rc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r18);padding:14px;text-align:center;cursor:pointer;transition:all var(--dur);}
.rc:active{transform:scale(.97);border-color:var(--b3);}
.rc-ico{width:52px;height:52px;border-radius:var(--r14);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 9px;}
.rc-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.rc-cnt{font-size:11px;color:var(--t3);}
.rc-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:var(--r99);display:inline-block;margin-top:5px;}
.rc-pub{background:rgba(16,185,129,.15);color:var(--g);}
.rc-prv{background:rgba(245,158,11,.15);color:var(--w);}
.crbtn{margin:0 14px 14px;padding:13px;background:var(--grd);border-radius:var(--r14);color:#fff;font-size:14px;font-weight:800;width:calc(100% - 28px);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);transition:all var(--dur);}
.crbtn:active{transform:scale(.98);}
.info-banner{margin:0 14px 12px;padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--r10);font-size:12px;color:var(--w);display:flex;align-items:center;gap:8px;}

/* ── MESSAGES ── */
.msg-list{padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.ml-item{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r14);cursor:pointer;transition:all var(--dur);}
.ml-item:active{background:var(--s3);}
.ml-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff;flex-shrink:0;position:relative;}
.onl{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--g);border-radius:50%;border:2px solid var(--s2);}
.ml-info{flex:1;min-width:0;}
.ml-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.ml-prev{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ml-time{font-size:10px;color:var(--t3);}
.unrd{min-width:18px;height:18px;background:var(--p);color:#fff;font-size:9px;font-weight:800;border-radius:var(--r99);display:flex;align-items:center;justify-content:center;padding:0 4px;}
.new-msg-btn{margin:0 14px 14px;padding:12px;background:transparent;border:1.5px dashed var(--b3);border-radius:var(--r14);color:var(--t3);font-size:13px;font-weight:700;width:calc(100%-28px);display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--dur);}
.new-msg-btn:active{background:var(--s2);}

/* ── PROFILE ── */
.prof-hdr{background:linear-gradient(180deg,rgba(124,58,237,.15) 0%,transparent 100%);padding:26px 16px 16px;text-align:center;}
.prof-av{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#fff;margin:0 auto 11px;border:3px solid rgba(167,139,250,.4);position:relative;}
.prof-cam{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--grd);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;}
.prof-name{font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:3px;}
.prof-handle{font-size:13px;color:var(--t3);margin-bottom:9px;}
.prof-bio{font-size:13px;color:var(--t2);margin-bottom:13px;line-height:1.5;}
.prof-stats{display:flex;justify-content:center;gap:26px;margin-bottom:13px;}
.pst{text-align:center;}
.psn{font-size:19px;font-weight:900;}
.psl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.prof-edt{padding:8px 24px;background:transparent;border:1.5px solid var(--pl);border-radius:var(--r99);color:var(--pl);font-size:13px;font-weight:800;transition:all var(--dur);}
.prof-edt:active{background:rgba(167,139,250,.1);}

/* ── SETTINGS ── */
.sets{padding:0 14px;}
.sg{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r18);overflow:hidden;margin-bottom:10px;}
.si{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;transition:all var(--dur);border-bottom:1px solid var(--b1);}
.si:last-child{border-bottom:none;}
.si:active{background:var(--s3);}
.si-ico{width:34px;height:34px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.si-txt{flex:1;font-size:13px;font-weight:700;}
.si-r{font-size:11px;color:var(--t3);}
.tsw{width:42px;height:22px;background:var(--s4);border-radius:var(--r99);position:relative;cursor:pointer;transition:all .25s;border:1px solid var(--b2);}
.tsw.on{background:var(--grd);border-color:transparent;}
.tsw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .25s;box-shadow:0 2px 6px rgba(0,0,0,.35);}
.tsw.on::after{left:22px;}
.lang-btn{display:flex;gap:6px;}
.lbtn{padding:5px 12px;border-radius:var(--r99);border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:11px;font-weight:800;transition:all var(--dur);}
.lbtn.on{background:var(--grd);border-color:transparent;color:#fff;}

/* ── GLOBAL CHAT ── */
.lounge{margin:0 14px 16px;border:1px solid rgba(124,58,237,.25);border-radius:var(--r24);overflow:hidden;}
.lh{background:linear-gradient(135deg,var(--pd),var(--a));padding:16px;text-align:center;}
.l-ico{font-size:36px;margin-bottom:6px;}
.l-title{font-size:16px;font-weight:800;margin-bottom:2px;}
.l-sub{font-size:11px;opacity:.8;}
.lmsgs{height:200px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;background:var(--s2);scroll-behavior:smooth;}
.mrow{display:flex;gap:7px;align-items:flex-end;}
.mrow.me{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;background:var(--grd);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:#fff;flex-shrink:0;}
.mbub{max-width:74%;}
.mn{font-size:10px;color:var(--t3);margin-bottom:3px;display:flex;align-items:center;gap:3px;}
.mtxt{background:var(--s4);padding:8px 11px;border-radius:3px var(--r10) var(--r10) var(--r10);font-size:12px;line-height:1.5;word-break:break-word;}
.mrow.me .mtxt{background:linear-gradient(135deg,var(--pd),var(--p));border-radius:var(--r10) 3px var(--r10) var(--r10);}
.mts{font-size:9px;color:var(--t3);margin-top:3px;text-align:right;}
.ci-row{display:flex;gap:7px;padding:9px;border-top:1px solid var(--b1);background:var(--s2);}
.ci{flex:1;background:var(--s4);border:1px solid var(--b1);border-radius:var(--r99);padding:9px 13px;color:var(--t1);font-size:13px;}
.ci:focus{border-color:var(--pl);}
.csnd{width:36px;height:36px;border-radius:50%;background:var(--grd);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--dur);}
.csnd:active{transform:scale(.9);}

/* ── DM GROUPS ── */
.dmg-create{margin:0 14px 14px;padding:12px;background:var(--grd);border-radius:var(--r14);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:var(--shadow);}

/* ── SECTION TITLE ── */
.sec{padding:12px 14px 9px;font-size:16px;font-weight:900;}

/* ── OVERLAYS ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.ovl.show{display:flex;animation:ovi .2s ease;}
@keyframes ovi{from{opacity:0;}to{opacity:1;}}
.modal{width:100%;max-width:480px;max-height:92vh;background:var(--s1);border-radius:var(--r24) var(--r24) 0 0;display:flex;flex-direction:column;animation:mup .3s var(--ease);}
@keyframes mup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.auth-ovl .modal{border-radius:var(--r24);margin:auto;max-height:88vh;}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 13px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.mt{font-size:16px;font-weight:900;}
.mcl{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);color:var(--t2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--dur);}
.mcl:active{background:var(--s4);}
.mb{flex:1;overflow-y:auto;padding:16px;}

/* ── CREATE POST ── */
.cu{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.cn{font-size:14px;font-weight:800;}
.cm{font-size:11px;color:var(--t3);margin-top:2px;}
.cta{width:100%;min-height:110px;background:transparent;color:var(--t1);font-size:14px;resize:none;line-height:1.6;}
.cta::placeholder{color:var(--t3);}
.cdv{height:1px;background:var(--b1);margin:13px 0;}
.at-row{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:var(--r10);padding:11px;margin-bottom:11px;}
.at-inf{display:flex;align-items:center;gap:9px;}
.at-inf i{font-size:18px;color:var(--pl);}
.at-b{font-size:13px;font-weight:800;}
.at-sm{font-size:11px;color:var(--t3);margin-top:1px;}
.post-tools{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
.ptool{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r6);padding:7px 11px;color:var(--t2);font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;transition:all var(--dur);}
.ptool:active{background:var(--s3);}
.subp{width:100%;padding:13px;background:var(--grd);border-radius:var(--r14);color:#fff;font-size:14px;font-weight:800;box-shadow:var(--shadow);transition:all var(--dur);}
.subp:active{transform:scale(.98);}

/* ── AUTH ── */
.al-hdr{text-align:center;padding:24px 16px 16px;}
.al-logo{font-size:30px;font-weight:900;}
.al-sub{font-size:13px;color:var(--t2);margin-top:5px;}
.fg{margin-bottom:13px;}
.fl{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;background:var(--s3);border:1.5px solid var(--b1);border-radius:var(--r10);color:var(--t1);font-size:13px;transition:all var(--dur);}
.fi:focus{border-color:var(--pl);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.fi::placeholder{color:var(--t3);}
.frow{display:flex;gap:10px;}
.frow .fg{flex:1;}
.abtn{width:100%;padding:13px;background:var(--grd);border-radius:var(--r14);color:#fff;font-size:14px;font-weight:800;box-shadow:var(--shadow);transition:all var(--dur);margin-bottom:13px;}
.abtn:active{transform:scale(.98);}
.or{display:flex;align-items:center;gap:9px;margin:13px 0;color:var(--t3);font-size:11px;}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--b1);}
.srow{display:flex;gap:8px;margin-bottom:13px;}
.sbtn{flex:1;padding:11px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r10);color:var(--t1);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--dur);}
.sbtn:active{background:var(--s4);}
.aswitch{text-align:center;color:var(--t2);font-size:13px;padding-bottom:5px;}

/* ── CHAT WINDOW ── */
.cw-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
.cw-msgs .mrow.me .mtxt{background:var(--grd);}
.cw-inp{display:flex;gap:7px;padding:9px;border-top:1px solid var(--b1);flex-shrink:0;}

/* ── GATE ── */
.gate{padding:32px 18px;text-align:center;}
.gate i{font-size:42px;color:var(--pl);margin-bottom:13px;display:block;}
.gate h3{font-size:16px;font-weight:900;margin-bottom:6px;}
.gate p{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.5;}
.gate-btn{padding:10px 28px;background:var(--grd);border-radius:var(--r99);color:#fff;font-size:13px;font-weight:800;box-shadow:var(--shadow);}

/* ── GROUPS ── */
.grp-card{display:flex;align-items:center;gap:10px;padding:11px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r14);cursor:pointer;transition:all var(--dur);}
.grp-card:active{background:var(--s3);}
.grp-ico{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--s3);border-radius:var(--r10);flex-shrink:0;}
.grp-info{flex:1;}
.grp-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.grp-meta{font-size:11px;color:var(--t3);}
.grp-role{font-size:9px;font-weight:800;padding:3px 8px;border-radius:var(--r99);background:rgba(124,58,237,.2);color:var(--pl);}

/* ── TOAST ── */
.tw{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none;width:88%;max-width:340px;}
.t{background:var(--s3);border:1px solid var(--b2);border-radius:var(--r10);padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .28s ease,tout .28s ease 2.7s forwards;}
.t.ok{border-color:rgba(16,185,129,.35);}
.t.ok i{color:var(--g);}
.t.er{border-color:rgba(239,68,68,.35);}
.t.er i{color:var(--r);}
.t.in i{color:var(--pl);}
@keyframes tin{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes tout{from{opacity:1;}to{opacity:0;}}

/* ── MISC ── */
.spin{width:30px;height:30px;border:2px solid var(--b2);border-top-color:var(--pl);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:44px 18px;color:var(--t3);}
.empty i{font-size:40px;margin-bottom:11px;display:block;opacity:.35;}
.empty p{font-size:13px;}
.sec-grp-label{padding:4px 14px 8px;font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.divbar{height:1px;background:var(--b1);margin:4px 14px 12px;}
</style>

function go(pg, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  const el = document.getElementById('pg-' + pg);
  if (el) { el.classList.add('show'); }
  if (btn) btn.classList.add('on');
  if (pg === 'profile') buildProfile();
  if (pg === 'settings') buildSettings();
  if (pg === 'msgs') buildMsgs();
  if (pg === 'rooms') { buildRooms(); buildGroups(); }
}

function hdrAuth() {
  if (U) go('profile', document.getElementById('nb-profile'));
  else showLogin();
}

function focusSearch() {
  go('search', document.getElementById('nb-search'));
  setTimeout(() => document.getElementById('srch-inp')?.focus(), 200);
}

function showNotifs() {
  document.getElementById('hbtn-notif').classList.remove('has-dot');
  toast(T('3 new notifications: 2 likes, 1 comment', '৩টি নতুন বিজ্ঞপ্তি: ২টি লাইক, ১টি মন্তব্য'), 'in');
}

function buildStories() {
  const c = document.getElementById('stories');
  c.innerHTML = `<div class="stc st-add" onclick="openPost()">

  DEMO_USERS.forEach(u => {
    c.innerHTML += `<div class="stc" onclick="toast('${u.n}\'s story','in')">

// ════════════════════════════════════════
// FEED
// ════════════════════════════════════════
function renderFeed() {
  let fp = [...posts];
  if (feedTab === 'anon') fp = fp.filter(p => p.anon);
  else if (feedTab === 'verified') fp = fp.filter(p => !p.anon && p.u?.v);
  else if (feedTab === 'following') fp = fp.filter(p => !p.anon);
  else if (feedTab === 'trending') fp = [...fp].sort((a,b) => b.lk - a.lk);
  const feed = document.getElementById('feed');
  feed.innerHTML = fp.length ? fp.map(postHTML).join('') : '<div class="empty"><i class="fas fa-wind"></i><p>No posts here</p></div>';
}

function postHTML(p) {
  const lkd = liked.has(p.id);
  const nm = p.anon ? p.an : (p.u?.n || 'User');
  const av = p.anon ? '🎭' : (p.u?.i || '?');
  const avbg = p.anon ? 'background:linear-gradient(135deg,#374151,#4B5563)' : `background:linear-gradient(135deg,${p.u?.c||'#7C3AED,#06B6D4'})`;
  return `<div class="pc" id="pc${p.id}">
    <div class="pch">
      <div class="pav" style="${avbg}">${av}</div>
      <div class="pm">
        <div class="pn">${esc(nm)} ${p.u?.v&&!p.anon?'<i class="fas fa-check-circle vtick"></i>':''} ${p.anon?'<span class="abadge">ANON</span>':''}</div>
        <div class="pt">${p.t}</div>
      </div>
      <button class="pmor" onclick="postOpts(${p.id})"><i class="fas fa-ellipsis-h"></i></button>
    </div>
    <div class="pb">${esc(p.txt)}</div>
    <div class="pstats"><span>${p.lk+(lkd?1:0)} ${T('reactions','প্রতিক্রিয়া')}</span><span>•</span><span>${p.cmts.length} ${T('comments','মন্তব্য')}</span></div>
    <div class="pacts">
      <button class="pa ${lkd?'lkd':''}" onclick="like(${p.id})"><i class="${lkd?'fas':'far'} fa-heart"></i>${lkd?T('Liked','লাইক করা হয়েছে'):T('Like','লাইক')}</button>
      <button class="pa" onclick="openCmts(${p.id})"><i class="far fa-comment"></i>${T('Comment','মন্তব্য')}</button>
      <button class="pa" onclick="sharePost(${p.id})"><i class="fas fa-share"></i>${T('Share','শেয়ার')}</button>
    </div>
  </div>`;
}

function like(id) {
  if (!U) { showLogin(); toast(T('Login to like posts','পোস্ট লাইক করতে লগইন করুন'), 'er'); return; }
  liked.has(id) ? liked.delete(id) : liked.add(id);
  renderFeed();
  toast(liked.has(id) ? T('❤️ Liked!','❤️ লাইক করা হয়েছে!') : T('Unliked','লাইক তুলে নেওয়া হয়েছে'), 'ok');
}

function sharePost() { toast(T('🔗 Link copied!','🔗 লিংক কপি হয়েছে!'), 'ok'); }

function postOpts(id) {
  const p = posts.find(x => x.id === id);
  if (U && p?.u?.n === U.n) toast(T('Edit / Delete options (backend needed)', 'সম্পাদনা/মুছুন বিকল্প (ব্যাকএন্ড প্রয়োজন)'), 'in');
  else toast(T('Report / Hide (coming soon)', 'রিপোর্ট/লুকান (শীঘ্রই)'), 'in');
}

function switchTab(el, t) {
  document.querySelectorAll('.ftab').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  feedTab = t;
  renderFeed();
}

// ════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════
function doSearch(q) {
  const c = document.getElementById('srch-res');
  if (!q.trim()) { c.innerHTML = '<div class="empty" style="padding:30px 18px;"><i class="fas fa-search"></i><p>Search for people, posts, rooms…</p></div>'; return; }
  const uRes = DEMO_USERS.filter(u => u.n.toLowerCase().includes(q.toLowerCase()) || u.h.toLowerCase().includes(q.toLowerCase()));
  const pRes = posts.filter(p => p.txt.toLowerCase().includes(q.toLowerCase()) && !p.anon);
  if (!uRes.length && !pRes.length) { c.innerHTML = '<div class="empty" style="padding:30px 18px;"><i class="fas fa-search"></i><p>No results found</p></div>'; return; }
  let html = '';
  if (uRes.length) {
    html += `<div class="sec-grp-label">${T('People','মানুষ')}</div><div class="sr-res">`;
    uRes.forEach(u => { html += `<div class="sr-item">
      <div class="sr-av" style="background:linear-gradient(135deg,${u.c});">${u.i}</div>
      <div class="sr-info"><div class="sr-name">${esc(u.n)} ${u.v?'<i class="fas fa-check-circle vtick" style="font-size:12px;"></i>':''}</div><div class="sr-sub">@${u.h}</div></div>
      <button class="sr-act" onclick="startDM('${esc(u.n)}','${u.i}','${u.c}','${esc(u.h)}')">${T('Message','বার্তা')}</button>
    </div>`; });
    html += '</div>';
  }
  if (pRes.length) {
    html += `<div class="sec-grp-label" style="margin-top:10px;">${T('Posts','পোস্ট')}</div><div style="padding:0 14px;display:flex;flex-direction:column;gap:8px;">`;
    pRes.forEach(p => { html += `<div class="pc" onclick="openCmts(${p.id})"><div class="pb" style="padding:12px;">${esc(p.txt.slice(0,100))}${p.txt.length>100?'…':''}</div></div>`; });
    html += '</div>';
  }
  c.innerHTML = html;
}

// COMMENTS
// ════════════════════════════════════════
function genCmts(n) {
  const s = ['Great post! 👏','Agree 💯','So relatable!','Love this ❤️','Thanks for sharing 🙏'];
  return Array.from({length:n},(_,i) => ({un:DEMO_USERS[i%DEMO_USERS.length].n, ui:DEMO_USERS[i%DEMO_USERS.length].i, uc:DEMO_USERS[i%DEMO_USERS.length].c, t:s[i%s.length]}));
}

function openCmts(id) {
  curCmtPid = id;
  const p = posts.find(x => x.id === id);
  const myav = document.getElementById('cmt-myav');
  myav.textContent = U ? U.i : '?';
  myav.style.background = U ? `linear-gradient(135deg,${U.c})` : 'var(--grd)';
  renderCmts(p);
  open_ov('ov-cmt');
}

function renderCmts(p) {
  const c = document.getElementById('cmt-list');
  c.innerHTML = p.cmts.length ? p.cmts.map(cm => `
    <div style="display:flex;gap:9px;">
      <div class="mav" style="width:34px;height:34px;border-radius:50%;font-size:13px;background:linear-gradient(135deg,${cm.uc});">${cm.ui}</div>
      <div style="flex:1;background:var(--s3);padding:9px 11px;border-radius:3px var(--r10) var(--r10) var(--r10);">
        <div style="font-size:12px;font-weight:800;margin-bottom:3px;">${esc(cm.un)}</div>
        <div style="font-size:12px;color:var(--t2);">${esc(cm.t)}</div>
      </div>
    </div>`).join('') : `<div class="empty" style="padding:24px;"><i class="far fa-comment"></i><p>${T('No comments yet. Be first!','এখনও কোনো মন্তব্য নেই। প্রথম হও!')}</p></div>`;
}

function sendCmt() {
  if (!U) { cls('ov-cmt'); showLogin(); toast(T('Login to comment','মন্তব্য করতে লগইন করুন'), 'er'); return; }
  const inp = document.getElementById('cmt-inp');
  const txt = inp.value.trim();
  if (!txt) return;
  const p = posts.find(x => x.id === curCmtPid);
  if (p) { p.cmts.unshift({un:U.n, ui:U.i, uc:U.c, t:txt}); renderCmts(p); inp.value = ''; renderFeed(); toast(T('💬 Comment posted!','💬 মন্তব্য পোস্ট করা হয়েছে!'), 'ok'); }
}

// ════════════════════════════════════════
// CREATE POST
// ════════════════════════════════════════
function openPost() {
  genAnon();
  isAnon = !U;
  document.getElementById('atog').classList.toggle('on', isAnon);
  updateCompose();
  document.getElementById('cta').value = '';
  open_ov('ov-post');
  setTimeout(() => document.getElementById('cta').focus(), 360);
}

function genAnon() {
  anonName = ANON_NAMES[Math.floor(Math.random()*ANON_NAMES.length)] + (Math.floor(Math.random()*90)+10);
  const el = document.getElementById('an-prev');
  if (el) el.textContent = T('Will appear as: ','এভাবে দেখাবে: ') + anonName;
  return anonName;
}

function toggleAnon() {
  isAnon = !isAnon;
  document.getElementById('atog').classList.toggle('on', isAnon);
  updateCompose();
}

function updateCompose() {
  const av = document.getElementById('c-av');
  const nm = document.getElementById('c-name');
  const md = document.getElementById('c-mode');
  const qa = document.getElementById('qav');
  if (isAnon || !U) {
    av.textContent = '🎭';
    av.style.background = 'linear-gradient(135deg,#374151,#4B5563)';
    nm.textContent = anonName;
    md.textContent = T('🎭 Anonymous post','🎭 বেনামী পোস্ট');
  } else {
    av.textContent = U.i; av.style.background = `linear-gradient(135deg,${U.c})`;
    nm.textContent = U.n;
    md.textContent = U.v ? T('✔ Verified post','✔ যাচাইকৃত পোস্ট') : T('Public post','সর্বজনীন পোস্ট');
    qa.textContent = U.i; qa.style.background = `linear-gradient(135deg,${U.c})`;
  }
}
function submitPost() {
  const txt = document.getElementById('cta').value.trim();
  if (!txt) { toast(T('Please write something!','অনুগ্রহ করে কিছু লিখুন!'), 'er'); return; }
  posts.unshift({id:Date.now(), u:(isAnon||!U)?null:U, txt, t:T('Just now','এইমাত্র'), lk:0, anon:isAnon||!U, an:(isAnon||!U)?genAnon():null, cmts:[]});
  cls('ov-post');
  isAnon = false;
  document.getElementById('atog').classList.remove('on');
  renderFeed();
  toast(T('✅ Post published!','✅ পোস্ট প্রকাশিত হয়েছে!'), 'ok');
}

function renderGlobal() {
  const c = document.getElementById('gmsgs');
  c.innerHTML = gMsgs.map(m => {
    const me = U && m.n === U.n;
    return `<div class="mrow ${me?'me':''}">
      <div class="mav" style="background:${m.anon?'linear-gradient(135deg,#374151,#4B5563)':'var(--grd)'};">${m.anon?'🎭':m.n.charAt(0)}</div>
      <div class="mbub"><div class="mn">${esc(m.n)} ${m.v?'<i class="fas fa-check-circle" style="color:var(--g);font-size:9px;"></i>':''}</div>
      <div class="mtxt">${esc(m.t)}</div><div class="mts">${m.ts}</div></div></div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

function sendG() {
  const inp = document.getElementById('ginp');
  const txt = inp.value.trim();
  if (!txt) return;
  gMsgs.push({n:U?U.n:(anonName||genAnon()), t:txt, ts:now(), v:U?.v, anon:!U});
  inp.value = '';
  renderGlobal();
  setTimeout(() => {
    gMsgs.push({n:ANON_NAMES[Math.floor(Math.random()*ANON_NAMES.length)]+(Math.floor(Math.random()*90)+10), t:BOTS[Math.floor(Math.random()*BOTS.length)], ts:now(), anon:true});
    renderGlobal();
  }, 1200 + Math.random() * 2000);
}

function buildRooms() {
  const ca = document.getElementById('crm-area');
  if (U?.v) {
    ca.innerHTML = `<button class="crbtn" onclick="createRoomPrompt()"><i class="fas fa-plus"></i> ${T('Create New Room','নতুন রুম তৈরি করুন')}</button>`;
  } else {
    ca.innerHTML = `<div class="info-banner"><i class="fas fa-crown"></i><span>${T('Only ✔ Verified users can create rooms','শুধু ✔ যাচাইকৃত ব্যবহারকারীরা রুম তৈরি করতে পারবেন')}</span></div>`;
  }
  document.getElementById('rgrid').innerHTML = ROOMS_DATA.map(r => `
    <div class="rc" onclick="openRoom(${r.id},'${r.n}')">
      <div class="rc-ico" style="background:linear-gradient(135deg,${r.c});">${r.ico}</div>
      <div class="rc-name">${r.n}</div>
      <div class="rc-cnt"><i class="fas fa-users" style="font-size:10px;margin-right:3px;"></i>${r.m}</div>

    </div>`).join('');
}

function openRoom(id, name) {
  curRm = {id, name};
  document.getElementById('rm-title').textContent = name;
  if (!rmMsgs[id]) rmMsgs[id] = [{n:'System',t:`${T('Welcome to','স্বাগতম')} ${name}! 👋`,ts:now(),sys:true}];
  renderRmMsgs(id);
  open_ov('ov-room');
}

function renderRmMsgs(id) {
  const c = document.getElementById('rm-msgs');
  c.innerHTML = (rmMsgs[id]||[]).map(m => {
    const me = U && m.n === U.n;
    return `<div class="mrow ${me?'me':''}">
      <div class="mav" style="${m.sys?'background:var(--s4);color:var(--t3);font-size:11px;':'background:var(--grd);'}">${m.sys?'<i class="fas fa-robot"></i>':m.n.charAt(0)}</div>
      <div class="mbub"><div class="mn">${esc(m.n)}</div>
      <div class="mtxt" style="${m.sys?'background:var(--s4);color:var(--t2);':''}">${esc(m.t)}</div>
      <div class="mts">${m.ts}</div></div></div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

function sendRm() {
  if (!curRm) return;
  const inp = document.getElementById('ri');
  const txt = inp.value.trim();
  if (!txt) return;
  const nm = U ? U.n : (anonName||genAnon());
  rmMsgs[curRm.id].push({n:nm, t:txt, ts:now()});
  inp.value = '';
  renderRmMsgs(curRm.id);
  setTimeout(() => {
    rmMsgs[curRm.id].push({n:ANON_NAMES[Math.floor(Math.random()*ANON_NAMES.length)]+'_bot', t:BOTS[Math.floor(Math.random()*BOTS.length)], ts:now()});
    renderRmMsgs(curRm.id);
  }, 1000 + Math.random()*2000);
}

function createRoomPrompt() {
  toast(T('Room creator UI coming with Supabase backend!','সুপাবেস ব্যাকএন্ড সহ রুম ক্রিয়েটর আসছে!'), 'in');

function openGrpSettings(id, name) {
  const g = GROUPS_DATA.find(x => x.id === id);
  const isAdmin = g?.role === 'Admin';
  document.getElementById('gs-title').textContent = name + (LANG==='bn' ? ' সেটিংস' : ' Settings');
  document.getElementById('gs-body').innerHTML = `

function openNewDM() {
  const c = document.getElementById('newdm-list');
  const others = DEMO_USERS.filter(u => U && u.n !== U.n);
  c.innerHTML = others.map(u => `
    <div class="ml-item" onclick="startDM('${esc(u.n)}','${u.i}','${u.c}','${esc(u.h)}');cls('ov-newdm')">
      <div class="ml-av" style="background:linear-gradient(135deg,${u.c});">${u.i}</div>
      <div class="ml-info"><div class="ml-name">${esc(u.n)} ${u.v?'<i class="fas fa-check-circle vtick"></i>':''}</div><div class="ml-prev">@${u.h}</div></div>
    </div>`).join('');
  open_ov('ov-newdm');
}

function startDM(name, initial, color, handle) {
  if (!U) { showLogin(); return; }
  curDM = {name, initial, color, handle};
  const av = document.getElementById('dm-av');
  av.textContent = initial; av.style.background = `linear-gradient(135deg,${color})`;
  document.getElementById('dm-title').textContent = name;
  if (!dmMsgs[name]) dmMsgs[name] = [{n:name, t:T('Hey! 👋 How are you?','হ্যালো! 👋 কেমন আছো?'), ts:now(), other:true}];
  renderDMmsgs(name);
  open_ov('ov-dm');
}

function renderDMmsgs(name) {
  const c = document.getElementById('dm-msgs');
  c.innerHTML = (dmMsgs[name]||[]).map(m => {
    const me = !m.other;
    return `<div class="mrow ${me?'me':''}">
      <div class="mav" style="background:${me?`linear-gradient(135deg,${U?.c||'var(--grd)'})`:`linear-gradient(135deg,${curDM?.color||'#7C3AED,#06B6D4'})`};">${me?(U?.i||'?'):(curDM?.initial||'?')}</div>
      <div class="mbub"><div class="mn">${me?(U?.n||'You'):esc(name)}</div>
      <div class="mtxt">${esc(m.t)}</div><div class="mts">${m.ts}</div></div></div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

function sendDM() {
  if (!curDM) return;
  const inp = document.getElementById('dmi');
  const txt = inp.value.trim();
  if (!txt) return;
  dmMsgs[curDM.name].push({n:U.n, t:txt, ts:now(), other:false});
  inp.value = '';
  renderDMmsgs(curDM.name);
  setTimeout(() => {
    dmMsgs[curDM.name].push({n:curDM.name, t:BOTS[Math.floor(Math.random()*BOTS.length)], ts:now(), other:true});
    renderDMmsgs(curDM.name);
  }, 1000 + Math.random()*2000);
}

    <div class="al-hdr"><div class="al-logo grd-text">Anonlogos</div><div class="al-sub">${T('Create your free account today.','আজই তোমার বিনামূল্যে অ্যাকাউন্ট তৈরি করো।')}</div></div>
    <div class="mb" style="padding-top:0;">
      <div class="frow">
        <div class="fg"><div class="fl">${T('First Name','নাম')}</div><input class="fi" id="sf" placeholder="${T('First','প্রথম')}"></div>
        <div class="fg"><div class="fl">${T('Last Name','পদবি')}</div><input class="fi" id="sl" placeholder="${T('Last','শেষ')}"></div>
      </div>
      <div class="fg"><div class="fl">${T('Username','ইউজারনেম')}</div><input class="fi" id="su" placeholder="@username"></div>
      <div class="fg"><div class="fl">${T('Email','ইমেইল')}</div><input class="fi" id="se" type="email" placeholder="your@email.com"></div>
      <div class="fg"><div class="fl">${T('Password','পাসওয়ার্ড')}</div><input class="fi" id="sp" type="password" placeholder="${T('Min. 6 characters','কমপক্ষে ৬ অক্ষর')}"></div>
      <button class="abtn" onclick="doSignup()"><i class="fas fa-user-plus" style="margin-right:6px;"></i>${T('Create Account','অ্যাকাউন্ট তৈরি করুন')}</button>
      <div class="or">${T('or sign up with','অথবা দিয়ে সাইন আপ করুন')}</div>
      <div class="srow">
        <button class="sbtn" onclick="toast(T('Google coming!','গুগল শীঘ্রই!'),'in')"><i class="fab fa-google" style="color:#EA4335;"></i>Google</button>
        <button class="sbtn" onclick="toast(T('Apple coming!','অ্যাপল শীঘ্রই!'),'in')"><i class="fab fa-apple"></i>Apple</button>
      </div>
      <div class="aswitch">${T('Already have account?','অ্যাকাউন্ট আছে?')} <a onclick="showLogin()">${T('Sign In','সাইন ইন')}</a></div>
    </div>`;

function doLogin() {
  const e = document.getElementById('le')?.value.trim();
  const p = document.getElementById('lp')?.value.trim();
  if (!e || !p) { toast(T('Fill all fields','সব ক্ষেত্র পূরণ করুন'), 'er'); return; }
  if (p.length < 4) { toast(T('Password too short','পাসওয়ার্ড খুব ছোট'), 'er'); return; }
  const c = COLORS[Math.floor(Math.random()*COLORS.length)];
  U = {n:e.includes('@')?e.split('@')[0]:e, h:(e.includes('@')?e.split('@')[0]:e).toLowerCase(), i:(e[0]||'U').toUpperCase(), v:false, bio:'', c};
  afterAuth();
}

function doSignup() {
  const f = document.getElementById('sf')?.value.trim();
  const l = document.getElementById('sl')?.value.trim();
  const u = document.getElementById('su')?.value.trim().replace('@','');
  const e = document.getElementById('se')?.value.trim();
  const p = document.getElementById('sp')?.value.trim();
  if (!f || !e || !p) { toast(T('Fill required fields','প্রয়োজনীয় ক্ষেত্র পূরণ করুন'), 'er'); return; }
  if (p.length < 6) { toast(T('Password min 6 chars','পাসওয়ার্ড কমপক্ষে ৬ অক্ষর'), 'er'); return; }
  const c = COLORS[Math.floor(Math.random()*COLORS.length)];
  U = {n:(f+' '+l).trim(), h:(u||f).toLowerCase(), i:f[0].toUpperCase(), v:false, bio:'', c};
  afterAuth();
}

function afterAuth() {
  cls('ov-auth');
  updateHdrBtn();
  updateCompose();
  buildMsgs();
  buildGroups();
  buildProfile();
  buildSettings();
  renderFeed();
  toast(T(`Welcome, ${U.n}! 🎉`,`স্বাগতম, ${U.n}! 🎉`), 'ok');
}

function logout() {
  U = null;
  liked.clear();
  updateHdrBtn();
  updateCompose();
  buildMsgs();
  buildGroups();
  buildProfile();
  buildSettings();
  renderFeed();
  go('home', document.getElementById('nb-home'));
  toast(T('Logged out successfully','সফলভাবে লগআউট হয়েছে'), 'in');
}

function updateHdrBtn() {
  const btn = document.getElementById('hbtn-auth');
  if (U) {
    btn.innerHTML = `<span style="font-size:11px;font-weight:900;">${U.i}</span>`;
    btn.style.background = `linear-gradient(135deg,${U.c})`;
    btn.style.color = '#fff';
    btn.style.border = 'none';
    btn.onclick = hdrAuth;
  } else {
    btn.innerHTML = '<i class="fas fa-user"></i>';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.border = '';
    btn.onclick = hdrAuth;
  }
}

// ════════════════════════════════════════
// MODAL HELPERS
// ════════════════════════════════════════
function open_ov(id) {
  document.getElementById(id).classList.add('show');
  document.body.style.overflow = 'hidden';
}
function cls(id) {
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow = '';
}
function bgC(e, id) { if (e.target.id === id) cls(id); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.ovl.show').forEach(o => { o.classList.remove('show'); document.body.style.overflow = ''; });
  }
});

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function toast(msg, type = 'in') {
  const icons = {ok:'fa-check-circle', er:'fa-exclamation-circle', in:'fa-info-circle'};
  const w = document.getElementById('tw');
  const el = document.createElement('div');
  el.className = `t ${type}`;
  el.innerHTML = `<i class="fas ${icons[type]}"></i><span>${msg}</span>`;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
