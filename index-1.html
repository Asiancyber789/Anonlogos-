<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL="https://stfxqkrotaffyafwatdp.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0Znhxa3JvdGFmZnlhZndhdGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDQwNTcsImV4cCI6MjA5MjA4MDA1N30.m2U9ubKElKndq3lVvWbPRtu6mIuEHmis3V6nnNX4ySM";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── Constants ─────────────────────────────────────────────────────────────────
const ADJ=["Silent","Shadow","Mystic","Ghost","Phantom","Cosmic","Neon","Stealth","Void","Cipher","Echo","Rogue","Nova","Blur","Spectre"];
const NOUN=["Fox","Wolf","Hawk","Panda","Tiger","Eagle","Lynx","Raven","Cobra","Viper","Falcon","Bear","Shark","Owl","Deer"];
const COLORS=["#7C3AED","#1D4ED8","#BE185D","#0F766E","#B45309","#6D28D9","#9D174D","#1E40AF","#7F1D1D","#064E3B"];
const TAGS=["#মতামত","#রাজনীতি","#প্রযুক্তি","#জীবন","#বিনোদন","#হাস্যরস","#ভালোবাসা","#খেলাধুলা","#শিক্ষা","#খবর"];
const TAG_C={"#মতামত":"#f59e0b","#রাজনীতি":"#ef4444","#প্রযুক্তি":"#3b82f6","#জীবন":"#10b981","#বিনোদন":"#ec4899","#হাস্যরস":"#f97316","#ভালোবাসা":"#f43f5e","#খেলাধুলা":"#84cc16","#শিক্ষা":"#06b6d4","#খবর":"#8b5cf6"};
const REACTIONS=[["🔥","আগুন"],["😂","হাসি"],["😢","কষ্ট"],["😡","রাগ"],["👏","তালি"],["💯","একমত"]];
const MOODS=["😊 ভালো","😔 মন খারাপ","😡 রাগান্বিত","🤔 চিন্তিত","🥳 মজায়","😴 বিরক্ত"];
const PAGE_SIZE=10;

function rnd(a){return a[~~(Math.random()*a.length)];}
function genUser(){return rnd(ADJ)+rnd(NOUN)+(~~(Math.random()*900)+100);}
function genId(){return Math.random().toString(36).substr(2,8);}
function genColor(){return rnd(COLORS);}
function avatarUrl(u){return `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(u)}&backgroundColor=b6e3f4,c0aede,d1d4f9`;}
function timeAgo(ts){
  if(!ts)return "";
  const d=~~((Date.now()-new Date(ts).getTime())/1000);
  if(d<60)return d+"s";if(d<3600)return ~~(d/60)+"m";if(d<86400)return ~~(d/3600)+"h";return ~~(d/86400)+"d";
}
function buildSmartFeed(all){
  const pinned=all.filter(p=>p.pinned);
  const normal=all.filter(p=>!p.pinned);
  const half=Math.ceil(normal.length*.6);
  const mixed=[...normal.slice(0,half),...normal.slice(half).sort(()=>Math.random()-.5)];
  const result=[];let pi=0;
  mixed.forEach((p,i)=>{if(i>0&&i%5===0&&pi<pinned.length)result.push(pinned[pi++]);result.push(p);});
  return result;
}

function getTC(theme){
  const d=theme==="dark";
  return{
    bg:d?"#080810":"#f8fafc",
    card:d?"#0f0f1e":"#ffffff",
    modal:d?"#0d0d1e":"#ffffff",
    border:d?"#1e1e35":"#e2e8f0",
    nav:d?"rgba(8,8,16,.97)":"rgba(248,250,252,.97)",
    input:d?"#0a0a14":"#f1f5f9",
    text:d?"#e2e8f0":"#1e293b",
    sub:d?"#64748b":"#475569",
    dim:d?"#2a2a45":"#94a3b8",
    strip:d?"#0a0a14":"#f1f5f9",
  };
}

function Spin(){return <div style={{display:"flex",justifyContent:"center",padding:30}}><div style={{width:32,height:32,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite"}}/></div>;}

function Av({u,color,size=40,verified=false,isReg=false}){
  const [err,setErr]=useState(false);
  const initials=(u||"?").slice(0,2).toUpperCase();
  return(
    <div style={{position:"relative",flexShrink:0,width:size,height:size}}>
      {isReg&&!err
        ?<img src={avatarUrl(u)} onError={()=>setErr(true)} alt={u} style={{width:size,height:size,borderRadius:"50%",border:`2px solid ${color}66`,objectFit:"cover",background:"#1a1a2e",display:"block"}}/>
        :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.34,fontWeight:800,color:"#fff",border:`2px solid ${color}66`}}>{initials}</div>
      }
      {verified&&<div style={{position:"absolute",bottom:-1,right:-1,background:"#10b981",borderRadius:"50%",width:size*.34,height:size*.34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.18,border:"2px solid #080810"}}>✅</div>}
    </div>
  );
}

function VBadge(){return <span style={{background:"#10b98122",color:"#10b981",fontSize:10,padding:"1px 6px",borderRadius:6,border:"1px solid #10b98144",fontWeight:700,marginLeft:3}}>✅</span>;}
function RBadge(){return <span style={{background:"#7c3aed33",color:"#a855f7",fontSize:10,padding:"1px 5px",borderRadius:6,border:"1px solid #7c3aed55",fontWeight:700,marginLeft:2}}>🆅</span>;}

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  const bg=type==="error"?"linear-gradient(135deg,#ef4444,#b91c1c)":type==="success"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#7c3aed,#3b82f6)";
  return <div style={{position:"fixed",bottom:75,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,zIndex:9999,whiteSpace:"nowrap",fontWeight:600,boxShadow:"0 8px 28px #0008",animation:"fadeIn .3s"}}>{msg}</div>;
}

function BottomSheet({title,onClose,tc,children}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"#000000cc",zIndex:700,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:tc.modal,borderRadius:"24px 24px 0 0",padding:"18px 15px 30px",width:"100%",maxWidth:480,margin:"0 auto",border:`1px solid ${tc.border}`,maxHeight:"92vh",overflowY:"auto",animation:"slideUp .25s ease"}}>
        <div style={{width:40,height:4,background:"#2a2a40",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{color:"#c4b5fd",fontSize:17,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:tc.input,border:"none",color:"#64748b",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function FullScreen({title,onBack,onClose,tc,children,footer}){
  return(
    <div style={{position:"fixed",inset:0,background:tc.bg,zIndex:700,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:tc.nav,borderBottom:`1px solid ${tc.border}`,padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onBack||onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:800,fontSize:17,flex:1}}>{title}</span>
        {onBack&&onClose&&<button onClick={onClose} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px",background:tc.bg}}>{children}</div>
      {footer&&<div style={{borderTop:`1px solid ${tc.border}`,padding:"10px 12px",background:tc.nav,flexShrink:0}}>{footer}</div>}
    </div>
  );
}
// ── Auth ───────────────────────────────────────────────────────────────────────
function AuthModal({onSuccess,onClose,tc}){
  const [mode,setMode]=useState("login");
  const [f,setF]=useState({email:"",username:"",pass:"",bio:""});
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const inp={width:"100%",background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"12px 14px",color:tc.text,fontSize:14,outline:"none",marginBottom:10};

  const submit=async()=>{
    setErr("");setBusy(true);
    try{
      if(mode==="login"){
        const{data,error}=await sb.auth.signInWithPassword({email:f.email,password:f.pass});
        if(error)throw error;
        const{data:p}=await sb.from("users").select("*").eq("id",data.user.id).single();
        onSuccess(p);
      } else {
        if(f.username.length<3){setErr("ইউজারনেম কমপক্ষে ৩ অক্ষর!");setBusy(false);return;}
        if(!f.email.includes("@")){setErr("সঠিক ইমেল দাও!");setBusy(false);return;}
        if(f.pass.length<6){setErr("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!");setBusy(false);return;}
        const{data:ex}=await sb.from("users").select("id").eq("username",f.username).maybeSingle();
        if(ex){setErr("এই ইউজারনেম আগে থেকে আছে!");setBusy(false);return;}
        const{data,error}=await sb.auth.signUp({email:f.email,password:f.pass});
        if(error)throw error;
        const{data:p}=await sb.from("users").insert({id:data.user.id,username:f.username,email:f.email,bio:f.bio||"",color:genColor(),verified:false,admin:false,followers:[],following:[]}).select().single();
        onSuccess(p);
      }
    }catch(e){setErr(e.message||"সমস্যা হয়েছে!");}
    setBusy(false);
  };

  return(
    <BottomSheet title={mode==="login"?"🔐 লগইন":"📝 রেজিস্ট্রেশন"} onClose={onClose} tc={tc}>
      <div style={{display:"flex",gap:6,marginBottom:16,background:tc.input,borderRadius:14,padding:4}}>
        {[["login","লগইন"],["register","রেজিস্ট্রেশন"]].map(([m,l])=>(
          <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:11,padding:"9px",color:mode===m?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:14}}>{l}</button>
        ))}
      </div>
      {mode==="register"&&<input value={f.username} onChange={e=>setF({...f,username:e.target.value})} placeholder="ইউজারনেম" style={inp}/>}
      <input value={f.email} onChange={e=>setF({...f,email:e.target.value})} placeholder="ইমেল" type="email" style={inp}/>
      <input value={f.pass} onChange={e=>setF({...f,pass:e.target.value})} placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)" type="password" style={inp}/>
      {mode==="register"&&<textarea value={f.bio} onChange={e=>setF({...f,bio:e.target.value.slice(0,150)})} placeholder="বায়ো (ঐচ্ছিক)" rows={2} style={{...inp,resize:"none",lineHeight:1.5}}/>}
      {err&&<p style={{color:"#ef4444",fontSize:12,marginBottom:10,background:"#ef444411",padding:"8px 12px",borderRadius:10}}>⚠️ {err}</p>}
      <button onClick={submit} disabled={busy} style={{width:"100%",background:busy?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"13px",color:"#fff",cursor:busy?"default":"pointer",fontWeight:700,fontSize:15}}>
        {busy?"লোড হচ্ছে...":mode==="login"?"লগইন করো 🚀":"রেজিস্ট্রেশন করো ✨"}
      </button>
    </BottomSheet>
  );
}
// ── Poll ───────────────────────────────────────────────────────────────────────
function Poll({poll,postId,myId,onVote,tc}){
  if(!poll)return null;
  const total=poll.options.reduce((a,o)=>a+(o.votes||[]).length,0);
  const voted=(poll.voted||[]).includes(myId);
  return(
    <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid ${tc.border}`,marginBottom:12}}>
      <p style={{color:"#c4b5fd",fontWeight:600,fontSize:13,marginBottom:10}}>📊 {poll.question}</p>
      {poll.options.map((o,i)=>{
        const pct=total?~~((o.votes||[]).length/total*100):0;
        const mine=(o.votes||[]).includes(myId);
        return(
          <div key={i} onClick={()=>!voted&&onVote(postId,i)} style={{marginBottom:8,cursor:voted?"default":"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{color:mine?"#a855f7":tc.sub,fontSize:12,fontWeight:mine?700:400}}>{mine?"✓ ":""}{o.text}</span>
              {voted&&<span style={{color:"#475569",fontSize:11}}>{pct}%</span>}
            </div>
            <div style={{height:6,background:"#1e1e35",borderRadius:3,overflow:"hidden"}}>
              {voted&&<div style={{height:"100%",width:pct+"%",background:mine?"linear-gradient(90deg,#7c3aed,#3b82f6)":"#2a2a40",borderRadius:3,transition:"width .5s"}}/>}
            </div>
          </div>
        );
      })}
      <p style={{color:"#334155",fontSize:11,marginTop:6}}>{total} ভোট{!voted&&" · ক্লিক করো"}</p>
    </div>
  );
}
// ── PostCard ───────────────────────────────────────────────────────────────────
function PostCard({p,me,tc,onLike,onReact,onComment,onShare,onCopy,onBookmark,onVote,onEdit,onDelete,onMsgUser,onViewProfile,onFollow,onAuthReq,comments=[],localLike}){
  const [showC,setShowC]=useState(false);
  const [cText,setCText]=useState("");
  const [replyTo,setReplyTo]=useState(null);
  const [showReact,setShowReact]=useState(false);
  const [showMenu,setShowMenu]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(p.content||"");
  const [exp,setExp]=useState(false);

  const liked=localLike!==undefined?localLike:(p.likes||[]).includes(me.id);
  const rawCount=(p.likes||[]).length;
  const likeCount=localLike!==undefined?(localLike?(p.likes||[]).includes(me.id)?rawCount:rawCount+1:(p.likes||[]).includes(me.id)?rawCount-1:rawCount):rawCount;
  const saved=(p.bookmarks||[]).includes(me.id);
  const tc2=TAG_C[p.tag]||"#7c3aed";
  const isLong=(p.content||"").length>160;
  const totalR=Object.values(p.reactions||{}).reduce((a,v)=>a+(Array.isArray(v)?v.length:0),0);
  const isOwner=me.id===p.author_id;
  const isFollowing=(me.following||[]).includes(p.author_id);
  const canPin=isOwner&&me.type==="registered"&&me.verified===true;

  const submitC=async()=>{
    if(!cText.trim())return;
    await onComment(p.id,{post_id:p.id,author_id:me.id,username:me.username,is_reg:me.type==="registered",verified:me.verified||false,color:me.color,content:cText.trim(),reply_to:replyTo,likes:[]});
    setCText("");setReplyTo(null);
  };

  return(
    <div style={{background:tc.card,border:`1px solid ${p.pinned?"#10b98144":tc.border}`,borderRadius:20,marginBottom:12,overflow:"hidden"}}>
      {p.pinned&&<div style={{background:"#10b98122",padding:"5px 14px",fontSize:11,color:"#10b981",borderBottom:"1px solid #10b98133"}}>📌 পিন করা পোস্ট</div>}
      {p.tag&&<div style={{height:3,background:`linear-gradient(90deg,${tc2},transparent)`}}/>}
      <div style={{padding:"13px 13px 0"}}>
        {/* Header */}
        <div style={{display:"flex",gap:9,marginBottom:10,alignItems:"flex-start"}}>
          <div onClick={()=>p.is_reg&&onViewProfile(p.author_id)} style={{cursor:p.is_reg?"pointer":"default"}}>
            <Av u={p.username} color={p.color} size={38} verified={p.verified||false} isReg={p.is_reg}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
              <span onClick={()=>p.is_reg&&onViewProfile(p.author_id)} style={{color:"#c4b5fd",fontWeight:700,fontSize:14,cursor:p.is_reg?"pointer":"default",textDecoration:p.is_reg?"underline dotted":"none",textUnderlineOffset:3}}>{p.username}</span>
              {p.is_reg&&<RBadge/>}
              {p.verified&&<VBadge/>}
              {p.mood&&<span style={{fontSize:10,background:tc.input,padding:"2px 6px",borderRadius:8,color:tc.sub}}>{p.mood}</span>}
              {p.is_reg&&!isOwner&&(
                <button onClick={()=>me.type==="registered"?onFollow(p.author_id):onAuthReq()} style={{background:isFollowing?"#1a1a2e":"#7c3aed22",border:`1px solid ${isFollowing?"#2a2a40":"#7c3aed55"}`,borderRadius:10,padding:"2px 8px",color:isFollowing?"#475569":"#a855f7",cursor:"pointer",fontSize:10,fontWeight:700}}>
                  {isFollowing?"✓ ফলোয়িং":"+ ফলো"}
                </button>
              )}
            </div>
            <div style={{color:tc.dim,fontSize:11,marginTop:1}}>{timeAgo(p.created_at)} · 👁 {p.views||0}{p.edited&&" · ✏️"}</div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            {p.tag&&<span style={{background:tc2+"22",color:tc2,fontSize:10,padding:"2px 7px",borderRadius:8,border:`1px solid ${tc2}44`,fontWeight:600}}>{p.tag}</span>}
            {me.type==="registered"&&!isOwner&&p.is_reg&&<button onClick={()=>onMsgUser(p)} style={{background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:10,padding:"4px 8px",color:"#a855f7",cursor:"pointer",fontSize:12}}>💌</button>}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowMenu(!showMenu)} style={{background:tc.input,border:"none",color:"#475569",cursor:"pointer",borderRadius:8,padding:"4px 8px",fontSize:14}}>⋯</button>
              {showMenu&&(
                <div style={{position:"absolute",right:0,top:32,background:tc.modal,border:`1px solid ${tc.border}`,borderRadius:14,overflow:"hidden",zIndex:50,minWidth:145,boxShadow:"0 8px 24px #000a"}}>
                  {isOwner&&<button onClick={()=>{setEditing(true);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:tc.sub,padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>✏️ এডিট</button>}
                  {isOwner&&<button onClick={()=>{onDelete(p.id);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#ef4444",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>🗑️ ডিলিট</button>}
                  {canPin&&<button onClick={()=>{onPin(p.id,!p.pinned);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:"#10b981",padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>{p.pinned?"📌 আনপিন":"📌 পিন করো"}</button>}
                  <button onClick={()=>{onCopy(p.id);setShowMenu(false);}} style={{width:"100%",background:"none",border:"none",color:tc.sub,padding:"11px 14px",cursor:"pointer",textAlign:"left",fontSize:13}}>🔗 লিংক কপি</button>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Content */}
        {editing?(
          <div style={{marginBottom:10}}>
            <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={3} style={{width:"100%",background:tc.input,border:"1px solid #7c3aed",borderRadius:12,padding:"10px",color:tc.text,fontSize:14,outline:"none",resize:"none"}}/>
            <div style={{display:"flex",gap:8,marginTop:6}}>

              <button onClick={()=>{setEditing(false);setEditText(p.content||"");}} style={{background:tc.input,border:"none",borderRadius:12,padding:"8px 14px",color:"#64748b",cursor:"pointer",fontSize:13}}>বাতিল</button>
            </div>
          </div>
        ):(

            {isLong&&<span onClick={()=>setExp(!exp)} style={{color:"#7c3aed",cursor:"pointer",marginLeft:5,fontSize:12}}>{exp?"↑ কম":"↓ আরো"}</span>}
          </p>
        )}

        {p.image_url&&<div style={{borderRadius:14,overflow:"hidden",marginBottom:10,border:`1px solid ${tc.border}`}}><img src={p.image_url} alt="post" style={{width:"100%",maxHeight:300,objectFit:"cover",display:"block"}}/></div>}
        {p.poll&&<Poll poll={p.poll} postId={p.id} myId={me.id} onVote={onVote} tc={tc}/>}

        {totalR>0&&(
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {Object.entries(p.reactions||{}).filter(([,v])=>Array.isArray(v)&&v.length>0).map(([r,v])=>(
              <span key={r} onClick={()=>onReact(p.id,r)} style={{background:tc.input,border:`1px solid ${v.includes(me.id)?"#7c3aed":tc.border}`,borderRadius:12,padding:"3px 9px",fontSize:12,cursor:"pointer",color:v.includes(me.id)?"#a855f7":tc.sub}}>{r} {v.length}</span>
            ))}

      <div style={{display:"flex",alignItems:"center",borderTop:`1px solid ${tc.border}`,padding:"6px 4px",position:"relative"}}>

          {ic:"😄",val:totalR,fn:()=>setShowReact(!showReact),active:showReact,col:"#f59e0b"},
          {ic:"💬",val:comments.length,fn:()=>setShowC(!showC),active:showC,col:"#3b82f6"},
          {ic:"🔁",val:p.shares||0,fn:()=>onShare(p.id),active:false,col:"#10b981"},
        ].map((a,i)=>(
          <button key={i} onClick={a.fn} style={{flex:1,background:a.active?a.col+"18":"transparent",border:"none",color:a.active?a.col:"#3f3f5a",cursor:"pointer",padding:"7px 2px",borderRadius:10,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:3,fontWeight:a.active?700:400}}>
            {a.ic}<span style={{fontSize:11}}>{a.val}</span>
          </button>
        ))}
        <button onClick={()=>onBookmark(p.id,saved)} style={{flex:1,background:saved?"#f59e0b18":"transparent",border:"none",color:saved?"#f59e0b":"#3f3f5a",cursor:"pointer",padding:"7px 2px",borderRadius:10,fontSize:13}}>{saved?"🔖":"📌"}</button>
        <button onClick={()=>onCopy(p.id)} style={{flex:1,background:"transparent",border:"none",color:"#3f3f5a",cursor:"pointer",padding:"7px 2px",borderRadius:10,fontSize:13}}>🔗</button>
        {showReact&&(
          <div style={{position:"absolute",bottom:46,left:"50%",transform:"translateX(-50%)",background:tc.modal,border:`1px solid ${tc.border}`,borderRadius:20,padding:"8px 12px",display:"flex",gap:8,zIndex:50,boxShadow:"0 8px 28px #000a"}}>
            {REACTIONS.map(([r])=>(<button key={r} onClick={()=>{onReact(p.id,r);setShowReact(false);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer"}}>{r}</button>))}
          </div>
        )}
      </div>
{/* Comments */}
      {showC&&(
        <div style={{borderTop:`1px solid ${tc.border}`,padding:"12px 13px"}}>
          {comments.length===0&&<p style={{color:tc.dim,fontSize:12,textAlign:"center",marginBottom:10}}>প্রথম কমেন্ট করো! 💬</p>}
          {comments.map(c=>(
            <div key={c.id} style={{display:"flex",gap:8,marginBottom:10}}>
              <Av u={c.username} color={c.color} size={28} verified={c.verified||false} isReg={c.is_reg}/>
              <div style={{flex:1}}>
                <div style={{background:tc.input,borderRadius:12,padding:"8px 11px",border:`1px solid ${tc.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                    <span style={{color:"#a78bfa",fontSize:12,fontWeight:700}}>{c.username}</span>
                    {c.is_reg&&<RBadge/>}{c.verified&&<VBadge/>}
                    <span style={{color:tc.dim,fontSize:10}}>{timeAgo(c.created_at)}</span>
                  </div>
                  {c.reply_to&&<div style={{color:"#334155",fontSize:11,marginBottom:3}}>↩ @{c.reply_to}</div>}
                  <p style={{color:tc.sub,fontSize:13,margin:0}}>{c.content}</p>
                </div>
                <button onClick={()=>setReplyTo(c.username)} style={{background:"none",border:"none",color:tc.dim,cursor:"pointer",fontSize:11,marginTop:3,marginLeft:4}}>↩ রিপ্লাই</button>
              </div>
            </div>
          ))}
          {replyTo&&<div style={{background:tc.input,borderRadius:8,padding:"5px 10px",fontSize:12,color:"#7c3aed",marginBottom:6,display:"flex",justifyContent:"space-between"}}>↩ @{replyTo}<button onClick={()=>setReplyTo(null)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer"}}>✕</button></div>}
          <div style={{display:"flex",gap:7,marginTop:4}}>
            <Av u={me.username} color={me.color} size={28} verified={me.verified||false} isReg={me.type==="registered"}/>
            <input value={cText} onChange={e=>setCText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitC()} placeholder="কমেন্ট লিখুন..." style={{flex:1,background:tc.input,border:`1px solid ${tc.border}`,borderRadius:18,padding:"8px 12px",color:tc.text,fontSize:13,outline:"none"}}/>
            <button onClick={submitC} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:18,padding:"0 13px",color:"#fff",cursor:"pointer",fontSize:14}}>→</button>
          </div>
