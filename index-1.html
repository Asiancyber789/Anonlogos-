      )}
    </div>
  );
}
// ── Compose ────────────────────────────────────────────────────────────────────
function Compose({me,tc,onPost,onClose}){
  const [text,setText]=useState("");
  const [tag,setTag]=useState(TAGS[0]);
  const [mood,setMood]=useState("");
  const [postAs,setPostAs]=useState("me");
  const [showPoll,setShowPoll]=useState(false);
  const [pq,setPq]=useState("");
  const [popts,setPopts]=useState(["",""]);
  const [imgFile,setImgFile]=useState(null);
  const [imgPrev,setImgPrev]=useState(null);
  const [busy,setBusy]=useState(false);
  const fileRef=useRef();

  const handleImg=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>5*1024*1024){alert("ছবি ৫MB এর বেশি হওয়া যাবে না!");return;}
    setImgFile(f);const r=new FileReader();r.onload=ev=>setImgPrev(ev.target.result);r.readAsDataURL(f);
  };

  const submit=async()=>{
    if(!text.trim()&&!imgFile)return;
    setBusy(true);
    const isAnon=me.type==="guest"||(me.type==="registered"&&postAs==="anon");
    let image_url=null;
    if(imgFile){
      const fname=`${genId()}.${imgFile.name.split('.').pop()}`;
      const{error}=await sb.storage.from("post-images").upload(fname,imgFile);
      if(!error){const{data:u}=sb.storage.from("post-images").getPublicUrl(fname);image_url=u.publicUrl;}
    }
    const poll=showPoll&&pq.trim()&&popts.filter(o=>o.trim()).length>=2?{question:pq,options:popts.filter(o=>o.trim()).map(o=>({text:o,votes:[]})),voted:[]}:null;
    await onPost({author_id:isAnon?"anon_"+genId():me.id,username:isAnon?genUser():me.username,is_reg:!isAnon&&me.type==="registered",verified:!isAnon&&(me.verified||false),color:isAnon?genColor():me.color,content:text,tag,mood,image_url,poll,likes:[],reactions:{},shares:0,views:1,bookmarks:[],pinned:false,edited:false});
    setBusy(false);onClose();
  };

  const inp={width:"100%",background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"10px 13px",color:tc.text,fontSize:13,outline:"none",marginBottom:8};
  return(
    <BottomSheet title="✏️ নতুন পোস্ট" onClose={onClose} tc={tc}>
      {me.type==="registered"&&(
        <div style={{display:"flex",gap:6,marginBottom:12,background:tc.input,borderRadius:12,padding:4}}>
          {[["me","🆅 নিজের নামে"],["anon","🎭 বেনামে"]].map(([v,l])=>(
            <button key={v} onClick={()=>setPostAs(v)} style={{flex:1,background:postAs===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":"transparent",border:"none",borderRadius:10,padding:"8px",color:postAs===v?"#fff":"#64748b",cursor:"pointer",fontWeight:700,fontSize:12}}>{l}</button>
          ))}
        </div>
      )}
      <textarea value={text} onChange={e=>setText(e.target.value.slice(0,500))} placeholder="মনের কথা লিখো... 🎭" rows={4} style={{...inp,resize:"none",lineHeight:1.65,borderRadius:14,padding:12,marginBottom:10}}/>
      {imgPrev&&(
        <div style={{position:"relative",marginBottom:10,borderRadius:12,overflow:"hidden",border:`1px solid ${tc.border}`}}>
          <img src={imgPrev} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
          <button onClick={()=>{setImgFile(null);setImgPrev(null);}} style={{position:"absolute",top:6,right:6,background:"#000a",border:"none",color:"#fff",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
      )}
      <div style={{display:"flex",gap:7,marginBottom:10}}>
        <button onClick={()=>fileRef.current.click()} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"7px 12px",color:tc.sub,cursor:"pointer",fontSize:13}}>📷 ছবি</button>
        <button onClick={()=>setShowPoll(!showPoll)} style={{background:showPoll?"#7c3aed33":tc.input,border:`1px solid ${showPoll?"#7c3aed":tc.border}`,borderRadius:12,padding:"7px 12px",color:showPoll?"#a855f7":tc.sub,cursor:"pointer",fontSize:13}}>📊 পোল</button>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
      </div>
      {showPoll&&(
        <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid ${tc.border}`,marginBottom:10}}>
          <input value={pq} onChange={e=>setPq(e.target.value)} placeholder="প্রশ্ন লিখুন..." style={inp}/>
          {popts.map((o,i)=>(<input key={i} value={o} onChange={e=>{const n=[...popts];n[i]=e.target.value;setPopts(n);}} placeholder={`বিকল্প ${i+1}`} style={inp}/>))}
          {popts.length<4&&<button onClick={()=>setPopts([...popts,""])} style={{background:"none",border:"none",color:"#7c3aed",cursor:"pointer",fontSize:12}}>+ আরো</button>}
        </div>
      )}
<div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
        {MOODS.map(m=>(<button key={m} onClick={()=>setMood(mood===m?"":m)} style={{background:mood===m?"#7c3aed33":tc.input,border:`1px solid ${mood===m?"#7c3aed":tc.border}`,borderRadius:14,padding:"5px 10px",color:mood===m?"#a855f7":tc.sub,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{m}</button>))}
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        {TAGS.map(t=>{const c=TAG_C[t];const a=tag===t;return(<button key={t} onClick={()=>setTag(t)} style={{background:a?c+"33":tc.input,border:`1px solid ${a?c:tc.border}`,borderRadius:14,padding:"5px 10px",color:a?c:tc.sub,cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{t}</button>);})}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:500-text.length<50?"#ef4444":tc.dim,fontSize:12}}>{500-text.length} বাকি</span>
        <button onClick={submit} disabled={busy||(!text.trim()&&!imgFile)} style={{background:(!busy&&(text.trim()||imgFile))?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,border:"none",borderRadius:16,padding:"11px 24px",color:(!busy&&(text.trim()||imgFile))?"#fff":tc.sub,cursor:(!busy&&(text.trim()||imgFile))?"pointer":"default",fontWeight:700,fontSize:14}}>
          {busy?"আপলোড হচ্ছে...":"পোস্ট করো 🚀"}
        </button>
      </div>
    </BottomSheet>
  );
}

// ── Messaging (reusable chat UI) ───────────────────────────────────────────────
function ChatUI({me,tc,title,onBack,onClose,messages,onSend,loading=false}){
  const [text,setText]=useState("");
  const endRef=useRef();
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const send=()=>{if(!text.trim())return;onSend(text);setText("");};
  return(
    <FullScreen title={title} onBack={onBack} onClose={onClose} tc={tc}
      footer={<div style={{display:"flex",gap:8}}><input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="মেসেজ লিখুন..." style={{flex:1,background:tc.input,border:`1px solid ${tc.border}`,borderRadius:22,padding:"11px 16px",color:tc.text,fontSize:14,outline:"none"}}/><button onClick={send} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",width:46,height:46,color:"#fff",cursor:"pointer",fontSize:18,flexShrink:0}}>→</button></div>}
    >
      {loading&&<Spin/>}
      {!loading&&messages.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:tc.dim}}><div style={{fontSize:40,marginBottom:8}}>💬</div><p>কথা শুরু করো! 👋</p></div>}
      {messages.map((m,i)=>{
        const isMe=m.user_id===me.id||m.from_id===me.id;
        return(
          <div key={m.id||i} style={{display:"flex",gap:8,marginBottom:12,flexDirection:isMe?"row-reverse":"row"}}>
            {!isMe&&<Av u={m.username||m.from_name} color={m.color||"#7c3aed"} size={30} verified={m.verified||false} isReg={m.is_reg||false}/>}
            <div style={{maxWidth:"75%"}}>
              {!isMe&&<div style={{color:"#a78bfa",fontSize:11,marginBottom:2,display:"flex",alignItems:"center",gap:3}}>{m.username||m.from_name}{m.is_reg&&<RBadge/>}{m.verified&&<VBadge/>}</div>}
              <div style={{background:isMe?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,borderRadius:isMe?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",border:isMe?"none":`1px solid ${tc.border}`}}>
                <p style={{color:"#e2e8f0",fontSize:14,margin:0,lineHeight:1.5,wordBreak:"break-word"}}>{m.content||m.text}</p>
              </div>
              <div style={{color:tc.dim,fontSize:10,marginTop:3,textAlign:isMe?"right":"left"}}>{timeAgo(m.created_at)}</div>
            </div>
          </div>
        );
      })}
      <div ref={endRef}/>
    </FullScreen>
  );
}
// ── Inbox ──────────────────────────────────────────────────────────────────────
function Inbox({me,tc,onClose,setShowGroups}){
  const [threads,setThreads]=useState([]);
  const [selected,setSelected]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [users,setUsers]=useState({});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{load();const i=setInterval(()=>{if(selected)loadMsgs(selected);else load();},8000);return()=>clearInterval(i);},[selected]);

  const load=async()=>{
    const{data}=await sb.from("messages").select("*").or(`from_id.eq.${me.id},to_id.eq.${me.id}`).order("created_at",{ascending:false});
    if(!data){setLoading(false);return;}
    const ids=[...new Set(data.map(m=>m.from_id===me.id?m.to_id:m.from_id))];
    setThreads(ids.map(tid=>({tid,last:data.find(m=>m.from_id===tid||m.to_id===tid),unread:data.filter(m=>m.from_id===tid&&m.to_id===me.id&&!m.read).length})));
    if(ids.length>0){const{data:ud}=await sb.from("users").select("id,username,color,verified").in("id",ids);if(ud){const um={};ud.forEach(u=>um[u.id]=u);setUsers(um);}}
    setLoading(false);
  };
  const loadMsgs=async(tid)=>{const{data}=await sb.from("messages").select("*").or(`and(from_id.eq.${me.id},to_id.eq.${tid}),and(from_id.eq.${tid},to_id.eq.${me.id})`).order("created_at");if(data)setMsgs(data);};
  const send=async(text)=>{const{data}=await sb.from("messages").insert({from_id:me.id,from_name:me.username,to_id:selected,content:text,read:false}).select().single();if(data)setMsgs(m=>[...m,data]);};

  if(selected){
    const u=users[selected];
    return <ChatUI me={me} tc={tc} title={u?u.username:"ইনবক্স"} onBack={()=>setSelected(null)} onClose={onClose} messages={msgs.map(m=>({...m,user_id:m.from_id,username:m.from_name}))} onSend={send}/>;
  }

  return(
    <FullScreen title="📬 ইনবক্স" onBack={null} onClose={onClose} tc={tc}>
      {loading&&<Spin/>}
      {!loading&&threads.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dim}}><div style={{fontSize:44,marginBottom:10}}>💌</div><p>কোনো মেসেজ নেই</p></div>}
      {threads.map(({tid,last,unread})=>{
        const u=users[tid];
        return(
          <div key={tid} onClick={()=>{setSelected(tid);loadMsgs(tid);}} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,cursor:"pointer",background:unread>0?"#7c3aed11":tc.card,border:`1px solid ${unread>0?"#7c3aed33":tc.border}`,marginBottom:10,alignItems:"center"}}>
            {u?<Av u={u.username} color={u.color} size={46} verified={u.verified||false} isReg={true}/>:<div style={{width:46,height:46,borderRadius:"50%",background:tc.input,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🎭</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"#c4b5fd",fontWeight:unread>0?700:500,fontSize:15}}>{u?u.username:"অজানা"}</div>
              <div style={{color:tc.sub,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{last?.content}</div>
            </div>
            {unread>0&&<div style={{background:"#7c3aed",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unread}</div>}
          </div>
        );
      })}
      <div style={{marginTop:12}}>
        <button onClick={()=>{onClose(); setTimeout(()=>setShowGroups(true), 100);}} style={{width:"100%",background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:14,padding:"11px",color:"#a855f7",cursor:"pointer",fontWeight:700,fontSize:14}}>
          ➕ নতুন প্রাইভেট গ্রুপ তৈরি করো
        </button>
      </div>
    </FullScreen>
  );
}
// ── Chat Rooms (Public) + Groups (Private) ─────────────────────────────────────
function Rooms({me,tc,onClose,isGroup=false}){
  const [rooms,setRooms]=useState([]);
  const [active,setActive]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [creating,setCreating]=useState(false);
  const [rname,setRname]=useState("");
  const [groupPic,setGroupPic]=useState(null);
  const [groupPicPreview,setGroupPicPreview]=useState(null);
  const [loading,setLoading]=useState(true);
  const [showMemberModal,setShowMemberModal]=useState(false);
  const [selectedGroup,setSelectedGroup]=useState(null);
  const [friends,setFriends]=useState([]);
  const fileRef=useRef();

  // ✅ সঠিক নিয়ম: গ্রুপ সব রেজিস্টার্ড, রুম শুধু ভেরিফাইড
  const canCreate = isGroup 
    ? (me.type === "registered")  // গ্রুপ: যেকোনো রেজিস্টার্ড ইউজার
    : (me.type === "registered" && me.verified === true); // রুম: শুধু ভেরিফাইড

  useEffect(()=>{load();const i=setInterval(()=>{if(active)loadMsgs(active.id);else load();},8000);return()=>clearInterval(i);},[active]);

  const load=async()=>{
    const table=isGroup?"groups":"rooms";
    const{data}=await sb.from(table).select("*").order("created_at",{ascending:false});
    if(data){
      if(isGroup){
        const myGroups=data.filter(g=>g.members?.includes(me.id));
        setRooms(myGroups);
      }else setRooms(data);
    }
    setLoading(false);
  };
  
  const loadFriends=async()=>{
    const{data}=await sb.from("users").select("id,username,color,verified").neq("id",me.id);
    if(data)setFriends(data);
  };
  
  const loadMsgs=async(id)=>{
    const table=isGroup?"group_messages":"room_messages";
    const{data}=await sb.from(table).select("*").eq(isGroup?"group_id":"room_id",id).order("created_at");
    if(data)setMsgs(data);
  };
  const handleGroupPic=(e)=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>2*1024*1024){alert("ছবি ২MB এর কম হতে হবে!");return;}
    const url=URL.createObjectURL(f);setGroupPic(f);setGroupPicPreview(url);
  };
  const uploadPic=async()=>{
    if(!groupPic)return null;
    const ext=groupPic.name.split('.').pop();
    const fname=`${genId()}.${ext}`;
    const{error}=await sb.storage.from("group-pics").upload(fname,groupPic);
    if(error){console.error(error);return null;}
    const{data:u}=sb.storage.from("group-pics").getPublicUrl(fname);
    return u.publicUrl;
  };
  const create=async()=>{
    if(!canCreate||!rname.trim())return;
    let avatarUrl=null;
    if(isGroup&&groupPic)avatarUrl=await uploadPic();
    if(isGroup){
      const{data}=await sb.from("groups").insert({name:rname,members:[me.id],admin_id:me.id,avatar:avatarUrl}).select().single();
      if(data){setRooms(r=>[data,...r]);setRname("");setGroupPic(null);setGroupPicPreview(null);setCreating(false);}
    }else{
      const{data}=await sb.from("rooms").insert({name:rname,owner_id:me.id,owner_name:me.username}).select().single();
      if(data){setRooms(r=>[data,...r]);setRname("");setCreating(false);}
    }
  };
  
  const addMember = async (groupId, userId) => {
    const grp = rooms.find(r => r.id === groupId);
    if (!grp || grp.admin_id !== me.id) return;
    if (grp.members?.includes(userId)) return;
    const newMembers = [...(grp.members || []), userId];
    await sb.from("groups").update({ members: newMembers }).eq("id", groupId);
    await load();
    setShowMemberModal(false);
  };
  
  const leaveGroup=async(groupId)=>{
    const grp=rooms.find(r=>r.id===groupId);
    if(!grp)return;
    const newMembers=(grp.members||[]).filter(id=>id!==me.id);
    await sb.from("groups").update({members:newMembers}).eq("id",groupId);
    load();
    if(active?.id===groupId)setActive(null);
  };
  const del=async(id)=>{
    const table=isGroup?"groups":"rooms";
    await sb.from(table).delete().eq("id",id);
    setRooms(r=>r.filter(x=>x.id!==id));
  };
  const send=async(text)=>{
    const table=isGroup?"group_messages":"room_messages";
    const idField=isGroup?"group_id":"room_id";
    const{data}=await sb.from(table).insert({[idField]:active.id,user_id:me.id,username:me.username,is_reg:me.type==="registered",verified:me.verified||false,color:me.color,content:text}).select().single();
    if(data)setMsgs(m=>[...m,data]);
  };

  if(active)return <ChatUI me={me} tc={tc} title={active.name} onBack={()=>setActive(null)} onClose={onClose} messages={msgs} onSend={send}/>;

  return(
    <FullScreen title={isGroup?"👥 প্রাইভেট গ্রুপ":"💬 পাবলিক রুম"} onBack={null} onClose={onClose} tc={tc}>
      {canCreate?(
        <button onClick={()=>setCreating(!creating)} style={{width:"100%",background:`linear-gradient(135deg,${isGroup?"#7c3aed,#3b82f6":"#10b981,#059669"})`,border:"none",borderRadius:14,padding:"12px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginBottom:12}}>
          + {isGroup?"নতুন প্রাইভেট গ্রুপ তৈরি করো":"নতুন পাবলিক রুম তৈরি করো"} {isGroup?"👥":"✅"}
        </button>
      ):(
        <div style={{background:"#10b98111",border:"1px solid #10b98133",borderRadius:14,padding:"14px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:6}}>🔒</div>
          <p style={{color:"#10b981",fontSize:13,fontWeight:600}}>
            {isGroup?"রেজিস্ট্রেশন করলে গ্রুপ তৈরি করতে পারবে":"শুধুমাত্র ✅ ভেরিফাইড ইউজাররা পাবলিক রুম তৈরি করতে পারবে"}
          </p>
        </div>
      )}
      {creating&&canCreate&&(
        <div style={{background:tc.input,borderRadius:14,padding:12,border:`1px solid ${isGroup?"#7c3aed44":"#10b98144"}`,marginBottom:12}}>
          <input value={rname} onChange={e=>setRname(e.target.value)} onKeyDown={e=>e.key==="Enter"&&create()} placeholder={isGroup?"গ্রুপের নাম...":"রুমের নাম..."} style={{width:"100%",background:tc.bg,border:`1px solid ${tc.border}`,borderRadius:12,padding:"10px 13px",color:tc.text,fontSize:13,outline:"none",marginBottom:8}}/>
          {isGroup&&(
            <div style={{marginBottom:12}}>
              <div onClick={()=>fileRef.current.click()} style={{width:64,height:64,borderRadius:"50%",background:tc.input,border:`2px dashed #7c3aed`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",marginBottom:6}}>
                {groupPicPreview?<img src={groupPicPreview} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24,color:"#64748b"}}>📷</span>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" onChange={handleGroupPic} style={{display:"none"}}/>
              <p style={{color:tc.dim,fontSize:11,textAlign:"center"}}>গ্রুপ ফটো (ঐচ্ছিক)</p>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={create} style={{flex:1,background:`linear-gradient(135deg,${isGroup?"#7c3aed,#3b82f6":"#10b981,#059669"})`,border:"none",borderRadius:12,padding:"9px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>তৈরি করো ✓</button>
            <button onClick={()=>{setCreating(false);setGroupPic(null);setGroupPicPreview(null);}} style={{background:tc.input,border:"none",borderRadius:12,padding:"9px 14px",color:"#64748b",cursor:"pointer",fontSize:13}}>বাতিল</button>
          </div>
        </div>
      )}
      {loading&&<Spin/>}
      {!loading&&rooms.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dim}}><div style={{fontSize:44,marginBottom:10}}>{isGroup?"👥":"💬"}</div><p>কোনো {isGroup?"গ্রুপ":"রুম"} নেই এখনো</p></div>}
      {rooms.map(r=>(
        <div key={r.id} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,background:tc.card,border:`1px solid ${tc.border}`,marginBottom:10,alignItems:"center",cursor:"pointer"}} onClick={()=>{setActive(r);loadMsgs(r.id);}}>
          <div style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${isGroup?"#7c3aed,#3b82f6":"#7c3aed,#3b82f6"})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
            {isGroup?(r.avatar?<img src={r.avatar} style={{width:"100%",height:"100%",borderRadius:"50%",objectFit:"cover"}}/>:"👥"):"💬"}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{r.name}</div>
            {isGroup?<div style={{color:tc.sub,fontSize:11,marginTop:2}}>👥 {r.members?.length||0} সদস্য</div>:<div style={{color:tc.sub,fontSize:12,marginTop:2}}>by {r.owner_name}</div>}
          </div>
          {isGroup&&r.admin_id===me.id&&(
            <button onClick={async(e)=>{e.stopPropagation();await loadFriends();setSelectedGroup(r);setShowMemberModal(true);}} style={{background:"#3b82f622",border:"1px solid #3b82f644",borderRadius:10,padding:"6px 10px",color:"#3b82f6",cursor:"pointer",fontSize:12,flexShrink:0}}>👥 +</button>
          )}
          {isGroup&&r.members?.includes(me.id)&&r.admin_id!==me.id&&(
            <button onClick={e=>{e.stopPropagation();leaveGroup(r.id);}} style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:10,padding:"6px 10px",color:"#ef4444",cursor:"pointer",fontSize:12,flexShrink:0}}>🚪 লিভ</button>
          )}
          {!isGroup&&me.id===r.owner_id&&<button onClick={e=>{e.stopPropagation();del(r.id);}} style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:10,padding:"6px 10px",color:"#ef4444",cursor:"pointer",fontSize:13,flexShrink:0}}>🗑️</button>}
        </div>
      ))}
      
      {/* সদস্য যোগ করার মডাল */}
      {showMemberModal && (
        <div onClick={()=>setShowMemberModal(false)} style={{position:"fixed",inset:0,background:"#000000cc",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:tc.modal,borderRadius:"24px 24px 0 0",padding:"20px",width:"100%",maxWidth:480,margin:"0 auto"}}>
            <h3 style={{color:"#c4b5fd",marginBottom:15}}>👥 সদস্য যোগ করো</h3>
            {friends.filter(f=>!selectedGroup?.members?.includes(f.id)).map(f=>(
              <div key={f.id} onClick={()=>addMember(selectedGroup.id,f.id)} style={{display:"flex",alignItems:"center",gap:10,padding:10,borderRadius:12,cursor:"pointer",background:tc.input,marginBottom:8}}>
                <Av u={f.username} color={f.color} size={36} verified={f.verified||false} isReg={true}/>
                <span style={{color:tc.text}}>{f.username}</span>
              </div>
            ))}
            {friends.filter(f=>!selectedGroup?.members?.includes(f.id)).length===0&&<p style={{color:tc.dim,textAlign:"center",padding:20}}>আর কোনো বন্ধু যোগ করার নেই</p>}
            <button onClick={()=>setShowMemberModal(false)} style={{width:"100%",background:tc.input,border:"none",borderRadius:14,padding:12,marginTop:10,color:tc.sub,cursor:"pointer"}}>বন্ধ করুন</button>
          </div>
        </div>
      )}
    </FullScreen>
  );
}
// ── Notifications ──────────────────────────────────────────────────────────────
function Notifs({me,tc,onClose}){
  const [notifs,setNotifs]=useState([]);
  useEffect(()=>{sb.from("notifications").select("*").eq("to_id",me.id).order("created_at",{ascending:false}).limit(30).then(({data})=>{if(data)setNotifs(data);});},[]);
  const markAll=async()=>{await sb.from("notifications").update({read:true}).eq("to_id",me.id);setNotifs(n=>n.map(x=>({...x,read:true})));};
  const icons={"like":"❤️","comment":"💬","follow":"👤","mention":"🏷️"};
  return(
    <FullScreen title="🔔 নোটিফিকেশন" onBack={null} onClose={onClose} tc={tc}>
      {notifs.some(n=>!n.read)&&<button onClick={markAll} style={{width:"100%",background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"9px",color:"#7c3aed",cursor:"pointer",fontSize:13,fontWeight:600,marginBottom:12}}>সব পড়া ✓</button>}
      {notifs.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dim}}><div style={{fontSize:44,marginBottom:10}}>🔔</div><p>কোনো নোটিফিকেশন নেই</p></div>}
      {notifs.map(n=>(
        <div key={n.id} style={{display:"flex",gap:10,padding:"13px",borderRadius:16,background:n.read?tc.card:"#7c3aed11",border:`1px solid ${n.read?tc.border:"#7c3aed33"}`,marginBottom:10,alignItems:"center"}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:tc.input,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,border:`1px solid ${tc.border}`}}>{icons[n.type]||"🔔"}</div>
          <div style={{flex:1}}>
            <span style={{color:"#a78bfa",fontWeight:700,fontSize:14}}>{n.from_username} </span>
            <span style={{color:tc.sub,fontSize:13}}>{n.content}</span>
            <div style={{color:tc.dim,fontSize:11,marginTop:3}}>{timeAgo(n.created_at)}</div>
          </div>
          {!n.read&&<div style={{width:9,height:9,borderRadius:"50%",background:"#7c3aed",flexShrink:0}}/>}
        </div>
      ))}
    </FullScreen>
  );
}

// ── User Search ────────────────────────────────────────────────────────────────
function UserSearch({me,tc,onViewProfile,onFollow,onClose}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{
    if(!q.trim()){setResults([]);return;}
    const timer=setTimeout(async()=>{setBusy(true);const{data}=await sb.from("users").select("*").ilike("username",`%${q}%`).neq("id",me.id).limit(20);if(data)setResults(data);setBusy(false);},400);
    return()=>clearTimeout(timer);
  },[q]);
  return(
    <FullScreen title="🔍 ইউজার খোঁজো" onBack={null} onClose={onClose} tc={tc}>
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="ইউজারনেম লিখো..." style={{width:"100%",background:tc.input,border:`1px solid #7c3aed44`,borderRadius:20,padding:"10px 14px",color:tc.text,fontSize:14,outline:"none",marginBottom:12}}/>
      {busy&&<Spin/>}
      {!busy&&!q.trim()&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dim}}><div style={{fontSize:44,marginBottom:10}}>👥</div><p>ইউজারনেম লিখলে রেজাল্ট দেখাবে</p></div>}
      {!busy&&q.trim()&&results.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:tc.dim}}><div style={{fontSize:44,marginBottom:10}}>🔍</div><p>কোনো ইউজার পাওয়া যায়নি</p></div>}
      {results.map(u=>{
        const isF=(me.following||[]).includes(u.id);
        return(
          <div key={u.id} style={{display:"flex",gap:10,padding:"14px",borderRadius:16,background:tc.card,border:`1px solid ${tc.border}`,marginBottom:10,alignItems:"center"}}>
            <div onClick={()=>{onViewProfile(u.id);onClose();}} style={{cursor:"pointer",flexShrink:0}}><Av u={u.username} color={u.color} size={46} verified={u.verified||false} isReg={true}/></div>
            <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>{onViewProfile(u.id);onClose();}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#c4b5fd",fontWeight:700,fontSize:15}}>{u.username}</span><RBadge/>{u.verified&&<VBadge/>}</div>
              <div style={{color:tc.sub,fontSize:12,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.bio||"বায়ো নেই"}</div>
            </div>
            {me.type==="registered"&&<button onClick={()=>onFollow(u.id)} style={{background:isF?"#1a1a2e":"#7c3aed22",border:`1px solid ${isF?"#2a2a40":"#7c3aed55"}`,borderRadius:12,padding:"7px 13px",color:isF?"#475569":"#a855f7",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0}}>{isF?"✓ ফলোয়িং":"+ ফলো"}</button>}
          </div>
        );
      })}
    </FullScreen>
  );
}
// ── Settings ───────────────────────────────────────────────────────────────────
function Settings({theme,setTheme,lang,setLang,tc,onClose}){
  return(
    <BottomSheet title="⚙️ সেটিংস" onClose={onClose} tc={tc}>
      <p style={{color:tc.sub,fontSize:13,fontWeight:600,marginBottom:10}}>🎨 থিম</p>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["dark","🌙 ডার্ক"],["light","☀️ লাইট"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setTheme(v);localStorage.setItem("al_theme",v);document.body.className=v==="light"?"light":"";}} style={{flex:1,background:theme===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,border:`1px solid ${theme===v?"#7c3aed":tc.border}`,borderRadius:14,padding:"14px",color:theme===v?"#fff":tc.sub,cursor:"pointer",fontWeight:theme===v?700:400,fontSize:14}}>{l}</button>
        ))}
      </div>
      <p style={{color:tc.sub,fontSize:13,fontWeight:600,marginBottom:10}}>🌐 ভাষা</p>
      <div style={{display:"flex",gap:8}}>
        {[["bn","🇧🇩 বাংলা"],["en","🇬🇧 English"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setLang(v);localStorage.setItem("al_lang",v);}} style={{flex:1,background:lang===v?"linear-gradient(135deg,#7c3aed,#3b82f6)":tc.input,border:`1px solid ${lang===v?"#7c3aed":tc.border}`,borderRadius:14,padding:"14px",color:lang===v?"#fff":tc.sub,cursor:"pointer",fontWeight:lang===v?700:400,fontSize:14}}>{l}</button>
        ))}
      </div>
    </BottomSheet>
  );
}
// ── Profile Page ───────────────────────────────────────────────────────────────
function ProfilePage({userId,me,tc,onBack,onFollow,onMsgUser,onLogout,onSettings,...cardProps}){
  const [user,setUser]=useState(null);
  const [posts,setPosts]=useState([]);
  const [cmts,setCmts]=useState([]);
  const [editBio,setEditBio]=useState(false);
  const [bio,setBio]=useState("");

  useEffect(()=>{
    sb.from("users").select("*").eq("id",userId).single().then(({data})=>{if(data){setUser(data);setBio(data.bio||"");}});
    sb.from("posts").select("*").eq("author_id",userId).order("created_at",{ascending:false}).then(({data})=>{
      if(data){setPosts(data);if(data.length>0)sb.from("comments").select("*").in("post_id",data.map(p=>p.id)).then(({data:c})=>{if(c)setCmts(c);});}
    });
  },[userId]);

  const saveBio=async()=>{await sb.from("users").update({bio}).eq("id",me.id);setUser(u=>({...u,bio}));setEditBio(false);};
  const copyLink=()=>{navigator.clipboard?.writeText(`${window.location.href.split('?')[0]}?profile=${userId}`).catch(()=>{});};
  const isOwn=me.id===userId;
  const isF=(me.following||[]).includes(userId);
  const totalLikes=posts.reduce((a,p)=>a+(p.likes||[]).length,0);

  if(!user)return <div style={{minHeight:"100vh",background:tc.bg}}><Spin/></div>;

  return(
    <div style={{paddingBottom:80,minHeight:"100vh",background:tc.bg}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 12px 0",position:"sticky",top:0,background:tc.nav,zIndex:50}}>
        <button onClick={onBack} style={{background:tc.input,border:"none",color:"#64748b",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
        <span style={{color:"#c4b5fd",fontWeight:700,fontSize:16,flex:1}}>প্রোফাইল</span>
        {isOwn&&<button onClick={onSettings} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:12,padding:"6px 12px",color:tc.sub,cursor:"pointer",fontSize:13}}>⚙️ সেটিংস</button>}
      </div>
      <div style={{background:tc.card,border:`1px solid ${tc.border}`,borderRadius:20,padding:"24px 14px",textAlign:"center",margin:"10px 10px 14px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Av u={user.username} color={user.color} size={76} verified={user.verified||false} isReg={true}/></div>
        <h2 style={{color:"#c4b5fd",fontSize:19,fontWeight:800}}>{user.username}<RBadge/>{user.verified&&<VBadge/>}</h2>
        <p style={{color:tc.dim,fontSize:11,marginTop:4}}>{timeAgo(user.created_at)} আগে যোগ দিয়েছে</p>

        {isOwn?(
          <div style={{marginTop:8,maxWidth:300,margin:"8px auto 4px"}}>
            {editBio?(
              <div>
                <textarea value={bio} onChange={e=>setBio(e.target.value.slice(0,150))} rows={2} style={{width:"100%",background:tc.input,border:"1px solid #7c3aed",borderRadius:12,padding:"9px 12px",color:tc.text,fontSize:13,outline:"none",resize:"none",lineHeight:1.5}}/>
                <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:5}}>
                  <button onClick={()=>{setEditBio(false);setBio(user.bio||"");}} style={{background:tc.input,border:"none",borderRadius:10,padding:"6px 12px",color:"#64748b",cursor:"pointer",fontSize:12}}>বাতিল</button>
                  <button onClick={saveBio} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:10,padding:"6px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>সেভ</button>
                </div>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6}}>
                <p style={{color:tc.sub,fontSize:13}}>{user.bio||"বায়ো যোগ করোনি..."}</p>
                <button onClick={()=>setEditBio(true)} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:8,padding:"3px 8px",color:"#475569",cursor:"pointer",fontSize:11}}>✏️</button>
              </div>
            )}
          </div>
        ):(user.bio&&<p style={{color:tc.sub,fontSize:13,marginTop:6}}>{user.bio}</p>)}

        <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:tc.input,borderRadius:14,overflow:"hidden",border:`1px solid ${tc.border}`}}>
          {[["পোস্ট",posts.length,"#a855f7"],["লাইক",totalLikes,"#ec4899"],["ফলোয়ার",(user.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
            <div key={i} style={{flex:1,padding:"12px 4px",textAlign:"center",borderRight:i<arr.length-1?`1px solid ${tc.border}`:"none"}}>
              <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#475569"}}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={copyLink} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:14,padding:"9px 14px",color:tc.sub,cursor:"pointer",fontWeight:600,fontSize:12}}>🔗 আইডি লিংক</button>
          {!isOwn&&me.type==="registered"&&(
            <>
              <button onClick={()=>onFollow(user.id)} style={{background:isF?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#3b82f6)",border:isF?"1px solid #2a2a40":"none",borderRadius:14,padding:"9px 18px",color:isF?"#64748b":"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>{isF?"✓ আনফলো":"+ ফলো"}</button>
              <button onClick={()=>onMsgUser({author_id:user.id,username:user.username})} style={{background:"#7c3aed22",border:"1px solid #7c3aed44",borderRadius:14,padding:"9px 14px",color:"#a855f7",cursor:"pointer",fontWeight:600,fontSize:13}}>💌 মেসেজ</button>
            </>
)}
          {isOwn&&<button onClick={onLogout} style={{background:tc.input,border:`1px solid ${tc.border}`,borderRadius:14,padding:"9px 18px",color:tc.sub,cursor:"pointer",fontWeight:600,fontSize:13}}>লগআউট</button>}
        </div>
      </div>
      <div style={{padding:"0 10px"}}>
        {posts.length===0?<p style={{textAlign:"center",color:tc.dim,padding:36}}>কোনো পোস্ট নেই</p>
          :posts.map(p=><PostCard key={p.id} p={p} me={me} tc={tc} comments={cmts.filter(c=>c.post_id===p.id)} onFollow={onFollow} onMsgUser={onMsgUser} {...cardProps}/>)
        }
      </div>
    </div>
  );
}
// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [guest]=useState(()=>({type:"guest",username:genUser(),id:"guest_"+genId(),color:genColor(),following:[],verified:false}));
  const me=profile?{...profile,type:"registered"}:guest;

  const [posts,setPosts]=useState([]);
  const [comments,setComments]=useState([]);
  const [page,setPage]=useState(0);
  const [hasMore,setHasMore]=useState(true);
  const [loadingMore,setLoadingMore]=useState(false);
  const [pendingLikes,setPendingLikes]=useState({});

  const [tab,setTab]=useState("feed");
  const [activeTag,setActiveTag]=useState("সব");
  const [sort,setSort]=useState("smart");

  const [showAuth,setShowAuth]=useState(false);
  const [showInbox,setShowInbox]=useState(false);
  const [showRooms,setShowRooms]=useState(false);
  const [showGroups,setShowGroups]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [compose,setCompose]=useState(false);

  const [viewProfile,setViewProfile]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const [searchOpen,setSearchOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [appLoading,setAppLoading]=useState(true);
  const [unreadN,setUnreadN]=useState(0);
  const [unreadM,setUnreadM]=useState(0);

  const [theme,setTheme]=useState(()=>localStorage.getItem("al_theme")||"dark");
  const [lang,setLang]=useState(()=>localStorage.getItem("al_lang")||"bn");
  const TC=getTC(theme);

  const loaderRef=useRef();
  const feedTopRef=useRef();

  useEffect(()=>{document.body.className=theme==="light"?"light":"";localStorage.setItem("al_theme",theme);},[theme]);

  const msg=(m,type="info")=>setToast({m,type});

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const pid=p.get("profile");
    if(pid){setViewProfile(pid);window.history.replaceState({},"",window.location.pathname);}
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session)sb.from("users").select("*").eq("id",session.user.id).single().then(({data})=>{if(data)setProfile(data);setAppLoading(false);});
      else setAppLoading(false);
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if(session)sb.from("users").select("*").eq("id",session.user.id).single().then(({data})=>{if(data)setProfile(data);});
      else setProfile(null);
    });
  },[]);

const loadPosts=useCallback(async(reset=false)=>{
    if(loadingMore&&!reset)return;
    setLoadingMore(true);
    const pg=reset?0:page;
    let q2=sb.from("posts").select("*");
    if(activeTag!=="সব")q2=q2.eq("tag",activeTag);
    if(sort==="top")q2=q2.order("likes",{ascending:false});
    else q2=q2.order("created_at",{ascending:false});
    q2=q2.range(pg*PAGE_SIZE,(pg+1)*PAGE_SIZE-1);
    const{data}=await q2;
    if(data){
      if(reset){setPosts(data);setPendingLikes({});}
      else setPosts(prev=>[...prev,...data.filter(np=>!prev.find(ep=>ep.id===np.id))]);
      setHasMore(data.length===PAGE_SIZE);
      if(reset)setPage(1);else setPage(p=>p+1);
      const ids=(reset?data:[...posts,...data]).map(p=>p.id);
      if(ids.length>0){const{data:c}=await sb.from("comments").select("*").in("post_id",ids).order("created_at");if(c)setComments(c);}
    }
    setLoadingMore(false);
  },[activeTag,sort,page,loadingMore]);

  useEffect(()=>{loadPosts(true);},[activeTag,sort]);

  useEffect(()=>{
    if(!loaderRef.current)return;
    const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting&&hasMore&&!loadingMore)loadPosts(false);},{threshold:0.1});
    obs.observe(loaderRef.current);
    return()=>obs.disconnect();
  },[hasMore,loadingMore,loadPosts]);

  useEffect(()=>{
    if(profile){checkUnread();}
    const i=setInterval(()=>{if(profile)checkUnread();},30000);
    return()=>clearInterval(i);
  },[profile]);

  const checkUnread=async()=>{
    if(!profile)return;
    const[{count:nc},{count:mc}]=await Promise.all([
      sb.from("notifications").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false),
      sb.from("messages").select("*",{count:"exact",head:true}).eq("to_id",profile.id).eq("read",false),
    ]);
    setUnreadN(nc||0);setUnreadM(mc||0);
  };

  const logout=async()=>{await sb.auth.signOut();setProfile(null);setViewProfile(null);msg("👋 লগআউট হয়েছে");};

  const addPost=async(data)=>{
    const{data:p,error}=await sb.from("posts").insert(data).select().single();
    if(error){msg("পোস্ট করতে সমস্যা হয়েছে!","error");return;}
    if(p)setPosts(prev=>[p,...prev]);
    msg("✅ পোস্ট শেয়ার হয়েছে!","success");
  };

  const onLike=async(id,liked)=>{
    setPendingLikes(pl=>({...pl,[id]:!liked}));
    const post=posts.find(p=>p.id===id);if(!post)return;
    const newLikes=liked?(post.likes||[]).filter(u=>u!==me.id):[...(post.likes||[]),me.id];
    const{error}=await sb.from("posts").update({likes:newLikes}).eq("id",id);
    if(error){setPendingLikes(pl=>({...pl,[id]:liked}));return;}
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,likes:newLikes}));
    setPendingLikes(pl=>{const n={...pl};delete n[id];return n;});
    if(!liked&&post.author_id!==me.id)await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"like",content:"তোমার পোস্টে লাইক দিয়েছে ❤️",read:false});
  };

  const onReact=async(id,r)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const rc={...post.reactions||{}};if(!rc[r])rc[r]=[];
    rc[r]=rc[r].includes(me.id)?rc[r].filter(u=>u!==me.id):[...rc[r],me.id];
    await sb.from("posts").update({reactions:rc}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,reactions:rc}));
  };

  const onComment=async(pid,cdata)=>{
    const{data}=await sb.from("comments").insert(cdata).select().single();
    if(data){setComments(c=>[...c,data]);
      const post=posts.find(p=>p.id===pid);
      if(post&&post.author_id!==me.id)await sb.from("notifications").insert({to_id:post.author_id,from_username:me.username,type:"comment",content:"তোমার পোস্টে কমেন্ট করেছে 💬",read:false});
    }
  };

  const onShare=async(id)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    await sb.from("posts").update({shares:(post.shares||0)+1}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,shares:(x.shares||0)+1}));
    if(navigator.share)navigator.share({title:"AnonLogos",url:`${window.location.href.split('?')[0]}?post=${id}`}).catch(()=>{});
    msg("🔁 শেয়ার হয়েছে!");
  };

  const onCopy=id=>{navigator.clipboard?.writeText(`${window.location.href.split('?')[0]}?post=${id}`).catch(()=>{});msg("🔗 লিংক কপি হয়েছে!");};

  const onBookmark=async(id,saved)=>{
    const post=posts.find(p=>p.id===id);if(!post)return;
    const nb=saved?(post.bookmarks||[]).filter(u=>u!==me.id):[...(post.bookmarks||[]),me.id];
    await sb.from("posts").update({bookmarks:nb}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,bookmarks:nb}));
  };

  const onVote=async(id,i)=>{
    const post=posts.find(p=>p.id===id);if(!post||!post.poll||(post.poll.voted||[]).includes(me.id))return;
    const poll={...post.poll,options:post.poll.options.map((o,j)=>j===i?{...o,votes:[...(o.votes||[]),me.id]}:o),voted:[...(post.poll.voted||[]),me.id]};
    await sb.from("posts").update({poll}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,poll}));
  };

  const onEdit=async(id,content)=>{
    await sb.from("posts").update({content,edited:true}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,content,edited:true}));
  };
  const onDelete=async(id)=>{
    await sb.from("posts").delete().eq("id",id);
    setPosts(p=>p.filter(x=>x.id!==id));
    msg("🗑️ ডিলিট হয়েছে!","success");
  };

  const onPin=async(id,pinned)=>{
    if(!me.verified){msg("📌 পিন করতে ✅ ভেরিফিকেশন লাগবে!","error");return;}
    await sb.from("posts").update({pinned}).eq("id",id);
    setPosts(p=>p.map(x=>x.id!==id?x:{...x,pinned}));
  };

  const onFollow=async(uid)=>{
    if(me.type!=="registered"){msg("🎭 ফলো করতে রেজিস্ট্রেশন করো!","error");setTimeout(()=>setShowAuth(true),600);return;}
    const isF=(me.following||[]).includes(uid);
    const nf=isF?(me.following||[]).filter(i=>i!==uid):[...(me.following||[]),uid];
    await sb.from("users").update({following:nf}).eq("id",me.id);
    setProfile(p=>({...p,following:nf}));
    const{data:t}=await sb.from("users").select("followers").eq("id",uid).single();
    if(t){const nfl=isF?(t.followers||[]).filter(i=>i!==me.id):[...(t.followers||[]),me.id];await sb.from("users").update({followers:nfl}).eq("id",uid);}
    if(!isF)await sb.from("notifications").insert({to_id:uid,from_username:me.username,type:"follow",content:"তোমাকে ফলো করেছে 👤",read:false});
    msg(isF?"আনফলো করা হয়েছে":"✅ ফলো করা হয়েছে!","success");
  };

  const onMsgUser=async(p)=>{
    if(me.type!=="registered"){msg("💌 মেসেজ করতে রেজিস্ট্রেশন করো!","error");setShowAuth(true);return;}
    if(p.author_id===me.id){msg("নিজেকে মেসেজ করা যাবে না 😄");return;}
    await sb.from("messages").insert({from_id:me.id,from_name:me.username,to_id:p.author_id,content:"👋 হ্যালো!",read:false});
    setShowInbox(true);msg("💌 মেসেজ পাঠানো হয়েছে!","success");
  };

  const onAuthReq=()=>{msg("🎭 এই ফিচারের জন্য রেজিস্ট্রেশন করো!","error");setShowAuth(true);};

  const cardProps={tc:TC,onLike,onReact,onComment,onShare,onCopy,onBookmark,onVote,onEdit,onDelete,onPin,onMsgUser,onViewProfile:setViewProfile,onFollow,onAuthReq};

  const baseFeed=posts.filter(p=>!searchQ||(p.content||"").includes(searchQ));
  const feed=sort==="smart"?buildSmartFeed(baseFeed):sort==="top"?[...baseFeed].sort((a,b)=>(b.likes||[]).length-(a.likes||[]).length):baseFeed;
  const mine=posts.filter(p=>p.author_id===me.id);
  const saved=posts.filter(p=>(p.bookmarks||[]).includes(me.id));
const TABS=[{id:"feed",ic:"🌐",lb:"ফিড"},{id:"trending",ic:"🔥",lb:"ট্রেন্ড"},{id:"saved",ic:"🔖",lb:"সেভড"},{id:"profile",ic:"👤",lb:"আমি"}];

  if(appLoading)return(
    <div style={{minHeight:"100vh",background:"#080810",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🎭</div>
        <div style={{fontWeight:900,fontSize:24,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AnonLogos</div>
        <div style={{width:36,height:36,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"16px auto 0"}}/>
      </div>
    </div>
  );

  if(viewProfile)return(
    <div style={{minHeight:"100vh",background:TC.bg}}>
      <ProfilePage userId={viewProfile} me={me} tc={TC} onBack={()=>setViewProfile(null)} onFollow={onFollow} onMsgUser={onMsgUser} onLogout={logout} onSettings={()=>setShowSettings(true)} {...cardProps}/>
      {showSettings&&<Settings theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} tc={TC} onClose={()=>setShowSettings(false)}/>}
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:TC.bg,position:"relative"}}>

      {/* Topbar */}
      <div style={{background:TC.nav,backdropFilter:"blur(20px)",borderBottom:`1px solid ${TC.border}`,padding:"0 10px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        {searchOpen
          ?<input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="পোস্ট খোঁজো..." style={{flex:1,background:TC.input,border:"none",borderRadius:20,padding:"8px 14px",color:TC.text,fontSize:14,outline:"none"}}/>
          :<span style={{fontWeight:900,fontSize:20,background:"linear-gradient(90deg,#a855f7,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.5px"}}>AnonLogos</span>
        }
        <div style={{display:"flex",gap:5,marginLeft:6,alignItems:"center"}}>
          <button onClick={()=>{setSearchOpen(!searchOpen);setSearchQ("");}} style={{background:TC.input,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:13,color:"#64748b"}}>{searchOpen?"✕":"🔍"}</button>
          <button onClick={()=>setShowSearch(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:13,color:"#64748b"}}>👥</button>
          <button onClick={()=>setShowRooms(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:13,color:"#64748b"}}>💬</button>
          {profile&&(
            <>
              <div style={{position:"relative"}}>
                <button onClick={()=>{setShowNotif(true);setUnreadN(0);}} style={{background:TC.input,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:13,color:"#64748b"}}>🔔</button>
                {unreadN>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#ef4444",color:"#fff",borderRadius:"50%",width:15,height:15,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadN}</div>}
              </div>
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowInbox(true)} style={{background:TC.input,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:13,color:"#64748b"}}>💌</button>
                {unreadM>0&&<div style={{position:"absolute",top:-2,right:-2,background:"#7c3aed",color:"#fff",borderRadius:"50%",width:15,height:15,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadM}</div>}
              </div>
            </>
          )}
          {profile
            ?<button onClick={()=>setViewProfile(profile.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av u={me.username} color={me.color} size={32} verified={me.verified||false} isReg={true}/></button>
            :<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:16,padding:"6px 12px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>লগইন</button>
          }
        </div>
      </div>

      {/* Guest banner */}
      {!profile&&(
        <div style={{background:"linear-gradient(135deg,#7c3aed22,#3b82f622)",borderBottom:"1px solid #7c3aed33",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#a78bfa",fontSize:13,fontWeight:600}}>🎭 গেস্ট মোডে আছো</div>
            <div style={{color:"#475569",fontSize:11}}>রেজিস্ট্রেশন করলে পাবে ফলো, মেসেজ ও আরো!</div>
          </div>
          <button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"8px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>রেজিস্টার</button>
        </div>
      )}

      {/* Tag + Sort strip */}
      {tab==="feed"&&(
        <div style={{background:TC.strip,borderBottom:`1px solid ${TC.border}`}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",padding:"8px 10px 5px"}}>
            {["সব",...TAGS].map(tag=>{const c=TAG_C[tag]||"#7c3aed";const a=activeTag===tag;return(<button key={tag} onClick={()=>setActiveTag(tag)} style={{background:a?(tag==="সব"?"linear-gradient(135deg,#7c3aed,#3b82f6)":c+"33"):TC.input,border:`1px solid ${a?(tag==="সব"?"#7c3aed":c):TC.border}`,borderRadius:16,padding:"5px 11px",color:a?(tag==="সব"?"#fff":c):TC.sub,cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:a?700:400}}>{tag}</button>);})}
          </div>
          <div style={{display:"flex",gap:6,padding:"0 10px 7px"}}>
            {[["smart","🔀 স্মার্ট"],["new","🕐 নতুন"],["top","🔥 জনপ্রিয়"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSort(v)} style={{background:sort===v?"#7c3aed22":"transparent",border:`1px solid ${sort===v?"#7c3aed":"transparent"}`,borderRadius:10,padding:"3px 9px",color:sort===v?"#a855f7":TC.sub,cursor:"pointer",fontSize:11,fontWeight:sort===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>
      )}

      {/* Content */}
      <div style={{padding:"10px 10px 80px"}}>
        <div ref={feedTopRef}/>
        {tab==="feed"&&(
          <>
            {posts.length===0&&!loadingMore?<div style={{textAlign:"center",padding:"60px 0",color:TC.dim}}><div style={{fontSize:44,marginBottom:10}}>🎭</div>কোনো পোস্ট নেই। প্রথমে পোস্ট করো!</div>
              :feed.map(p=><PostCard key={p.id} p={p} me={me} localLike={pendingLikes[p.id]} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)
            }
            <div ref={loaderRef} style={{height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {loadingMore&&<div style={{width:28,height:28,border:"3px solid #1e1e35",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>}
              {!hasMore&&posts.length>0&&<p style={{color:TC.dim,fontSize:12}}>সব পোস্ট দেখা হয়েছে ✓</p>}
            </div>
          </>
        )}
        {tab==="trending"&&[...posts].sort((a,b)=>(b.likes||[]).length-(a.likes||[]).length).map(p=><PostCard key={p.id} p={p} me={me} localLike={pendingLikes[p.id]} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)}
        {tab==="saved"&&(saved.length===0?<div style={{textAlign:"center",padding:"60px 0",color:TC.dim}}><div style={{fontSize:44,marginBottom:10}}>🔖</div>সেভড পোস্ট নেই</div>:saved.map(p=><PostCard key={p.id} p={p} me={me} localLike={pendingLikes[p.id]} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>))}
        {tab==="profile"&&(
          <div>
            <div style={{background:TC.card,border:`1px solid ${TC.border}`,borderRadius:20,padding:"24px 14px",textAlign:"center",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Av u={me.username} color={me.color} size={72} verified={me.verified||false} isReg={me.type==="registered"}/></div>
              <h2 style={{color:"#c4b5fd",fontSize:18,fontWeight:800}}>{me.username}{me.type==="registered"&&<RBadge/>}{me.verified&&<VBadge/>}</h2>
              <p style={{color:TC.dim,fontSize:11,marginTop:4}}>#{me.id?.slice(0,8)} · {me.type==="registered"?"রেজিস্টার্ড":"গেস্ট"}</p>
              {me.type==="registered"&&(
                <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                  <button onClick={()=>{navigator.clipboard?.writeText(`${window.location.href.split('?')[0]}?profile=${me.id}`).catch(()=>{});msg("🔗 প্রোফাইল লিংক কপি!","success");}} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:12,padding:"7px 12px",color:TC.sub,cursor:"pointer",fontSize:12}}>🔗 প্রোফাইল লিংক</button>
                  <button onClick={()=>setShowSettings(true)} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:12,padding:"7px 12px",color:TC.sub,cursor:"pointer",fontSize:12}}>⚙️ সেটিংস</button>
                </div>
              )}
              {me.type!=="registered"
                ?<button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:14,padding:"10px 24px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,marginTop:14}}>🆅 রেজিস্ট্রেশন করো</button>
                :(
                  <div>
                    <div style={{display:"flex",justifyContent:"center",gap:0,marginTop:14,background:TC.input,borderRadius:14,overflow:"hidden",border:`1px solid ${TC.border}`}}>
                      {[["পোস্ট",mine.length,"#a855f7"],["লাইক",mine.reduce((a,p)=>a+(p.likes||[]).length,0),"#ec4899"],["সেভড",saved.length,"#f59e0b"],["ফলোয়ার",(me.followers||[]).length,"#3b82f6"]].map(([l,v,c],i,arr)=>(
                        <div key={i} style={{flex:1,padding:"11px 2px",textAlign:"center",borderRight:i<arr.length-1?`1px solid ${TC.border}`:"none"}}>
                          <div style={{fontSize:17,fontWeight:800,color:c}}>{v}</div>
                          <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <button onClick={logout} style={{background:TC.input,border:`1px solid ${TC.border}`,borderRadius:14,padding:"9px 22px",color:TC.sub,cursor:"pointer",fontWeight:600,fontSize:13,marginTop:12}}>লগআউট</button>
                  </div>
                )
              }
            </div>
            {mine.length===0?<p style={{textAlign:"center",color:TC.dim,padding:36}}>এখনো পোস্ট করোনি!</p>:mine.map(p=><PostCard key={p.id} p={p} me={me} localLike={pendingLikes[p.id]} comments={comments.filter(c=>c.post_id===p.id)} {...cardProps}/>)}
          </div>
        )}
      </div>

      {/* FAB */}
      <button onClick={()=>setCompose(true)} style={{position:"fixed",bottom:68,right:14,width:52,height:52,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",border:"none",borderRadius:"50%",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 6px 24px #7c3aed66",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:TC.nav,backdropFilter:"blur(20px)",borderTop:`1px solid ${TC.border}`,display:"flex",zIndex:100,height:56}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{
            if(t.id==="feed"&&tab==="feed"){feedTopRef.current?.scrollIntoView({behavior:"smooth"});loadPosts(true);}
            else setTab(t.id);
          }} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,color:tab===t.id?"#a855f7":"#2a2a45"}}>
            <span style={{fontSize:18,filter:tab===t.id?"drop-shadow(0 0 6px #a855f7)":"none"}}>{t.ic}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?700:400}}>{t.lb}</span>
          </button>
        ))}
      </div>

      {/* All modals */}
      {compose&&<Compose me={me} tc={TC} onPost={addPost} onClose={()=>setCompose(false)}/>}
      {showAuth&&<AuthModal onSuccess={p=>{setProfile(p);setShowAuth(false);msg("✅ স্বাগতম "+p.username,"success");}} onClose={()=>setShowAuth(false)} tc={TC}/>}
      {showInbox&&profile&&<Inbox me={me} tc={TC} onClose={()=>setShowInbox(false)} setShowGroups={setShowGroups} />}
      {showRooms&&<Rooms me={me} tc={TC} onClose={()=>setShowRooms(false)} isGroup={false}/>}
      {showGroups&&<Rooms me={me} tc={TC} onClose={()=>setShowGroups(false)} isGroup={true}/>}
      {showNotif&&profile&&<Notifs me={me} tc={TC} onClose={()=>setShowNotif(false)}/>}
      {showSearch&&<UserSearch me={me} tc={TC} onViewProfile={setViewProfile} onFollow={onFollow} onClose={()=>setShowSearch(false)}/>}
      {showSettings&&<Settings theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} tc={TC} onClose={()=>setShowSettings(false)}/>}
      {toast&&<Toast msg={toast.m} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
